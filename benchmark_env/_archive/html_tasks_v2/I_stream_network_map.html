<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Topology Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0a0f1e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  .net-card { background: #0d1117; border: 1px solid #1e2030; border-radius: 14px; width: 780px; overflow: hidden; margin-bottom: 20px; }
  .net-header { background: #13151f; border-bottom: 1px solid #1e2030; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .net-header h2 { color: #c8d3f5; font-size: 0.95rem; }
  .net-stats { display: flex; gap: 16px; font-size: 0.75rem; }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-online { background: #22c55e; }
  .dot-offline { background: #ef4444; }
  .stat-text { color: #565f89; }
  .net-body { position: relative; padding: 20px; }
  canvas#netCanvas { display: block; width: 100%; }
  .status-log { background: #0a0f1e; border-top: 1px solid #1e2030; padding: 14px 20px; font-family: 'Courier New', monospace; font-size: 0.78rem; max-height: 130px; overflow-y: auto; }
  .log-entry { padding: 3px 0; border-bottom: 1px solid #0d1117; display: flex; gap: 10px; }
  .log-time { color: #388bfd; min-width: 50px; }
  .log-event { flex: 1; }
  .event-online { color: #4ade80; }
  .event-offline { color: #f87171; }
  .event-info { color: #565f89; }
  .answer-box { width: 780px; background: #13151f; border: 1px solid #1e2030; border-radius: 14px; padding: 20px; }
  .answer-box label { color: #8b949e; font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 8px; }
  .answer-box textarea { width: 100%; padding: 10px 14px; background: #0a0f1e; border: 1px solid #1e2030; border-radius: 8px; color: #c8d3f5; font-size: 0.88rem; min-height: 90px; outline: none; resize: vertical; font-family: inherit; }
  .answer-box textarea:focus { border-color: #388bfd; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn { background: #1d4ed8; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-restart { background: #1e2030; color: #8b949e; border: 1px solid #30363d; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; cursor: pointer; }
  .result-msg { font-size: 0.85rem; margin-top: 10px; font-weight: 600; display: none; }
</style>
</head>
<body>
<div class="net-card">
  <div class="net-header">
    <h2>🌐 Network Topology — Live Monitor</h2>
    <div class="net-stats">
      <div class="stat-item"><div class="stat-dot dot-online"></div><span class="stat-text"><span id="onlineCount">6</span> Online</span></div>
      <div class="stat-item"><div class="stat-dot dot-offline"></div><span class="stat-text"><span id="offlineCount">0</span> Offline</span></div>
      <span style="color:#565f89;font-size:0.72rem" id="elapsed">t=0s</span>
    </div>
  </div>
  <div class="net-body">
    <canvas id="netCanvas" height="280"></canvas>
  </div>
  <div class="status-log" id="statusLog">
    <div class="log-entry"><span class="log-time">t=0s</span><span class="log-event event-info">Network monitoring started — all 6 nodes online</span></div>
  </div>
</div>

<div class="answer-box">
  <label for="answerTA">Final status of each node (A-F):</label>
  <textarea id="answerTA" placeholder="A: online, B: online, C: ..., D: ..., E: ..., F: ..."></textarea>
  <div class="btn-row">
    <button class="btn" onclick="submitAnswer()">Submit</button>
    <button class="btn-restart" onclick="restartNetwork()">Restart</button>
  </div>
  <div class="result-msg" id="resultMsg"></div>
</div>

<script>
let taskResult = 'pending';
window.getTaskResult = () => taskResult;

// Node positions (x, y) in 740x280 canvas
const nodePos = {
  A: { x: 100, y: 140 },
  B: { x: 250, y: 60 },
  C: { x: 400, y: 50 },
  D: { x: 540, y: 140 },
  E: { x: 400, y: 240 },
  F: { x: 630, y: 230 },
};

const edges = [
  ['A','B'],['A','E'],['B','C'],['B','D'],['C','D'],['D','F'],['D','E'],['E','F'],
];

// Status changes over time
const nodeStatus = { A: true, B: true, C: true, D: true, E: true, F: true };

const events = [
  { t: 5000,  node: 'C', online: false, msg: 'Node C went OFFLINE — link failure' },
  { t: 10000, node: 'E', online: false, msg: 'Node E went OFFLINE — hardware failure' },
  { t: 15000, node: 'C', online: true,  msg: 'Node C came back ONLINE — restored' },
  { t: 20000, node: 'F', online: false, msg: 'Node F went OFFLINE — power loss' },
];

let timers = [];
let elapsed = 0;
let clockId = null;
let canvas, ctx;

function drawNetwork() {
  canvas.width = canvas.offsetWidth || 740;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const scaleX = canvas.width / 740;
  const scaleY = canvas.height / 280;

  // Draw edges
  edges.forEach(([a, b]) => {
    const pa = nodePos[a], pb = nodePos[b];
    const bothOnline = nodeStatus[a] && nodeStatus[b];
    ctx.beginPath();
    ctx.moveTo(pa.x * scaleX, pa.y * scaleY);
    ctx.lineTo(pb.x * scaleX, pb.y * scaleY);
    ctx.strokeStyle = bothOnline ? '#1e3a5f' : '#3d1010';
    ctx.lineWidth = bothOnline ? 2 : 1.5;
    ctx.setLineDash(bothOnline ? [] : [5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Draw nodes
  Object.entries(nodePos).forEach(([name, pos]) => {
    const online = nodeStatus[name];
    const x = pos.x * scaleX, y = pos.y * scaleY;

    // Glow
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 35);
    grad.addColorStop(0, online ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.3)');
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(x, y, 35, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Node circle
    ctx.beginPath();
    ctx.arc(x, y, 22, 0, Math.PI * 2);
    ctx.fillStyle = online ? '#0c2d1a' : '#1c0a0a';
    ctx.fill();
    ctx.strokeStyle = online ? '#22c55e' : '#ef4444';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Node label
    ctx.fillStyle = online ? '#4ade80' : '#f87171';
    ctx.font = `bold 14px 'Segoe UI'`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(name, x, y);

    // Status dot
    ctx.beginPath();
    ctx.arc(x + 16, y - 16, 6, 0, Math.PI * 2);
    ctx.fillStyle = online ? '#22c55e' : '#ef4444';
    ctx.fill();
    ctx.strokeStyle = '#0d1117';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Status text below node
    ctx.fillStyle = online ? '#4ade80' : '#f87171';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(online ? 'online' : 'offline', x, y + 34);
  });
}

function addLog(t, msg, type) {
  const log = document.getElementById('statusLog');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">t=${t}s</span><span class="log-event event-${type}">${msg}</span>`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function updateCounts() {
  const online = Object.values(nodeStatus).filter(Boolean).length;
  document.getElementById('onlineCount').textContent = online;
  document.getElementById('offlineCount').textContent = 6 - online;
}

function applyEvent(ev) {
  nodeStatus[ev.node] = ev.online;
  drawNetwork();
  updateCounts();
  const type = ev.online ? 'online' : 'offline';
  addLog(Math.round(ev.t / 1000), ev.msg, type);
}

function runNetwork() {
  canvas = document.getElementById('netCanvas');
  canvas.width = canvas.offsetWidth || 740;
  ctx = canvas.getContext('2d');
  drawNetwork();

  events.forEach(ev => {
    timers.push(setTimeout(() => applyEvent(ev), ev.t));
  });

  clockId = setInterval(() => {
    elapsed++;
    document.getElementById('elapsed').textContent = 't=' + elapsed + 's';
  }, 1000);
}

function restartNetwork() {
  timers.forEach(clearTimeout);
  clearInterval(clockId);
  timers = [];
  elapsed = 0;
  taskResult = 'pending';
  Object.keys(nodeStatus).forEach(k => nodeStatus[k] = true);
  document.getElementById('answerTA').value = '';
  document.getElementById('resultMsg').style.display = 'none';
  document.getElementById('statusLog').innerHTML = '<div class="log-entry"><span class="log-time">t=0s</span><span class="log-event event-info">Network monitoring started — all 6 nodes online</span></div>';
  document.getElementById('elapsed').textContent = 't=0s';
  drawNetwork();
  updateCounts();
  runNetwork();
}

function submitAnswer() {
  const val = document.getElementById('answerTA').value;
  const msg = document.getElementById('resultMsg');
  if (val.length > 40) {
    taskResult = 'network_reported';
    msg.style.color = '#4ade80';
    msg.textContent = 'Reported! Final state: A=online, B=online, C=online, D=online, E=offline, F=offline.';
  } else {
    taskResult = 'incomplete';
    msg.style.color = '#f87171';
    msg.textContent = 'Please report the final status for all 6 nodes (A through F).';
  }
  msg.style.display = 'block';
}

runNetwork();
</script>
</body>
</html>
