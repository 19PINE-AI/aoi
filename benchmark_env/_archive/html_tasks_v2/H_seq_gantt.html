<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt Chart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .gantt-card { background: #fff; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 740px; padding: 28px; margin-bottom: 20px; }
  .gantt-card h2 { font-size: 1.1rem; color: #1e293b; margin-bottom: 4px; }
  .gantt-subtitle { font-size: 0.78rem; color: #94a3b8; margin-bottom: 24px; }
  .gantt-legend { display: flex; gap: 16px; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #64748b; }
  .legend-color { width: 14px; height: 14px; border-radius: 3px; }
  .gantt-grid { position: relative; }
  .gantt-header { display: flex; margin-left: 100px; margin-bottom: 8px; }
  .day-label { flex: 1; text-align: center; font-size: 0.72rem; color: #94a3b8; font-weight: 600; }
  .gantt-row { display: flex; align-items: center; margin-bottom: 12px; height: 36px; }
  .task-label { width: 100px; font-size: 0.82rem; color: #475569; font-weight: 600; flex-shrink: 0; }
  .gantt-track { flex: 1; height: 32px; position: relative; background: #f1f5f9; border-radius: 6px; overflow: hidden; border: 1px solid #e2e8f0; }
  .gantt-bar { position: absolute; height: 100%; border-radius: 6px; display: flex; align-items: center; padding: 0 10px; font-size: 0.75rem; font-weight: 700; color: #fff; width: 0; transition: width 1s ease; white-space: nowrap; overflow: hidden; }
  .grid-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #e2e8f0; }
  .duration-badge { position: absolute; right: 8px; font-size: 0.72rem; color: #64748b; top: 50%; transform: translateY(-50%); font-weight: 600; }
  .highlight-longest { border: 2px solid #7c3aed !important; box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
  .answer-box { width: 740px; background: #fff; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 20px; }
  .answer-box label { font-size: 0.85rem; color: #475569; font-weight: 600; display: block; margin-bottom: 8px; }
  .answer-box input { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; outline: none; }
  .answer-box input:focus { border-color: #2563eb; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-restart { background: #e2e8f0; color: #475569; border: none; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; cursor: pointer; }
  .result-msg { font-size: 0.85rem; margin-top: 10px; font-weight: 600; display: none; }
</style>
</head>
<body>
<div class="gantt-card">
  <h2>Project Schedule — Gantt Chart</h2>
  <div class="gantt-subtitle">Sprint duration: 10 days | Click Restart to replay animation</div>

  <div class="gantt-legend">
    <div class="legend-item"><div class="legend-color" style="background:#3b82f6"></div>Task A (2d)</div>
    <div class="legend-item"><div class="legend-color" style="background:#f59e0b"></div>Task B (5d)</div>
    <div class="legend-item"><div class="legend-color" style="background:#8b5cf6"></div>Task C (8d)</div>
    <div class="legend-item"><div class="legend-color" style="background:#10b981"></div>Task D (3d)</div>
    <div class="legend-item"><div class="legend-color" style="background:#7c3aed;border:2px solid #7c3aed"></div>Longest task</div>
  </div>

  <div class="gantt-grid">
    <div class="gantt-header" id="ganttHeader"></div>
    <div class="gantt-row">
      <div class="task-label">Task A</div>
      <div class="gantt-track" id="trackA">
        <div class="gantt-bar" id="barA" style="left:0%;background:#3b82f6">Task A</div>
        <span class="duration-badge" id="bdgA" style="display:none">2 days</span>
      </div>
    </div>
    <div class="gantt-row">
      <div class="task-label">Task B</div>
      <div class="gantt-track" id="trackB">
        <div class="gantt-bar" id="barB" style="left:20%;background:#f59e0b">Task B</div>
        <span class="duration-badge" id="bdgB" style="display:none">5 days</span>
      </div>
    </div>
    <div class="gantt-row">
      <div class="task-label">Task C</div>
      <div class="gantt-track" id="trackC">
        <div class="gantt-bar" id="barC" style="left:0%;background:#8b5cf6">Task C ⭐ Longest</div>
        <span class="duration-badge" id="bdgC" style="display:none">8 days</span>
      </div>
    </div>
    <div class="gantt-row">
      <div class="task-label">Task D</div>
      <div class="gantt-track" id="trackD">
        <div class="gantt-bar" id="barD" style="left:50%;background:#10b981">Task D</div>
        <span class="duration-badge" id="bdgD" style="display:none">3 days</span>
      </div>
    </div>
  </div>
</div>

<div class="answer-box">
  <label for="answerInput">Longest task:</label>
  <input type="text" id="answerInput" placeholder="Which task has the longest duration?" />
  <div class="btn-row">
    <button class="btn" onclick="submitAnswer()">Submit</button>
    <button class="btn-restart" onclick="restartGantt()">Restart</button>
  </div>
  <div class="result-msg" id="resultMsg"></div>
</div>

<script>
let taskResult = 'pending';
window.getTaskResult = () => taskResult;

const DAYS = 10;
// Task: [startDay, durationDays, color]
const tasks = [
  { id: 'A', start: 1, dur: 2 },
  { id: 'B', start: 3, dur: 5 },
  { id: 'C', start: 1, dur: 8 },
  { id: 'D', start: 6, dur: 3 },
];

let timers = [];

function buildHeader() {
  const hdr = document.getElementById('ganttHeader');
  hdr.innerHTML = '';
  for (let d = 1; d <= DAYS; d++) {
    const lbl = document.createElement('div');
    lbl.className = 'day-label';
    lbl.textContent = 'D' + d;
    hdr.appendChild(lbl);
  }
}

function animateBar(taskId, delay) {
  const task = tasks.find(t => t.id === taskId);
  timers.push(setTimeout(() => {
    const bar = document.getElementById('bar' + taskId);
    const startPct = ((task.start - 1) / DAYS * 100).toFixed(1);
    const widthPct = (task.dur / DAYS * 100).toFixed(1);
    bar.style.left = startPct + '%';
    bar.style.width = widthPct + '%';
    document.getElementById('bdg' + taskId).style.display = '';

    if (taskId === 'C') {
      setTimeout(() => {
        document.getElementById('trackC').classList.add('highlight-longest');
      }, 1200);
    }
  }, delay));
}

function runGantt() {
  buildHeader();
  animateBar('A', 500);
  animateBar('B', 3500);
  animateBar('C', 6500);
  animateBar('D', 9500);
}

function restartGantt() {
  timers.forEach(clearTimeout);
  timers = [];
  taskResult = 'pending';
  document.getElementById('answerInput').value = '';
  document.getElementById('resultMsg').style.display = 'none';
  tasks.forEach(t => {
    const bar = document.getElementById('bar' + t.id);
    bar.style.width = '0%';
    document.getElementById('bdg' + t.id).style.display = 'none';
  });
  document.getElementById('trackC').classList.remove('highlight-longest');
  runGantt();
}

function submitAnswer() {
  const val = document.getElementById('answerInput').value.toLowerCase();
  const msg = document.getElementById('resultMsg');
  if (val.includes('c') || val.includes('task c')) {
    taskResult = 'correct_task';
    msg.style.color = '#16a34a';
    msg.textContent = 'Correct! Task C has the longest duration at 8 days.';
  } else {
    taskResult = 'incorrect';
    msg.style.color = '#dc2626';
    msg.textContent = 'Incorrect. Compare the bar lengths on the Gantt chart.';
  }
  msg.style.display = 'block';
}

runGantt();
</script>
</body>
</html>
