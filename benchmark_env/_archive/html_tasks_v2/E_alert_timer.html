<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrecisionTimer — Lab Countdown</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0a0a14;
    color: #e0e0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .app-title {
    font-size: 1rem;
    color: #5a5a8a;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  /* Timer display */
  .timer-container {
    position: relative;
    margin-bottom: 40px;
  }

  .timer-ring {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 6px solid #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #0d0d1a;
    box-shadow: 0 0 60px rgba(100,120,255,0.1), inset 0 0 40px rgba(0,0,0,0.5);
  }

  .timer-ring::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 6px solid transparent;
    border-top-color: #5c6bfd;
    border-right-color: #5c6bfd;
    transition: border-color 0.3s;
  }

  .timer-ring.warning::before {
    border-top-color: #d29922;
    border-right-color: #d29922;
    box-shadow: 0 0 20px rgba(210,153,34,0.4);
  }

  .timer-ring.alarm-state::before {
    border-color: #f85149;
    animation: ringPulse 0.3s ease infinite alternate;
    box-shadow: 0 0 30px rgba(248,81,73,0.6);
  }

  @keyframes ringPulse {
    from { opacity: 1; }
    to { opacity: 0.4; }
  }

  .timer-display {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 5rem;
    font-weight: 700;
    color: #c8d0ff;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(100,120,255,0.5);
    transition: color 0.3s;
  }
  .timer-display.warning-color { color: #ffd270; text-shadow: 0 0 20px rgba(255,210,112,0.5); }
  .timer-display.alarm-color { color: #ff6b67; text-shadow: 0 0 30px rgba(255,107,103,0.8); }

  /* Label under timer */
  .timer-label {
    text-align: center;
    margin-top: 12px;
    font-size: 0.85rem;
    color: #5a5a8a;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Status */
  .status-bar {
    background: #1a1a2e;
    border: 1px solid #2a2a45;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 0.85rem;
    color: #7878a8;
    margin-bottom: 32px;
    min-width: 280px;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .status-bar.running { border-color: #5c6bfd; color: #8899ff; }
  .status-bar.warning { border-color: #d29922; color: #ffd270; }
  .status-bar.done { border-color: #f85149; color: #ff6b67; font-weight: 600; animation: textFlash 0.4s ease infinite alternate; }
  @keyframes textFlash { from{opacity:1} to{opacity:0.5} }

  /* Record button */
  .record-btn {
    width: 220px;
    padding: 16px;
    border: 3px solid #2a2a45;
    border-radius: 14px;
    background: #1a1a2e;
    color: #5a5a8a;
    font-size: 1rem;
    font-weight: 700;
    cursor: not-allowed;
    text-align: center;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    user-select: none;
    margin-bottom: 20px;
  }
  .record-btn.active {
    border-color: #f85149;
    background: #f85149;
    color: #fff;
    cursor: pointer;
    animation: btnPulse 0.5s ease infinite alternate;
    box-shadow: 0 0 30px rgba(248,81,73,0.6);
  }
  @keyframes btnPulse {
    from { transform: scale(1); }
    to { transform: scale(1.04); }
  }
  .record-btn.clicked {
    background: #38a169;
    border-color: #38a169;
    color: #fff;
    animation: none;
    cursor: default;
    box-shadow: 0 0 20px rgba(56,161,105,0.4);
  }

  .reaction-info {
    font-size: 0.82rem;
    color: #5a5a8a;
    text-align: center;
    margin-bottom: 20px;
    min-height: 20px;
  }
  .reaction-info.success { color: #6fcf97; font-weight: 600; }
  .reaction-info.missed { color: #f85149; }

  /* Sound indicator */
  .sound-hint {
    position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1a2e;
    border: 1px solid #2a2a45;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 0.8rem;
    color: #5a5a8a;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="app-title">⏱ Precision Timer Lab</div>

<div class="timer-container">
  <div class="timer-ring" id="timerRing">
    <div class="timer-display" id="timerDisplay">00:10</div>
  </div>
  <div class="timer-label" id="timerLabel">Ready — counting down</div>
</div>

<div class="status-bar running" id="statusBar">🟢 Timer running — stay alert</div>

<button class="record-btn" id="recordBtn" onclick="recordTime()">⏺ Record Time!</button>

<div class="reaction-info" id="reactionInfo">Click the button immediately when the alarm sounds</div>

<div class="sound-hint">🔊 Make sure your audio is on — you'll hear an alarm when timer reaches zero</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  let timeLeft = 10;
  let alarmFired = false;
  let alarmTime = null;
  let reactionWindow = false;

  const timerDisplay = document.getElementById('timerDisplay');
  const timerRing = document.getElementById('timerRing');
  const statusBar = document.getElementById('statusBar');
  const recordBtn = document.getElementById('recordBtn');
  const reactionInfo = document.getElementById('reactionInfo');
  const timerLabel = document.getElementById('timerLabel');

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function playAlarm() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      // 440Hz rapid beeps, 3 times
      for (let i = 0; i < 3; i++) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        const start = ctx.currentTime + i * 0.3;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.6, start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.25);
        osc.start(start);
        osc.stop(start + 0.25);
      }
    } catch (e) {}
  }

  function triggerAlarm() {
    alarmFired = true;
    alarmTime = Date.now();
    reactionWindow = true;

    // Visual changes
    timerDisplay.classList.add('alarm-color');
    timerRing.classList.add('alarm-state');
    statusBar.textContent = '🚨 TIME\'S UP — CLICK RECORD NOW!';
    statusBar.className = 'status-bar done';
    timerLabel.textContent = '⏰ ALARM — React immediately!';

    // Activate button
    recordBtn.classList.add('active');

    // Play alarm
    playAlarm();

    // Close reaction window after 2s
    setTimeout(() => {
      reactionWindow = false;
      if (taskResult === 'pending') {
        // Missed
        recordBtn.classList.remove('active');
        recordBtn.textContent = '✗ Too late';
        reactionInfo.textContent = 'Reaction window closed. You were too slow.';
        reactionInfo.className = 'reaction-info missed';
        taskResult = 'reaction_missed';
      }
    }, 2000);
  }

  function recordTime() {
    if (!alarmFired) return; // Alarm hasn't fired yet
    if (taskResult !== 'pending') return; // Already recorded

    if (reactionWindow) {
      taskResult = 'reaction_recorded';
      const reactionMs = Date.now() - alarmTime;
      recordBtn.classList.remove('active');
      recordBtn.classList.add('clicked');
      recordBtn.textContent = '✓ Time Recorded!';
      reactionInfo.textContent = `✓ Excellent! Reaction time: ${reactionMs}ms`;
      reactionInfo.className = 'reaction-info success';
      statusBar.textContent = '✓ Time recorded successfully!';
      statusBar.className = 'status-bar';
      statusBar.style.borderColor = '#38a169';
      statusBar.style.color = '#6fcf97';
    }
  }

  // Countdown
  const countdown = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = formatTime(timeLeft);

    if (timeLeft <= 3 && timeLeft > 0) {
      timerDisplay.classList.add('warning-color');
      timerRing.classList.add('warning');
      statusBar.textContent = '⚠️ Almost there — get ready!';
      statusBar.className = 'status-bar warning';
    }

    if (timeLeft <= 0) {
      clearInterval(countdown);
      timerDisplay.textContent = '00:00';
      triggerAlarm();
    }
  }, 1000);
</script>
</body>
</html>
