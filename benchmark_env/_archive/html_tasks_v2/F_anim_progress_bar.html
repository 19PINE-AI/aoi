<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Launcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .launcher {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 48px 56px;
    width: 480px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .logo {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #58a6ff, #3fb950);
    border-radius: 18px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #f0f6fc; }
  .subtitle { font-size: 14px; color: #8b949e; margin-bottom: 36px; }
  .progress-container {
    background: #21262d;
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid #30363d;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #238636, #3fb950);
    border-radius: 8px;
    transition: width 0.1s linear;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 32px;
  }
  .message { color: #58a6ff; }
  .percent { color: #e6edf3; font-weight: 600; }
  #launchBtn {
    display: none;
    background: #238636;
    color: #fff;
    border: none;
    padding: 14px 48px;
    font-size: 18px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 8px;
    animation: pulse 1s ease-in-out infinite;
  }
  #launchBtn:hover { background: #2ea043; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(46,160,67,0.6); }
    50% { box-shadow: 0 0 0 12px rgba(46,160,67,0); }
  }
  .dots { margin-top: 20px; color: #8b949e; font-size: 13px; }
  #resultDisplay {
    margin-top: 16px;
    font-size: 14px;
    color: #3fb950;
    font-weight: 600;
    min-height: 20px;
  }
</style>
</head>
<body>
<div class="launcher">
  <div class="logo">⚡</div>
  <h1>NexusOS Launcher</h1>
  <p class="subtitle">Preparing your environment...</p>
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-info">
    <span class="message" id="loadMessage">Initializing...</span>
    <span class="percent" id="percentText">0%</span>
  </div>
  <button id="launchBtn" onclick="onLaunch()">Launch</button>
  <div id="resultDisplay"></div>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const messages = ['Initializing...', 'Loading assets...', 'Connecting...', 'Ready!'];
  const bar = document.getElementById('progressBar');
  const pctText = document.getElementById('percentText');
  const msgEl = document.getElementById('loadMessage');
  const launchBtn = document.getElementById('launchBtn');

  const DURATION = 8000;
  let startTime = null;

  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const pct = Math.min(100, (elapsed / DURATION) * 100);

    bar.style.width = pct + '%';
    pctText.textContent = Math.floor(pct) + '%';

    const msgIndex = Math.min(3, Math.floor((pct / 100) * 4));
    msgEl.textContent = messages[msgIndex];

    if (pct < 100) {
      requestAnimationFrame(animate);
    } else {
      pctText.textContent = '100%';
      msgEl.textContent = 'Ready!';
      launchBtn.style.display = 'inline-block';
    }
  }

  requestAnimationFrame(animate);

  function onLaunch() {
    taskResult = 'launch_clicked';
    document.getElementById('resultDisplay').textContent = 'Launch initiated! NexusOS is starting.';
    launchBtn.style.animation = 'none';
    launchBtn.style.background = '#1f6feb';
    launchBtn.textContent = 'Launching...';
    launchBtn.disabled = true;
  }
</script>
</body>
</html>
