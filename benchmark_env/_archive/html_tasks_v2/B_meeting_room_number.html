<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Room — Video Conference</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #16213e;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #0f3460;
  }
  .logo { font-size: 18px; font-weight: 700; color: #4fc3f7; letter-spacing: 1px; }
  .meeting-id { font-size: 13px; color: #90a4ae; }
  .status-dot { width: 10px; height: 10px; background: #4caf50; border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .live-badge { display: flex; align-items: center; font-size: 13px; color: #4caf50; }

  .main-area {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 0;
    overflow: hidden;
  }
  .video-grid {
    background: #0d1117;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 16px;
    align-content: start;
  }
  .participant-tile {
    background: #1e2736;
    border-radius: 10px;
    aspect-ratio: 4/3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 2px solid transparent;
    transition: border-color 0.3s;
  }
  .participant-tile.speaking { border-color: #4fc3f7; }
  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }
  .participant-name {
    font-size: 12px;
    color: #b0bec5;
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .mic-icon { position: absolute; bottom: 8px; right: 8px; font-size: 13px; }

  .sidebar {
    background: #16213e;
    border-left: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    padding: 16px;
    overflow-y: auto;
  }
  .sidebar h3 { font-size: 14px; color: #90a4ae; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .transcript-box {
    flex: 1;
    background: #0d1117;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    line-height: 1.7;
    min-height: 120px;
    color: #cfd8dc;
    border: 1px solid #263238;
    margin-bottom: 16px;
  }
  .transcript-line { margin-bottom: 6px; }
  .transcript-line .speaker { color: #4fc3f7; font-weight: 600; }

  .answer-section {
    background: #0d1117;
    border-radius: 8px;
    padding: 14px;
    border: 1px solid #263238;
  }
  .answer-section label {
    font-size: 13px;
    color: #90a4ae;
    display: block;
    margin-bottom: 6px;
  }
  .answer-section input[type="text"] {
    width: 100%;
    background: #1e2736;
    border: 1px solid #37474f;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 8px 10px;
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .answer-section input:focus { border-color: #4fc3f7; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #0288d1; color: #fff; }
  .btn-secondary { background: #37474f; color: #e0e0e0; }
  .result-msg {
    margin-top: 10px;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 6px;
    display: none;
  }
  .result-msg.success { background: #1b5e20; color: #a5d6a7; display: block; }
  .result-msg.error   { background: #b71c1c; color: #ef9a9a; display: block; }

  .controls {
    background: #16213e;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border-top: 1px solid #0f3460;
  }
  .ctrl-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: #263238;
    color: #e0e0e0;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .ctrl-btn:hover { background: #37474f; }
  .ctrl-btn.red { background: #c62828; }
  .ctrl-btn.red:hover { background: #e53935; }
  .timer { color: #90a4ae; font-size: 13px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<header>
  <div class="logo">&#9654; MeetSync</div>
  <div class="meeting-id">Meeting ID: 834-291-065</div>
  <div class="live-badge"><span class="status-dot"></span> Live</div>
</header>

<div class="main-area">
  <div class="video-grid">
    <div class="participant-tile" id="tile-host">
      <div class="avatar" style="background:#1565c0;">JM</div>
      <div class="participant-name">Jordan M. (Host)</div>
      <div class="mic-icon">🎙</div>
    </div>
    <div class="participant-tile">
      <div class="avatar" style="background:#6a1b9a;">SR</div>
      <div class="participant-name">Sofia R.</div>
      <div class="mic-icon">🔇</div>
    </div>
    <div class="participant-tile">
      <div class="avatar" style="background:#2e7d32;">DK</div>
      <div class="participant-name">Dev K.</div>
      <div class="mic-icon">🔇</div>
    </div>
    <div class="participant-tile">
      <div class="avatar" style="background:#e65100;">PL</div>
      <div class="participant-name">Priya L.</div>
      <div class="mic-icon">🔇</div>
    </div>
    <div class="participant-tile">
      <div class="avatar" style="background:#4a148c;">TC</div>
      <div class="participant-name">Tom C.</div>
      <div class="mic-icon">🔇</div>
    </div>
    <div class="participant-tile" style="background:#111;">
      <div style="font-size:32px; color:#37474f;">+3</div>
      <div style="font-size:11px; color:#546e7a; margin-top:4px;">more</div>
    </div>
  </div>

  <div class="sidebar">
    <h3>Live Transcript</h3>
    <div class="transcript-box" id="transcript">
      <div style="color:#546e7a; font-style:italic; font-size:12px;">Transcript will appear here...</div>
    </div>

    <div class="answer-section">
      <label for="room-input">Room number:</label>
      <input type="text" id="room-input" placeholder="Enter room number..." />
      <div style="display:flex; gap:8px;">
        <button class="btn btn-primary" onclick="submitAnswer()">Submit</button>
        <button class="btn btn-secondary" onclick="replayAudio()">&#9654; Replay</button>
      </div>
      <div class="result-msg" id="result-msg"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn">🎙</button>
  <button class="ctrl-btn">📷</button>
  <button class="ctrl-btn">💬</button>
  <button class="ctrl-btn">⬆</button>
  <button class="ctrl-btn red">📵</button>
  <span class="timer" id="timer">00:00</span>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  // Timer
  let seconds = 0;
  setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('timer').textContent = m+':'+s;
  }, 1000);

  function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }

  function addTranscriptLine(speaker, text) {
    const box = document.getElementById('transcript');
    const existing = box.querySelector('em');
    if (existing) existing.parentElement.innerHTML = '';
    const line = document.createElement('div');
    line.className = 'transcript-line';
    line.innerHTML = `<span class="speaker">${speaker}:</span> ${text}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  function startAudio() {
    setTimeout(() => {
      document.getElementById('tile-host').classList.add('speaking');
      const msg = "Hi everyone, today's meeting will move to room four zero seven. Please make note of that.";
      speak(msg);
      addTranscriptLine('Jordan M. (Host)', "Hi everyone, today's meeting will move to room four zero seven. Please make note of that.");
      setTimeout(() => document.getElementById('tile-host').classList.remove('speaking'), 5000);
    }, 5000);
  }

  function replayAudio() {
    document.getElementById('tile-host').classList.add('speaking');
    const msg = "Hi everyone, today's meeting will move to room four zero seven. Please make note of that.";
    speak(msg);
    setTimeout(() => document.getElementById('tile-host').classList.remove('speaking'), 5000);
  }

  function submitAnswer() {
    const val = document.getElementById('room-input').value.trim();
    const msg = document.getElementById('result-msg');
    if (val.includes('407')) {
      taskResult = 'correct_room';
      msg.className = 'result-msg success';
      msg.textContent = 'Correct! Room 407 recorded.';
    } else {
      taskResult = 'wrong_room';
      msg.className = 'result-msg error';
      msg.textContent = 'Incorrect room number. Listen again.';
    }
  }

  startAudio();
</script>
</body>
</html>
