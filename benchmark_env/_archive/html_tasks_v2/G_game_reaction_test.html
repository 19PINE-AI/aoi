<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #e0e0e0;
    user-select: none;
  }
  .container { text-align: center; }
  h1 { font-size: 28px; font-weight: 700; color: #a0c4ff; margin-bottom: 8px; }
  .desc { font-size: 15px; color: #888; margin-bottom: 36px; }
  #stage {
    width: 400px;
    height: 300px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
  }
  #stage.waiting {
    background: #16213e;
    border: 3px solid #0f3460;
  }
  #stage.countdown {
    background: #1a1a2e;
    border: 3px solid #0f3460;
  }
  #stage.go {
    background: #1a4a20;
    border: 3px solid #3fb950;
    animation: goPulse 0.4s ease-out;
  }
  @keyframes goPulse {
    0% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  #stage.false-start {
    background: #4a1a1a;
    border: 3px solid #f72585;
  }
  #stage.done {
    background: #1e2a4a;
    border: 3px solid #a0c4ff;
  }
  .stage-msg {
    font-size: 22px;
    font-weight: 700;
    color: #e0e0e0;
    margin-bottom: 12px;
  }
  .stage-sub { font-size: 14px; color: #888; }
  .countdown-num {
    font-size: 80px;
    font-weight: 900;
    color: #f0a500;
    line-height: 1;
  }
  .go-text {
    font-size: 72px;
    font-weight: 900;
    color: #3fb950;
    text-shadow: 0 0 30px rgba(63,185,80,0.6);
  }
  .result-ms {
    font-size: 48px;
    font-weight: 900;
    color: #a0c4ff;
    margin-bottom: 6px;
  }
  .result-label { font-size: 16px; color: #7eb8d4; font-weight: 600; }
  .false-text {
    font-size: 26px;
    font-weight: 700;
    color: #f72585;
  }
  .rating {
    font-size: 14px;
    color: #888;
    margin-top: 10px;
  }
  #startBtn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 8px;
  }
  #startBtn:hover { opacity: 0.9; }
  .history { margin-top: 14px; font-size: 13px; color: #555; }
</style>
</head>
<body>
<div class="container">
  <h1>Reaction Time Test</h1>
  <p class="desc">Wait for green, then click as fast as possible!</p>

  <div id="stage" class="waiting" onclick="onStageClick()">
    <div class="stage-msg" id="stageMsg">Click Start to begin</div>
    <div class="stage-sub" id="stageSub">Test your reflexes</div>
  </div>

  <button id="startBtn" onclick="startTest()">Start Test</button>
  <div class="history" id="history"></div>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  let phase = 'idle'; // idle | countdown | waiting | go | done | false-start
  let countdownVal = 3;
  let countdownTimer = null;
  let waitTimer = null;
  let goStartTime = null;
  let attempts = [];

  const stage = document.getElementById('stage');
  const msg = document.getElementById('stageMsg');
  const sub = document.getElementById('stageSub');

  function startTest() {
    clearAll();
    phase = 'countdown';
    countdownVal = 3;
    stage.className = 'countdown';
    document.getElementById('startBtn').style.display = 'none';
    runCountdown();
  }

  function runCountdown() {
    msg.innerHTML = `<div class="countdown-num">${countdownVal}</div>`;
    sub.textContent = 'Get ready...';
    if (countdownVal <= 0) {
      startWaiting();
    } else {
      countdownVal--;
      countdownTimer = setTimeout(runCountdown, 1000);
    }
  }

  function startWaiting() {
    phase = 'waiting';
    stage.className = 'waiting';
    msg.innerHTML = '<div class="stage-msg">Waiting...</div>';
    sub.textContent = 'Don\'t click yet!';
    // Random delay 2-4 seconds
    const delay = 2000 + Math.random() * 2000;
    waitTimer = setTimeout(showGo, delay);
  }

  function showGo() {
    phase = 'go';
    stage.className = 'go';
    msg.innerHTML = '<div class="go-text">CLICK!</div>';
    sub.textContent = '';
    goStartTime = performance.now();
  }

  function onStageClick() {
    if (phase === 'waiting') {
      // False start
      clearTimeout(waitTimer);
      phase = 'false-start';
      stage.className = 'false-start';
      msg.innerHTML = '<div class="false-text">False Start!</div>';
      sub.textContent = 'Wait for the green button!';
      setTimeout(() => {
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('startBtn').textContent = 'Try Again';
        phase = 'idle';
        stage.className = 'waiting';
        msg.className = 'stage-msg';
        msg.textContent = 'Click Start to begin';
        sub.textContent = 'Test your reflexes';
      }, 1500);
    } else if (phase === 'go') {
      const rt = Math.round(performance.now() - goStartTime);
      phase = 'done';
      taskResult = 'reaction_recorded_' + rt;
      attempts.push(rt);
      stage.className = 'done';
      msg.innerHTML = `<div class="result-ms">${rt}ms</div><div class="result-label">Your reaction time</div>`;
      const rating = rt < 200 ? 'Elite!' : rt < 300 ? 'Great!' : rt < 400 ? 'Good' : 'Average';
      sub.innerHTML = `<span class="rating">Rating: ${rating}</span>`;
      updateHistory();
      setTimeout(() => {
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('startBtn').textContent = 'Try Again';
      }, 1000);
    }
  }

  function updateHistory() {
    const el = document.getElementById('history');
    if (attempts.length > 1) {
      const avg = Math.round(attempts.reduce((a,b)=>a+b,0) / attempts.length);
      el.textContent = `Attempts: ${attempts.join('ms, ')}ms — Average: ${avg}ms`;
    } else if (attempts.length === 1) {
      el.textContent = '';
    }
  }

  function clearAll() {
    clearTimeout(countdownTimer);
    clearTimeout(waitTimer);
  }
</script>
</body>
</html>
