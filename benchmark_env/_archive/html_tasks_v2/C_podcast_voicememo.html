<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Memo — Alice</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1c1c1e;
    color: #f2f2f7;
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }

  .ios-shell {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* iOS-style top bar */
  .ios-header {
    text-align: center;
    padding: 8px 0;
  }
  .ios-header h2 { font-size: 22px; font-weight: 700; color: #f2f2f7; }
  .ios-header p { font-size: 13px; color: #8e8e93; margin-top: 2px; }

  /* Voice Memos card */
  .memo-card {
    background: #2c2c2e;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .memo-header {
    background: #1c1c1e;
    padding: 16px 18px;
    border-bottom: 0.5px solid #3a3a3c;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .memo-icon {
    width: 48px; height: 48px;
    background: #ff3b30;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .memo-info { flex: 1; }
  .memo-title { font-size: 17px; font-weight: 600; color: #f2f2f7; margin-bottom: 2px; }
  .memo-date { font-size: 12px; color: #8e8e93; }
  .memo-duration { font-size: 12px; color: #8e8e93; }

  /* Waveform visualizer */
  .waveform-section {
    padding: 16px 18px;
    background: #2c2c2e;
  }
  .waveform {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 50px;
    margin-bottom: 10px;
  }
  .wbar {
    flex: 1;
    background: #3a3a3c;
    border-radius: 2px;
    min-height: 3px;
    max-height: 50px;
    transition: background 0.2s;
  }
  .wbar.played { background: #ff3b30; }
  .wbar.active { background: #ff6961; animation: wavePulse 0.2s ease; }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .prog-time { font-size: 12px; color: #8e8e93; font-variant-numeric: tabular-nums; }
  .prog-track {
    flex: 1;
    background: #3a3a3c;
    border-radius: 3px;
    height: 4px;
    position: relative;
  }
  .prog-fill { background: #ff3b30; height: 100%; border-radius: 3px; width: 0%; transition: width 0.5s linear; }

  .controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding-bottom: 4px;
  }
  .ctrl-btn {
    background: none; border: none; color: #aeaeb2; font-size: 22px;
    cursor: pointer; padding: 4px; transition: color 0.2s;
  }
  .ctrl-btn:hover { color: #f2f2f7; }
  .big-btn {
    width: 56px; height: 56px;
    background: #ff3b30;
    border-radius: 50%;
    border: none;
    font-size: 22px;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(255,59,48,0.4);
    transition: transform 0.1s;
  }
  .big-btn:active { transform: scale(0.95); }

  /* Answer form */
  .answer-card {
    background: #2c2c2e;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .answer-card h4 { font-size: 15px; font-weight: 600; color: #f2f2f7; margin-bottom: 14px; }
  .field-group { margin-bottom: 12px; }
  .field-label { font-size: 12px; color: #8e8e93; margin-bottom: 5px; display: block; }
  input[type="text"] {
    width: 100%;
    background: #1c1c1e;
    border: 0.5px solid #3a3a3c;
    border-radius: 10px;
    color: #f2f2f7;
    padding: 10px 14px;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #ff3b30; }
  .btn-row { display: flex; gap: 10px; margin-top: 14px; }
  .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; font-family: inherit; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #ff3b30; color: #fff; }
  .btn-replay  { background: #3a3a3c; color: #f2f2f7; }
  .result-msg { margin-top: 12px; font-size: 13px; padding: 10px 14px; border-radius: 10px; display: none; }
  .result-msg.success { background: #1a3a1a; color: #34c759; display: block; }
  .result-msg.error   { background: #3a1a1a; color: #ff453a; display: block; }
</style>
</head>
<body>
<div class="ios-shell">
  <div class="ios-header">
    <h2>Voice Memos</h2>
    <p>Received memo · Extract key information</p>
  </div>

  <div class="memo-card">
    <div class="memo-header">
      <div class="memo-icon">🎙</div>
      <div class="memo-info">
        <div class="memo-title">Budget Review Reminder</div>
        <div class="memo-date">Today at 9:14 AM · <span id="dur-display">0:28</span></div>
      </div>
    </div>

    <div class="waveform-section">
      <div class="waveform" id="waveform"></div>
      <div class="progress-row">
        <span class="prog-time" id="t-elapsed">0:00</span>
        <div class="prog-track">
          <div class="prog-fill" id="prog-fill"></div>
        </div>
        <span class="prog-time">0:28</span>
      </div>
      <div class="controls-row">
        <button class="ctrl-btn" title="Skip back">⟨⟨15</button>
        <button class="big-btn" id="play-btn">▶</button>
        <button class="ctrl-btn" onclick="replayAudio()">↺</button>
      </div>
    </div>
  </div>

  <div class="answer-card">
    <h4>Extract Information from Memo</h4>
    <div class="field-group">
      <label class="field-label" for="name-input">Sender Name:</label>
      <input type="text" id="name-input" placeholder="Who sent this memo?" />
    </div>
    <div class="field-group">
      <label class="field-label" for="subject-input">Subject / Topic:</label>
      <input type="text" id="subject-input" placeholder="What is it about?" />
    </div>
    <div class="field-group">
      <label class="field-label" for="deadline-input">Deadline:</label>
      <input type="text" id="deadline-input" placeholder="When is the deadline?" />
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="submitAnswer()">Submit</button>
      <button class="btn btn-replay" onclick="replayAudio()">&#9654; Replay</button>
    </div>
    <div class="result-msg" id="result-msg"></div>
  </div>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const wf = document.getElementById('waveform');
  const bars = [];
  for (let i = 0; i < 48; i++) {
    const b = document.createElement('div');
    b.className = 'wbar';
    // Generate a natural-looking waveform
    const h = 4 + 18 * Math.abs(Math.sin(i * 0.4)) + 8 * Math.abs(Math.sin(i * 1.1));
    b.style.height = Math.round(h) + 'px';
    wf.appendChild(b);
    bars.push(b);
  }

  let waveInterval = null;
  let elapsed = 0;
  const duration = 28;
  let playing = false;

  function startWave() {
    playing = true;
    document.getElementById('play-btn').textContent = '⏸';
    let barIdx = 0;
    waveInterval = setInterval(() => {
      // Animate waveform playhead
      const progress = elapsed / duration;
      const playheadBar = Math.floor(progress * bars.length);
      bars.forEach((b, i) => {
        if (i < playheadBar) b.className = 'wbar played';
        else if (i === playheadBar) { b.className = 'wbar active'; b.style.height = (6 + Math.random() * 40) + 'px'; }
        else b.className = 'wbar';
      });

      elapsed++;
      const pct = Math.min((elapsed / duration) * 100, 100);
      document.getElementById('prog-fill').style.width = pct + '%';
      const m = Math.floor(elapsed / 60);
      const s = String(elapsed % 60).padStart(2,'0');
      document.getElementById('t-elapsed').textContent = `${m}:${s}`;
      if (elapsed >= duration) stopWave();
    }, 1000);
  }

  function stopWave() {
    playing = false;
    if (waveInterval) clearInterval(waveInterval);
    waveInterval = null;
    document.getElementById('play-btn').textContent = '▶';
  }

  function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.85;
    u.onend = stopWave;
    window.speechSynthesis.speak(u);
  }

  function doAudio() {
    startWave();
    speak("Hi, this is Alice. I'm sending this voice memo about the budget review that's coming up. I need everyone's input on the Q3 figures. The deadline for your submissions is this Friday. Again — this is Alice, budget review, Friday deadline. Thanks.");
  }

  function replayAudio() {
    elapsed = 0;
    bars.forEach(b => { b.className = 'wbar'; });
    document.getElementById('prog-fill').style.width = '0%';
    document.getElementById('t-elapsed').textContent = '0:00';
    stopWave();
    doAudio();
  }

  document.getElementById('play-btn').addEventListener('click', () => {
    if (playing) { stopWave(); window.speechSynthesis.cancel(); }
    else doAudio();
  });

  function submitAnswer() {
    const name = document.getElementById('name-input').value.toLowerCase();
    const subject = document.getElementById('subject-input').value.toLowerCase();
    const deadline = document.getElementById('deadline-input').value.toLowerCase();
    const combined = name + ' ' + subject + ' ' + deadline;
    const msg = document.getElementById('result-msg');

    const hasAlice = combined.includes('alice');
    const hasFridayOrBudget = combined.includes('friday') || combined.includes('budget');

    if (hasAlice && hasFridayOrBudget) {
      taskResult = 'memo_extracted';
      msg.className = 'result-msg success';
      msg.textContent = 'Memo extracted correctly!';
    } else {
      taskResult = 'memo_incomplete';
      msg.className = 'result-msg error';
      const missing = [];
      if (!hasAlice) missing.push("sender name (Alice)");
      if (!hasFridayOrBudget) missing.push("deadline (Friday) or subject (budget)");
      msg.textContent = 'Missing: ' + missing.join(', ');
    }
  }

  setTimeout(doAudio, 2000);
</script>
</body>
</html>
