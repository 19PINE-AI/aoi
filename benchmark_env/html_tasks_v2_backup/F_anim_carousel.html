<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DynaCU-Bench F-E1: Image Carousel</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #1a1a2e; color: white; }
    #carousel { position: relative; width: 800px; margin: 40px auto; overflow: hidden; border-radius: 12px; }
    .slide { display: none; width: 100%; height: 450px; align-items: center; justify-content: center; flex-direction: column; font-size: 36px; font-weight: bold; }
    .slide.active { display: flex; }
    .slide-1 { background: linear-gradient(135deg, #667eea, #764ba2); }
    .slide-2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .slide-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .slide-4 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .slide-subtitle { font-size: 18px; margin-top: 10px; opacity: 0.9; }
    .slide-btn { margin-top: 20px; padding: 12px 30px; font-size: 16px; border: 2px solid white; background: transparent; color: white; border-radius: 6px; cursor: pointer; }
    .slide-btn:hover { background: rgba(255,255,255,0.2); }
    .dots { text-align: center; margin: 15px; }
    .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #555; margin: 4px; cursor: pointer; }
    .dot.active { background: white; }
    #result { text-align: center; margin: 20px; font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="carousel">
    <div class="slide slide-1 active">
      🌸 Spring Collection
      <div class="slide-subtitle">New arrivals every week</div>
      <button class="slide-btn" onclick="clickSlide('spring')">Shop Now</button>
    </div>
    <div class="slide slide-2">
      ❄️ Winter Sale
      <div class="slide-subtitle">Up to 60% off everything</div>
      <button class="slide-btn" id="winter-btn" onclick="clickSlide('winter')">Shop Now</button>
    </div>
    <div class="slide slide-3">
      ☀️ Summer Essentials
      <div class="slide-subtitle">Beat the heat in style</div>
      <button class="slide-btn" onclick="clickSlide('summer')">Shop Now</button>
    </div>
    <div class="slide slide-4">
      🍂 Autumn Picks
      <div class="slide-subtitle">Warm tones for cool days</div>
      <button class="slide-btn" onclick="clickSlide('autumn')">Shop Now</button>
    </div>
  </div>
  <div class="dots" id="dots"></div>
  <div id="result" data-testid="result"></div>

  <script>
    let current = 0;
    let taskResult = 'pending';
    const slides = document.querySelectorAll('.slide');
    const dotsEl = document.getElementById('dots');

    slides.forEach((_, i) => {
      const d = document.createElement('span');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.onclick = () => goTo(i);
      dotsEl.appendChild(d);
    });

    function goTo(n) {
      slides[current].classList.remove('active');
      document.querySelectorAll('.dot')[current].classList.remove('active');
      current = n % slides.length;
      slides[current].classList.add('active');
      document.querySelectorAll('.dot')[current].classList.add('active');
    }

    // Auto-advance every 3 seconds
    setInterval(() => goTo(current + 1), 3000);

    function clickSlide(which) {
      taskResult = which + '_clicked';
      const result = document.getElementById('result');
      if (which === 'winter') {
        result.textContent = '✓ SUCCESS: Clicked "Shop Now" on Winter Sale slide';
        result.setAttribute('data-result', 'shop_now_clicked');
      } else {
        result.textContent = `Clicked on ${which} slide (expected Winter Sale)`;
        result.setAttribute('data-result', which + '_clicked');
      }
    }
    window.getTaskResult = () => taskResult;
  </script>
</body>
</html>
