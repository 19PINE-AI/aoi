<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<title>DynaCU-Real: R_cast1_git.html</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, sans-serif; max-width: 760px; margin: 30px auto; padding: 0 20px; color: #1a1a2e; }
  h1 { font-size: 22px; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 18px; margin-bottom: 14px; }
  .instructions { background: #eef2ff; border-left: 4px solid #4f46e5; padding: 12px; border-radius: 0 6px 6px 0; }
  input[type=text] { width: 100%; padding: 8px 12px; font-size: 15px; border: 2px solid #ddd; border-radius: 6px; }
  button { padding: 10px 22px; background: #4f46e5; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
  audio, video { width: 100%; margin: 10px 0; }
  .source { color: #888; font-size: 12px; margin-top: 6px; }
</style></head><body>
<div class="instructions">Watch the terminal recording. Type the FIRST git subcommand executed. (e.g., clone, status, commit)</div><asciinema-player src="../realcontent_assets/asciinema_git_clone.cast" autoplay style="max-width:760px"></asciinema-player><script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.7.0/dist/bundle/asciinema-player.min.js"></script><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/asciinema-player@3.7.0/dist/bundle/asciinema-player.min.css"><input type="text" id="ans"><button id="b">Submit</button>
<script>
(function() {
  // Auto-play with system speaker so AOI's PulseAudio pipeline captures it.
  window.addEventListener('load', () => {
    const m = document.querySelector('audio, video');
    if (m) { m.muted = false; const p = m.play(); if (p) p.catch(()=>{}); }
  });
  document.getElementById("b").onclick=()=>{};window.getTaskResult=()=>{const v=document.getElementById("ans").value.trim().toLowerCase(); return v==="clone"?"clone_correct":"incorrect";};
})();
</script></body></html>
