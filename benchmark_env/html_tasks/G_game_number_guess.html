<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Guessing Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .game-card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 48px;
    width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 12px; }
  h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
  .desc { font-size: 14px; color: #888; margin-bottom: 28px; }
  .tries-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .try-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #764ba2;
    transition: background 0.3s;
  }
  .try-dot.used { background: #ddd; }
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  input[type="number"] {
    flex: 1;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 20px;
    text-align: center;
    outline: none;
    color: #333;
  }
  input[type="number"]:focus { border-color: #764ba2; }
  input[type="number"]:disabled { background: #f5f5f5; color: #aaa; }
  button#guessBtn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  button#guessBtn:hover { opacity: 0.9; }
  button#guessBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .feedback-box {
    min-height: 60px;
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.3s;
  }
  .fb-high { background: #fff3e0; color: #e65100; border: 1.5px solid #ffcc80; }
  .fb-low  { background: #e3f2fd; color: #0d47a1; border: 1.5px solid #90caf9; }
  .fb-correct { background: #e8f5e9; color: #1b5e20; border: 1.5px solid #a5d6a7; }
  .fb-over { background: #fce4ec; color: #880e4f; border: 1.5px solid #f48fb1; }
  .fb-empty { background: #f5f5f5; border: 1.5px solid #e0e0e0; color: #aaa; }
  .history { margin-bottom: 16px; text-align: left; }
  .history-item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 5px 10px;
    border-radius: 6px;
    margin-bottom: 4px;
  }
  .hint-box {
    background: #f3e5f5;
    border: 1.5px solid #ce93d8;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 14px;
    color: #6a1b9a;
    font-weight: 600;
    margin-bottom: 16px;
    display: none;
  }
  .range-label { font-size: 13px; color: #bbb; margin-bottom: 16px; }
  #resetBtn {
    background: #f5f5f5;
    color: #555;
    border: 1px solid #ddd;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 4px;
  }
  #resetBtn:hover { background: #eee; }
</style>
</head>
<body>
<div class="game-card">
  <div class="icon">🤔</div>
  <h1>Guess My Number</h1>
  <p class="desc">I'm thinking of a number between 1 and 100. Can you guess it in 3 tries?</p>
  <div class="range-label">Range: 1 – 100</div>
  <div class="tries-row" id="triesDots">
    <div class="try-dot" id="dot0"></div>
    <div class="try-dot" id="dot1"></div>
    <div class="try-dot" id="dot2"></div>
  </div>
  <div class="history" id="history"></div>
  <div class="hint-box" id="hintBox">💡 Hint: The number is between 40 and 45</div>
  <div class="feedback-box fb-empty" id="feedbackBox">Make your first guess!</div>
  <div class="input-row">
    <input type="number" id="guessInput" min="1" max="100" placeholder="1-100" />
    <button id="guessBtn" onclick="makeGuess()">Guess</button>
  </div>
  <button id="resetBtn" onclick="resetGame()">Play Again</button>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const SECRET = 42;
  let triesLeft = 3;
  let triesUsed = 0;

  document.getElementById('guessInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') makeGuess();
  });

  function makeGuess() {
    if (triesLeft <= 0) return;
    const input = document.getElementById('guessInput');
    const val = parseInt(input.value);
    if (isNaN(val) || val < 1 || val > 100) {
      document.getElementById('feedbackBox').textContent = 'Please enter a number between 1 and 100!';
      document.getElementById('feedbackBox').className = 'feedback-box fb-empty';
      return;
    }

    // Use a try
    document.getElementById('dot' + triesUsed).classList.add('used');
    triesUsed++;
    triesLeft--;

    // History
    const histItem = document.createElement('div');
    histItem.className = 'history-item';
    let fbClass, fbText, fbIcon;

    if (val === SECRET) {
      fbClass = 'fb-correct'; fbText = 'Correct! 🎉 The number was 42!'; fbIcon = '✅';
      taskResult = 'number_guessed';
      document.getElementById('guessBtn').disabled = true;
      input.disabled = true;
      histItem.style.background = '#e8f5e9';
    } else if (val > SECRET) {
      fbClass = 'fb-high'; fbText = 'Too high! Try a lower number.'; fbIcon = '⬇️';
    } else {
      fbClass = 'fb-low'; fbText = 'Too low! Try a higher number.'; fbIcon = '⬆️';
    }

    histItem.innerHTML = `<span>Guess #${triesUsed}: <b>${val}</b></span><span>${fbIcon}</span>`;
    document.getElementById('history').appendChild(histItem);
    document.getElementById('feedbackBox').textContent = fbText;
    document.getElementById('feedbackBox').className = 'feedback-box ' + fbClass;
    input.value = '';

    // Hint after 2 wrong guesses
    if (triesUsed >= 2 && taskResult !== 'number_guessed') {
      document.getElementById('hintBox').style.display = 'block';
    }

    // Game over
    if (triesLeft <= 0 && taskResult !== 'number_guessed') {
      taskResult = 'game_over';
      document.getElementById('feedbackBox').textContent = `Game over! The number was ${SECRET}.`;
      document.getElementById('feedbackBox').className = 'feedback-box fb-over';
      document.getElementById('guessBtn').disabled = true;
      input.disabled = true;
    }
  }

  function resetGame() {
    taskResult = 'pending';
    triesLeft = 3;
    triesUsed = 0;
    for (let i = 0; i < 3; i++) document.getElementById('dot' + i).classList.remove('used');
    document.getElementById('history').innerHTML = '';
    document.getElementById('hintBox').style.display = 'none';
    document.getElementById('feedbackBox').textContent = 'Make your first guess!';
    document.getElementById('feedbackBox').className = 'feedback-box fb-empty';
    document.getElementById('guessBtn').disabled = false;
    document.getElementById('guessInput').disabled = false;
    document.getElementById('guessInput').value = '';
  }
</script>
</body>
</html>
