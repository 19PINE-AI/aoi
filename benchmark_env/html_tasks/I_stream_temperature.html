<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .monitor-card { background: #1e293b; border-radius: 16px; width: 700px; padding: 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  .monitor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .monitor-header h2 { color: #f1f5f9; font-size: 1rem; }
  .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
  .status-normal { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
  .status-warning { background: #451a03; color: #fb923c; border: 1px solid #ea580c; animation: blink 0.8s infinite; }
  .status-alert { background: #3d0f0a; color: #f87171; border: 1px solid #dc2626; animation: blink 0.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .temp-display { display: flex; align-items: center; gap: 40px; margin-bottom: 24px; }
  .thermometer-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .thermometer { width: 40px; height: 180px; background: #0f172a; border-radius: 20px; border: 2px solid #334155; position: relative; overflow: hidden; }
  .thermo-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #ef4444, #f97316); border-radius: 20px; transition: height 0.8s ease; }
  .thermo-bulb { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; border-radius: 50%; background: #ef4444; border: 2px solid #334155; }
  .thermo-mark { position: absolute; right: -24px; font-size: 0.6rem; color: #64748b; }
  .thermo-threshold { position: absolute; left: 0; right: 0; height: 2px; background: #ef4444; opacity: 0.7; }
  .current-temp { flex: 1; }
  .temp-value { font-size: 5rem; font-weight: 900; color: #38bdf8; line-height: 1; transition: color 0.5s; font-family: monospace; }
  .temp-value.warning { color: #fb923c; }
  .temp-value.alert { color: #f87171; }
  .temp-unit { font-size: 2rem; color: #64748b; margin-left: 4px; }
  .temp-label { color: #64748b; font-size: 0.85rem; margin-top: 4px; }
  .threshold-info { background: rgba(239,68,68,0.1); border: 1px dashed #dc2626; border-radius: 8px; padding: 8px 16px; margin-top: 8px; color: #f87171; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
  /* Graph */
  .graph-area { background: #0f172a; border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  .graph-area h3 { color: #64748b; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  canvas { width: 100%; height: 120px; display: block; }
  .alert-btn { width: 100%; background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; border: none; border-radius: 12px; padding: 18px; font-size: 1.1rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 20px rgba(220,38,38,0.4); transition: all 0.2s; }
  .alert-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(220,38,38,0.5); }
  .alert-btn:active { transform: scale(0.98); }
  .result-msg { margin-top: 16px; padding: 14px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; display: none; text-align: center; }
  .result-success { background: rgba(22,163,74,0.15); border: 1px solid #22c55e; color: #4ade80; }
  .result-premature { background: rgba(245,158,11,0.1); border: 1px solid #f59e0b; color: #fbbf24; }
  .btn-restart { background: #334155; color: #94a3b8; border: none; border-radius: 8px; padding: 10px 20px; font-size: 0.85rem; cursor: pointer; margin-top: 12px; width: 100%; }
</style>
</head>
<body>
<div class="monitor-card">
  <div class="monitor-header">
    <h2>🌡️ Environmental Monitor — Room 3B</h2>
    <span class="status-badge status-normal" id="statusBadge">Normal</span>
  </div>

  <div class="temp-display">
    <div class="thermometer-wrap">
      <div class="thermometer" id="thermo">
        <div class="thermo-fill" id="thermoFill" style="height:40%"></div>
        <div class="thermo-mark" style="bottom:60%">37°</div>
        <div class="thermo-threshold" style="bottom:60%"></div>
      </div>
      <div class="thermo-bulb"></div>
      <span style="color:#64748b;font-size:0.72rem">Temp</span>
    </div>
    <div class="current-temp">
      <div>
        <span class="temp-value" id="tempValue">34.0</span><span class="temp-unit">°C</span>
      </div>
      <div class="temp-label">Current temperature</div>
      <div class="threshold-info">
        <span>⚠</span>
        <span>Alert threshold: <strong>37.0°C</strong> — Click Alert button when exceeded!</span>
      </div>
    </div>
  </div>

  <div class="graph-area">
    <h3>Temperature History</h3>
    <canvas id="tempChart" height="120"></canvas>
  </div>

  <button class="alert-btn" onclick="triggerAlert()">🚨 Trigger Alert</button>
  <div class="result-msg" id="resultMsg"></div>
  <button class="btn-restart" onclick="restartMonitor()">Restart Monitor</button>
</div>

<script>
let taskResult = 'pending';
window.getTaskResult = () => taskResult;

const temps = [34.0, 34.7, 35.4, 36.1, 36.8, 37.5, 38.1, 38.6];
let tempIdx = 0;
let intervalId = null;
let alerted = false;
const history = [34.0];

function getColor(t) {
  if (t > 37) return '#f87171';
  if (t > 36.5) return '#fb923c';
  return '#38bdf8';
}

function updateThermo(t) {
  const pct = Math.max(0, Math.min(100, ((t - 30) / 15 * 100)));
  document.getElementById('thermoFill').style.height = pct + '%';
  document.getElementById('thermoFill').style.background = t > 37
    ? 'linear-gradient(to top, #dc2626, #ef4444)'
    : t > 36.5
    ? 'linear-gradient(to top, #ea580c, #f97316)'
    : 'linear-gradient(to top, #0ea5e9, #38bdf8)';
}

function updateStatus(t) {
  const badge = document.getElementById('statusBadge');
  const tempEl = document.getElementById('tempValue');
  if (t > 37) {
    badge.className = 'status-badge status-alert';
    badge.textContent = '🔴 ALERT';
    tempEl.className = 'temp-value alert';
  } else if (t > 36.5) {
    badge.className = 'status-badge status-warning';
    badge.textContent = '⚠ Warning';
    tempEl.className = 'temp-value warning';
  } else {
    badge.className = 'status-badge status-normal';
    badge.textContent = 'Normal';
    tempEl.className = 'temp-value';
  }
}

function drawChart() {
  const canvas = document.getElementById('tempChart');
  canvas.width = canvas.offsetWidth || 600;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = h - (i / 4) * h;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  // Threshold line at 37°C
  const threshY = h - ((37 - 33) / 7 * h);
  ctx.strokeStyle = '#dc2626';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(0, threshY);
  ctx.lineTo(w, threshY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#f87171';
  ctx.font = '10px sans-serif';
  ctx.fillText('37°C', w - 36, threshY - 3);

  if (history.length < 2) return;
  const step = w / (temps.length - 1);

  // Area
  ctx.beginPath();
  history.forEach((t, i) => {
    const x = i * step;
    const y = h - ((t - 33) / 7 * h);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.lineTo((history.length - 1) * step, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = 'rgba(56,189,248,0.1)';
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.lineWidth = 2.5;
  history.forEach((t, i) => {
    const x = i * step;
    const y = h - ((t - 33) / 7 * h);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#38bdf8';
  ctx.stroke();

  // Dots
  history.forEach((t, i) => {
    const x = i * step;
    const y = h - ((t - 33) / 7 * h);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = getColor(t);
    ctx.fill();
  });
}

function tick() {
  if (tempIdx >= temps.length - 1) {
    clearInterval(intervalId);
    return;
  }
  tempIdx++;
  const t = temps[tempIdx];
  history.push(t);
  document.getElementById('tempValue').textContent = t.toFixed(1);
  updateThermo(t);
  updateStatus(t);
  drawChart();
}

function startMonitor() {
  const t = temps[0];
  document.getElementById('tempValue').textContent = t.toFixed(1);
  updateThermo(t);
  updateStatus(t);
  drawChart();
  intervalId = setInterval(tick, 2000);
}

function triggerAlert() {
  if (alerted) return;
  alerted = true;
  clearInterval(intervalId);

  const current = temps[tempIdx];
  const msg = document.getElementById('resultMsg');
  msg.style.display = 'block';

  if (current > 37) {
    taskResult = 'alert_triggered';
    msg.className = 'result-msg result-success';
    msg.textContent = `✓ Alert triggered correctly at ${current.toFixed(1)}°C (threshold: 37°C). Task complete!`;
  } else {
    taskResult = 'premature_alert';
    msg.className = 'result-msg result-premature';
    msg.textContent = `⚠ Premature alert! Temperature was ${current.toFixed(1)}°C (threshold 37°C not yet exceeded).`;
  }
}

function restartMonitor() {
  clearInterval(intervalId);
  tempIdx = 0;
  alerted = false;
  taskResult = 'pending';
  history.length = 0;
  history.push(34.0);
  document.getElementById('resultMsg').style.display = 'none';
  startMonitor();
}

startMonitor();
</script>
</body>
</html>
