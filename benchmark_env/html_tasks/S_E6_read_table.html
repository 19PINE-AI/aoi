<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read Table Value</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 650px; width: 100%; padding: 32px; }
  .card h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 20px; }
  .instructions { background: #eef2ff; border-left: 4px solid #4f46e5; padding: 14px 18px; border-radius: 0 8px 8px 0; margin-bottom: 24px; font-size: 14px; color: #3730a3; line-height: 1.6; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  th { background: #1a1a2e; color: #fff; padding: 12px 16px; text-align: left; font-size: 14px; font-weight: 600; }
  td { padding: 11px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
  tr:nth-child(even) { background: #fafafa; }
  label { display: block; font-size: 14px; font-weight: 600; color: #555; margin-bottom: 6px; }
  input[type="text"] { width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
  input:focus { border-color: #4f46e5; }
  .submit-btn { margin-top: 16px; padding: 12px 28px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .submit-btn:hover { background: #4338ca; }
</style>
</head>
<body>
<div class="card">
  <h1>Task: Read a Table Value</h1>
  <div class="instructions">
    Look at the table below. Find the <strong>price</strong> of <strong>"Wireless Mouse"</strong> and type it into the answer box. Then click Submit.
  </div>
  <table>
    <thead>
      <tr><th>Product</th><th>SKU</th><th>Price</th><th>Stock</th></tr>
    </thead>
    <tbody>
      <tr><td>USB Keyboard</td><td>KB-201</td><td>$29.99</td><td>142</td></tr>
      <tr><td>Wireless Mouse</td><td>MS-415</td><td>$34.50</td><td>87</td></tr>
      <tr><td>Monitor Stand</td><td>ST-008</td><td>$45.00</td><td>53</td></tr>
      <tr><td>Webcam HD</td><td>WC-330</td><td>$59.95</td><td>29</td></tr>
      <tr><td>USB Hub</td><td>HB-112</td><td>$18.75</td><td>210</td></tr>
    </tbody>
  </table>
  <label for="answerBox">Price of Wireless Mouse:</label>
  <input type="text" id="answerBox" placeholder="e.g. $29.99" autocomplete="off">
  <button class="submit-btn" id="submitBtn">Submit</button>
</div>
<script>
(function() {
  let submitted = false;
  document.getElementById('submitBtn').addEventListener('click', function() {
    submitted = true;
  });
  window.getTaskResult = function() {
    var val = document.getElementById('answerBox').value.trim();
    // Accept $34.50 or 34.50 or 34.5
    if (val === '$34.50' || val === '34.50' || val === '34.5' || val === '$34.5') return 'table_correct';
    if (val) return 'incorrect';
    return 'empty';
  };
})();
</script>
</body>
</html>
