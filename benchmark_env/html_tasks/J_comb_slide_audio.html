<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide with Audio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .presentation-wrap { width: 720px; }
  .pres-header { background: #0f0f1a; border: 1px solid #2d2d4e; border-radius: 12px 12px 0 0; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: none; }
  .pres-header-dots { display: flex; gap: 6px; }
  .phd { width: 10px; height: 10px; border-radius: 50%; }
  .pres-title { color: #8b8ba0; font-size: 0.78rem; }
  .slide-canvas { background: #fff; aspect-ratio: 16/9; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #2d2d4e; border-right: 1px solid #2d2d4e; padding: 40px; position: relative; overflow: hidden; }
  .slide-bg-accent { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, #6d28d9, #2563eb); }
  .slide-company-logo { font-size: 0.75rem; color: #94a3b8; position: absolute; top: 20px; right: 20px; font-weight: 700; letter-spacing: 1px; }
  .slide-slide-num { font-size: 0.7rem; color: #94a3b8; position: absolute; bottom: 12px; right: 20px; }
  .company-name { font-size: 3.5rem; font-weight: 900; color: #1e293b; text-align: center; letter-spacing: -2px; margin-bottom: 10px; }
  .company-name span { color: #6d28d9; }
  .company-tagline { font-size: 1rem; color: #64748b; text-align: center; }
  .decorative-bar { width: 80px; height: 4px; background: linear-gradient(90deg, #6d28d9, #2563eb); border-radius: 2px; margin: 14px auto; }
  /* Audio player */
  .audio-panel { background: #0f0f1a; border: 1px solid #2d2d4e; border-top: none; border-radius: 0 0 12px 12px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
  .play-btn { width: 36px; height: 36px; border-radius: 50%; background: #6d28d9; border: none; color: #fff; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .audio-track { flex: 1; }
  .audio-track-label { font-size: 0.72rem; color: #8b8ba0; margin-bottom: 6px; }
  .audio-progress { height: 4px; background: #2d2d4e; border-radius: 2px; overflow: hidden; }
  .audio-fill { height: 100%; background: linear-gradient(90deg, #6d28d9, #a78bfa); width: 0%; transition: width 0.5s linear; }
  .audio-waveform { display: flex; align-items: center; gap: 2px; height: 20px; margin-top: 6px; }
  .wave-bar { width: 3px; background: #6d28d9; border-radius: 2px; transition: height 0.1s; }
  .caption-box { background: #13131f; border: 1px solid #2d2d4e; border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: #c8d3f5; margin-top: 12px; min-height: 50px; font-style: italic; line-height: 1.5; }
  .caption-box .speaker-tag { color: #a78bfa; font-weight: 700; font-style: normal; font-size: 0.72rem; }
  /* Answer section */
  .answer-panel { margin-top: 20px; background: #13131f; border: 1px solid #2d2d4e; border-radius: 12px; padding: 20px; }
  .answer-panel h3 { color: #8b8ba0; font-size: 0.85rem; font-weight: 600; margin-bottom: 14px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field-row label { color: #8b8ba0; font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 4px; }
  .field-row input { width: 100%; padding: 8px 12px; background: #0f0f1a; border: 1px solid #2d2d4e; border-radius: 8px; color: #c8d3f5; font-size: 0.9rem; outline: none; }
  .field-row input:focus { border-color: #6d28d9; }
  .btn-row { display: flex; gap: 10px; }
  .btn { background: #6d28d9; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-restart { background: #2d2d4e; color: #8b8ba0; border: none; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; cursor: pointer; }
  .result-msg { font-size: 0.85rem; margin-top: 10px; font-weight: 600; display: none; }
</style>
</head>
<body>
<div class="presentation-wrap">
  <div class="pres-header">
    <div class="pres-header-dots">
      <div class="phd" style="background:#ef4444"></div>
      <div class="phd" style="background:#f59e0b"></div>
      <div class="phd" style="background:#22c55e"></div>
    </div>
    <span class="pres-title">NexusLabs_CompanyOverview_Q2.pptx — Slide 1 of 8</span>
  </div>

  <div class="slide-canvas">
    <div class="slide-bg-accent"></div>
    <div class="slide-company-logo">NL</div>
    <div class="slide-slide-num">1 / 8</div>

    <div class="company-name">Nexus <span>Labs</span></div>
    <div class="decorative-bar"></div>
    <div class="company-tagline">Pioneering the future of intelligent systems</div>
  </div>

  <div class="audio-panel">
    <button class="play-btn" id="playBtn" onclick="playAudio()">▶</button>
    <div class="audio-track">
      <div class="audio-track-label">Speaker narration — Slide 1</div>
      <div class="audio-progress"><div class="audio-fill" id="audioFill"></div></div>
      <div class="audio-waveform" id="waveform"></div>
    </div>
    <span style="color:#8b8ba0;font-size:0.75rem" id="audioTime">0:00 / 0:07</span>
  </div>

  <div class="caption-box">
    <span class="speaker-tag">SPEAKER:</span>
    <span id="captionText"> Click play to hear the presenter...</span>
  </div>
</div>

<div class="answer-panel">
  <h3>Extract the facts from the slide and audio:</h3>
  <div class="field-row">
    <div>
      <label>Company name (from slide):</label>
      <input type="text" id="companyInput" placeholder="What company is shown?" />
    </div>
    <div>
      <label>Founding year (from audio):</label>
      <input type="text" id="yearInput" placeholder="Year mentioned by speaker?" />
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="submitAnswer()">Submit</button>
    <button class="btn-restart" onclick="restartDemo()">Restart</button>
  </div>
  <div class="result-msg" id="resultMsg"></div>
</div>

<script>
let taskResult = 'pending';
window.getTaskResult = () => taskResult;

let waveId = null;
let progressId = null;
let startTime = null;
const DURATION = 8000;

function buildWaveform() {
  const wf = document.getElementById('waveform');
  wf.innerHTML = '';
  for (let i = 0; i < 40; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = '4px';
    wf.appendChild(bar);
  }
}

function animateWave() {
  const bars = document.querySelectorAll('.wave-bar');
  waveId = setInterval(() => {
    bars.forEach(b => {
      b.style.height = (2 + Math.random() * 14) + 'px';
    });
  }, 120);
}

function stopWave() {
  clearInterval(waveId);
  document.querySelectorAll('.wave-bar').forEach(b => b.style.height = '4px');
}

function playAudio() {
  document.getElementById('playBtn').textContent = '⏸';
  document.getElementById('playBtn').disabled = true;
  startTime = Date.now();
  animateWave();

  const text = "Nexus Labs was founded back in twenty nineteen, and since then we've grown to over 200 employees across four continents.";
  document.getElementById('captionText').textContent = ' ' + text;

  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92;
  utt.onend = () => {
    stopWave();
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('playBtn').disabled = false;
    document.getElementById('audioFill').style.width = '100%';
    document.getElementById('audioTime').textContent = '0:08 / 0:08';
    clearInterval(progressId);
  };
  window.speechSynthesis.speak(utt);

  progressId = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const pct = Math.min(100, (elapsed / DURATION * 100));
    document.getElementById('audioFill').style.width = pct + '%';
    const secs = Math.min(8, Math.floor(elapsed / 1000));
    document.getElementById('audioTime').textContent = `0:0${secs} / 0:08`;
  }, 200);
}

function restartDemo() {
  window.speechSynthesis.cancel();
  stopWave();
  clearInterval(progressId);
  taskResult = 'pending';
  document.getElementById('companyInput').value = '';
  document.getElementById('yearInput').value = '';
  document.getElementById('resultMsg').style.display = 'none';
  document.getElementById('audioFill').style.width = '0%';
  document.getElementById('audioTime').textContent = '0:00 / 0:08';
  document.getElementById('captionText').textContent = ' Click play to hear the presenter...';
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playBtn').disabled = false;
}

function submitAnswer() {
  const company = document.getElementById('companyInput').value.toLowerCase();
  const year = document.getElementById('yearInput').value;
  const msg = document.getElementById('resultMsg');
  if (company.includes('nexus') && (year.includes('2019') || year === '19')) {
    taskResult = 'facts_extracted';
    msg.style.color = '#4ade80';
    msg.textContent = 'Correct! Company: Nexus Labs (visible on slide) + Founded: 2019 (mentioned in audio).';
  } else {
    taskResult = 'incorrect';
    msg.style.color = '#f87171';
    msg.textContent = 'Incorrect. Read the company name from the slide and listen for the founding year in the audio.';
  }
  msg.style.display = 'block';
}

buildWaveform();
</script>
</body>
</html>
