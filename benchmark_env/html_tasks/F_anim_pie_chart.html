<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f2f5;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .dashboard {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 32px;
    width: 620px;
  }
  h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  .chart-panel {
    display: flex;
    gap: 32px;
    align-items: center;
    margin-bottom: 28px;
  }
  canvas { flex-shrink: 0; }
  .legend { flex: 1; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    font-size: 14px;
  }
  .swatch {
    width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
  }
  .legend-label { color: #333; font-weight: 600; }
  .legend-pct { color: #888; margin-left: auto; font-size: 13px; }
  .answer-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 8px;
  }
  label { font-size: 14px; color: #333; font-weight: 600; white-space: nowrap; }
  input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #d0d0d0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  input[type="text"]:focus { border-color: #4361ee; }
  button {
    background: #4361ee;
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #3451d1; }
  #feedback { margin-top: 12px; font-size: 14px; min-height: 20px; font-weight: 600; }
  .correct { color: #2ecc71; }
  .wrong { color: #e74c3c; }
</style>
</head>
<body>
<div class="dashboard">
  <h1>Revenue Analytics Q4</h1>
  <p class="subtitle">Quarterly breakdown — animated chart</p>
  <div class="chart-panel">
    <canvas id="pie" width="220" height="220"></canvas>
    <div class="legend" id="legend"></div>
  </div>
  <div class="answer-row">
    <label>Largest segment:</label>
    <input type="text" id="answer" placeholder="Type segment name..." />
    <button onclick="submitAnswer()">Submit</button>
  </div>
  <div id="feedback"></div>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const segments = [
    { label: 'Revenue',      pct: 45, color: '#4361ee' },
    { label: 'Expenses',     pct: 28, color: '#f72585' },
    { label: 'Profit',       pct: 18, color: '#7209b7' },
    { label: 'Reinvestment', pct:  9, color: '#4cc9f0' },
  ];

  const canvas = document.getElementById('pie');
  const ctx = canvas.getContext('2d');
  const cx = 110, cy = 110, r = 95;
  const ANIM_DURATION = 6000;
  let startTime = null;

  function buildLegend() {
    const el = document.getElementById('legend');
    segments.forEach(s => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `
        <div class="swatch" style="background:${s.color}"></div>
        <span class="legend-label">${s.label}</span>
        <span class="legend-pct">${s.pct}%</span>`;
      el.appendChild(item);
    });
  }

  function drawPie(progress) {
    ctx.clearRect(0, 0, 220, 220);
    let startAngle = -Math.PI / 2;
    const total = progress; // 0..100
    let drawn = 0;

    for (let i = 0; i < segments.length; i++) {
      const seg = segments[i];
      const segFraction = seg.pct / 100;
      const available = total / 100 - drawn;
      if (available <= 0) break;
      const thisFrac = Math.min(segFraction, available);
      drawn += thisFrac;

      const sweep = thisFrac * 2 * Math.PI;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAngle, startAngle + sweep);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.fill();

      // label in segment center if big enough
      if (thisFrac >= segFraction && seg.pct >= 15) {
        const midAngle = startAngle + sweep / 2;
        const lx = cx + (r * 0.6) * Math.cos(midAngle);
        const ly = cy + (r * 0.6) * Math.sin(midAngle);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px Segoe UI, Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(seg.pct + '%', lx, ly);
      }

      startAngle += sweep;
    }

    // center circle
    ctx.beginPath();
    ctx.arc(cx, cy, 38, 0, 2 * Math.PI);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = 'bold 14px Segoe UI, Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Q4 2024', cx, cy);
  }

  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(100, (elapsed / ANIM_DURATION) * 100);
    drawPie(progress);
    if (progress < 100) requestAnimationFrame(animate);
  }

  buildLegend();
  requestAnimationFrame(animate);

  function submitAnswer() {
    const val = document.getElementById('answer').value.trim().toLowerCase();
    const fb = document.getElementById('feedback');
    if (val.includes('revenue')) {
      taskResult = 'correct_segment';
      fb.textContent = 'Correct! Revenue is the largest segment at 45%.';
      fb.className = 'correct';
    } else {
      taskResult = 'wrong_segment';
      fb.textContent = 'Incorrect. Look at the chart and legend again.';
      fb.className = 'wrong';
    }
  }
</script>
</body>
</html>
