<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f4ff;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .panel {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 36px 40px;
    width: 640px;
    text-align: center;
  }
  h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 36px; }
  .steps-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 36px;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
  }
  .circle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #e8eaf6;
    border: 3px solid #c5cae9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #9fa8da;
    transition: all 0.4s ease;
    position: relative;
    z-index: 1;
  }
  .circle.active {
    background: #e8f5e9;
    border-color: #4caf50;
    color: #2e7d32;
    box-shadow: 0 0 0 8px rgba(76,175,80,0.2), 0 0 0 16px rgba(76,175,80,0.08);
    transform: scale(1.18);
  }
  .circle.done {
    background: #e3f2fd;
    border-color: #90caf9;
    color: #1565c0;
  }
  .step-label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    white-space: nowrap;
  }
  .step-label.active { color: #2e7d32; }
  .connector {
    width: 48px;
    height: 3px;
    background: #e0e0e0;
    margin-bottom: 20px;
    transition: background 0.4s;
  }
  .connector.done { background: #90caf9; }
  .status-bar {
    background: #f8f9ff;
    border: 1px solid #e8eaf6;
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    color: #333;
  }
  .status-bar strong { color: #4361ee; }
  .timer-note { font-size: 12px; color: #aaa; margin-top: 4px; }
  #confirmBtn {
    background: #4361ee;
    color: #fff;
    border: none;
    padding: 14px 48px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 16px;
  }
  #confirmBtn:hover { background: #3451d1; }
  #feedback {
    font-size: 15px;
    font-weight: 600;
    min-height: 22px;
    padding: 6px;
  }
  .success { color: #2e7d32; }
  .error { color: #c62828; }
</style>
</head>
<body>
<div class="panel">
  <h1>Process Workflow Tracker</h1>
  <p class="subtitle">Steps highlight every 3 seconds — click Confirm when Step 3 is active</p>
  <div class="steps-row" id="stepsRow"></div>
  <div class="status-bar">
    Current step: <strong id="currentStepName">Step 1: Intake</strong>
    <div class="timer-note" id="timerNote">Next step in 3s...</div>
  </div>
  <button id="confirmBtn" onclick="onConfirm()">Confirm</button>
  <div id="feedback"></div>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const steps = [
    { num: 1, label: 'Intake' },
    { num: 2, label: 'Review' },
    { num: 3, label: 'Approval' },
    { num: 4, label: 'Processing' },
    { num: 5, label: 'Complete' },
  ];

  let activeStep = 0; // 0-indexed
  const STEP_DURATION = 3000;

  function buildSteps() {
    const row = document.getElementById('stepsRow');
    row.innerHTML = '';
    steps.forEach((s, i) => {
      const stepDiv = document.createElement('div');
      stepDiv.className = 'step';
      stepDiv.innerHTML = `
        <div class="circle" id="circle-${i}">${s.num}</div>
        <div class="step-label" id="label-${i}">Step ${s.num}: ${s.label}</div>
      `;
      row.appendChild(stepDiv);

      if (i < steps.length - 1) {
        const conn = document.createElement('div');
        conn.className = 'connector';
        conn.id = 'conn-' + i;
        conn.style.marginBottom = '20px';
        row.appendChild(conn);
      }
    });
  }

  function renderSteps() {
    steps.forEach((s, i) => {
      const circle = document.getElementById('circle-' + i);
      const label = document.getElementById('label-' + i);
      if (i === activeStep) {
        circle.className = 'circle active';
        label.className = 'step-label active';
      } else if (i < activeStep) {
        circle.className = 'circle done';
        label.className = 'step-label';
      } else {
        circle.className = 'circle';
        label.className = 'step-label';
      }
      if (i < steps.length - 1) {
        const conn = document.getElementById('conn-' + i);
        conn.className = 'connector' + (i < activeStep ? ' done' : '');
      }
    });
    document.getElementById('currentStepName').textContent =
      `Step ${steps[activeStep].num}: ${steps[activeStep].label}`;
  }

  buildSteps();
  renderSteps();

  let countdown = 3;
  const note = document.getElementById('timerNote');

  const ticker = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      activeStep = (activeStep + 1) % steps.length;
      renderSteps();
      countdown = 3;
    }
    note.textContent = `Next step in ${countdown}s...`;
  }, 1000);

  function onConfirm() {
    const fb = document.getElementById('feedback');
    if (activeStep === 2) { // Step 3 (0-indexed = 2)
      taskResult = 'step3_confirmed';
      fb.textContent = 'Correct! You confirmed during Step 3: Approval.';
      fb.className = 'success';
    } else {
      taskResult = 'wrong_step';
      fb.textContent = `Wrong timing! You clicked during Step ${steps[activeStep].num}: ${steps[activeStep].label}.`;
      fb.className = 'error';
    }
  }
</script>
</body>
</html>
