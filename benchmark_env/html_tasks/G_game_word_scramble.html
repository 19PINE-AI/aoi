<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Scramble</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 40px 48px;
    width: 460px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  h1 { font-size: 26px; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 28px; }
  .scrambled-label { font-size: 12px; color: #999; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .tiles-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .letter-tile {
    width: 52px; height: 52px;
    border-radius: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 22px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s, opacity 0.2s;
    box-shadow: 0 4px 12px rgba(102,126,234,0.4);
  }
  .letter-tile:hover { transform: translateY(-3px); }
  .letter-tile.used { opacity: 0.3; transform: none; cursor: default; }
  .hint {
    background: #f3e5f5;
    border: 1.5px solid #ce93d8;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 14px;
    color: #6a1b9a;
    margin-bottom: 24px;
    font-style: italic;
  }
  .composed-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    min-height: 52px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .composed-tile {
    width: 52px; height: 52px;
    border-radius: 10px;
    background: #f0f4ff;
    border: 2px solid #667eea;
    color: #4361ee;
    font-size: 22px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
  }
  .composed-tile:hover { background: #e8eeff; }
  .divider { width: 100%; height: 1px; background: #f0f0f0; margin: 8px 0 16px; }
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #ddd;
    border-radius: 10px;
    font-size: 18px;
    text-align: center;
    font-weight: 700;
    letter-spacing: 2px;
    outline: none;
    text-transform: uppercase;
  }
  input[type="text"]:focus { border-color: #667eea; }
  button {
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
  }
  #submitBtn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    width: 100%;
  }
  #submitBtn:hover { opacity: 0.9; }
  #clearBtn {
    background: #f5f5f5;
    color: #555;
    border: 1px solid #ddd;
    margin-top: 8px;
    width: 100%;
  }
  #feedback {
    font-size: 16px;
    font-weight: 700;
    min-height: 24px;
    margin-top: 12px;
  }
  .correct { color: #2e7d32; }
  .wrong { color: #c62828; }
  .tries { font-size: 13px; color: #aaa; margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <h1>Word Scramble</h1>
  <p class="subtitle">Unscramble the letters to find the hidden word!</p>
  <div class="scrambled-label">Scrambled Letters:</div>
  <div class="tiles-row" id="tilesRow"></div>
  <div class="hint">💡 Hint: 6 letters · a programming language</div>
  <div class="scrambled-label">Your Word (click tiles above, or type below):</div>
  <div class="composed-row" id="composedRow"></div>
  <div class="divider"></div>
  <div class="input-row">
    <input type="text" id="wordInput" placeholder="PYTHON" maxlength="6" />
  </div>
  <button id="submitBtn" onclick="submitWord()">Submit Answer</button>
  <button id="clearBtn" onclick="clearComposed()">Clear</button>
  <div id="feedback"></div>
  <div class="tries" id="triesInfo">Attempts: 0</div>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const SCRAMBLED = ['N','O','H','T','Y','P'];
  const ANSWER = 'PYTHON';
  let composedLetters = [];
  let usedIndices = new Set();
  let attempts = 0;

  function buildTiles() {
    const row = document.getElementById('tilesRow');
    row.innerHTML = '';
    SCRAMBLED.forEach((letter, i) => {
      const tile = document.createElement('div');
      tile.className = 'letter-tile' + (usedIndices.has(i) ? ' used' : '');
      tile.textContent = letter;
      tile.id = 'tile-' + i;
      tile.addEventListener('click', () => pickLetter(i));
      row.appendChild(tile);
    });
  }

  function renderComposed() {
    const row = document.getElementById('composedRow');
    row.innerHTML = '';
    composedLetters.forEach((item, pos) => {
      const tile = document.createElement('div');
      tile.className = 'composed-tile';
      tile.textContent = item.letter;
      tile.title = 'Click to remove';
      tile.addEventListener('click', () => removeLetter(pos));
      row.appendChild(tile);
    });
    // Also update text input
    document.getElementById('wordInput').value = composedLetters.map(l => l.letter).join('');
  }

  function pickLetter(idx) {
    if (usedIndices.has(idx)) return;
    if (composedLetters.length >= 6) return;
    usedIndices.add(idx);
    composedLetters.push({ letter: SCRAMBLED[idx], idx });
    document.getElementById('tile-' + idx).classList.add('used');
    renderComposed();
  }

  function removeLetter(pos) {
    const item = composedLetters[pos];
    usedIndices.delete(item.idx);
    composedLetters.splice(pos, 1);
    document.getElementById('tile-' + item.idx).classList.remove('used');
    renderComposed();
  }

  function clearComposed() {
    composedLetters = [];
    usedIndices = new Set();
    document.getElementById('wordInput').value = '';
    buildTiles();
    renderComposed();
  }

  function submitWord() {
    const inputEl = document.getElementById('wordInput');
    // Use input field value OR composed tiles
    const val = (inputEl.value.trim() || composedLetters.map(l=>l.letter).join('')).toUpperCase();
    attempts++;
    document.getElementById('triesInfo').textContent = `Attempts: ${attempts}`;
    const fb = document.getElementById('feedback');
    if (val === ANSWER) {
      taskResult = 'word_correct';
      fb.textContent = `Correct! "${ANSWER}" — well done!`;
      fb.className = 'correct';
    } else {
      taskResult = 'wrong_word';
      fb.textContent = `"${val}" is not the answer. Try again!`;
      fb.className = 'wrong';
    }
  }

  document.getElementById('wordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitWord();
  });

  buildTiles();
  renderComposed();
</script>
</body>
</html>
