<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #e0e0e0;
    user-select: none;
  }
  h1 { font-size: 20px; font-weight: 700; color: #a0c4ff; margin-bottom: 6px; }
  .controls-hint {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
  }
  #gameCanvas {
    border: 3px solid #3a6aae;
    border-radius: 10px;
    display: block;
    background: #16213e;
  }
  .status-row {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    font-size: 14px;
    color: #888;
    align-items: center;
  }
  #gameStatus {
    font-size: 15px;
    font-weight: 600;
    color: #a0c4ff;
    min-height: 22px;
    margin-top: 10px;
    text-align: center;
  }
  .touch-controls {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    align-items: center;
  }
  .touch-btn {
    background: #1e3a6e;
    border: 2px solid #3a6aae;
    color: #a0c4ff;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 18px;
    cursor: pointer;
    min-width: 52px;
    text-align: center;
    font-weight: 700;
    transition: background 0.1s;
  }
  .touch-btn:active { background: #2a4a8e; }
  .touch-btn.jump { padding: 12px 16px; }
  #resetBtn {
    background: #3a1a4e;
    color: #c0a0ff;
    border: 1px solid #6a4aae;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }
  #resetBtn:hover { background: #4a2a6e; }
</style>
</head>
<body>
<h1>PlatformRun</h1>
<p class="controls-hint">← → move, Space / ↑ jump — Or use buttons below</p>
<canvas id="gameCanvas" width="500" height="240"></canvas>
<div id="gameStatus">Reach the green flag!</div>
<div class="touch-controls">
  <button class="touch-btn" id="btnLeft">◀</button>
  <button class="touch-btn jump" id="btnJump">↑ Jump</button>
  <button class="touch-btn" id="btnRight">▶</button>
</div>
<button id="resetBtn" onclick="resetGame()">Restart</button>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = 500, H = 240;

  // Physics
  const GRAVITY = 0.55;
  const JUMP_V = -11;
  const MOVE_SPEED = 4;

  // Platforms [x, y, w, h]
  const platforms = [
    [0,   210, 90,  10],  // start pad
    [130, 170, 80,  10],  // platform 1
    [250, 140, 80,  10],  // platform 2
    [370, 170, 80,  10],  // platform 3 (back down)
    [0,   210, 500, 20],  // floor section (not all — gap at 90-130 and 230-250)
  ];

  // Actually define clean platforms with gaps
  const PLATFORMS = [
    { x:0,   y:210, w:90,  h:14 }, // start
    { x:140, y:175, w:70,  h:12 }, // gap1 (gap 90-140)
    { x:250, y:145, w:70,  h:12 }, // gap2 (gap 210-250)
    { x:360, y:175, w:70,  h:12 }, // gap3
    { x:460, y:210, w:40,  h:14 }, // end platform
  ];

  // Flag at right end
  const FLAG = { x: 472, y: 160, w: 20, h: 50 };

  let player = { x:10, y:180, w:20, h:20, vx:0, vy:0, onGround:false };
  let keys = { left:false, right:false, jump:false };
  let jumpHeld = false;
  let gameState = 'playing'; // playing | won | fell

  function resetGame() {
    player = { x:10, y:180, w:20, h:20, vx:0, vy:0, onGround:false };
    keys = { left:false, right:false, jump:false };
    jumpHeld = false;
    gameState = 'playing';
    taskResult = 'pending';
    document.getElementById('gameStatus').textContent = 'Reach the green flag!';
    document.getElementById('gameStatus').style.color = '#a0c4ff';
  }

  function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }

  function update() {
    if (gameState !== 'playing') return;

    // Movement
    player.vx = 0;
    if (keys.left) player.vx = -MOVE_SPEED;
    if (keys.right) player.vx = MOVE_SPEED;

    // Jump
    if (keys.jump && player.onGround && !jumpHeld) {
      player.vy = JUMP_V;
      player.onGround = false;
      jumpHeld = true;
    }
    if (!keys.jump) jumpHeld = false;

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    // Platform collision
    player.onGround = false;
    PLATFORMS.forEach(p => {
      if (rectOverlap(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
        // Only land on top
        if (player.vy >= 0 && player.y + player.h - player.vy <= p.y + 1) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
      }
    });

    // Fell off bottom
    if (player.y > H + 10) {
      gameState = 'fell';
      taskResult = 'fell';
      document.getElementById('gameStatus').textContent = 'Fell off! Click Restart to try again.';
      document.getElementById('gameStatus').style.color = '#f72585';
    }

    // Reached flag
    if (rectOverlap(player.x, player.y, player.w, player.h, FLAG.x, FLAG.y-FLAG.h, FLAG.w, FLAG.h)) {
      gameState = 'won';
      taskResult = 'flag_reached';
      document.getElementById('gameStatus').textContent = 'You reached the flag!';
      document.getElementById('gameStatus').style.color = '#3fb950';
    }
  }

  function drawScene() {
    ctx.clearRect(0, 0, W, H);

    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0a0e1a');
    sky.addColorStop(1, '#16213e');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    [[40,20],[80,40],[150,15],[200,35],[300,18],[350,40],[420,25],[470,35]].forEach(([x,y]) => {
      ctx.fillRect(x,y,2,2);
    });

    // Platforms
    PLATFORMS.forEach(p => {
      ctx.fillStyle = '#2a4a8e';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#3a6aae';
      ctx.fillRect(p.x, p.y, p.w, 3);
    });

    // Flag pole
    ctx.strokeStyle = '#a0a0a0';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(FLAG.x + 3, FLAG.y);
    ctx.lineTo(FLAG.x + 3, FLAG.y - FLAG.h);
    ctx.stroke();
    // Flag cloth
    ctx.fillStyle = '#3fb950';
    ctx.beginPath();
    ctx.moveTo(FLAG.x + 3, FLAG.y - FLAG.h);
    ctx.lineTo(FLAG.x + FLAG.w, FLAG.y - FLAG.h + FLAG.h * 0.35);
    ctx.lineTo(FLAG.x + 3, FLAG.y - FLAG.h + FLAG.h * 0.7);
    ctx.closePath();
    ctx.fill();

    // Player (blue square)
    ctx.fillStyle = '#4361ee';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.x + 4, player.y + 4, 4, 4);
    ctx.fillRect(player.x + 12, player.y + 4, 4, 4);

    // Jump indicator
    if (!player.onGround && gameState === 'playing') {
      ctx.strokeStyle = 'rgba(67,97,238,0.3)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(player.x + player.w/2, player.y + player.h);
      ctx.lineTo(player.x + player.w/2, player.y + player.h + 20);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  let lastTime = 0;
  function gameLoop(ts) {
    if (ts - lastTime >= 16) {
      update();
      drawScene();
      lastTime = ts;
    }
    requestAnimationFrame(gameLoop);
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    if (['ArrowLeft','a','A'].includes(e.key)) keys.left = true;
    if (['ArrowRight','d','D'].includes(e.key)) keys.right = true;
    if (['ArrowUp','w','W',' '].includes(e.key)) { keys.jump = true; e.preventDefault(); }
  });
  document.addEventListener('keyup', e => {
    if (['ArrowLeft','a','A'].includes(e.key)) keys.left = false;
    if (['ArrowRight','d','D'].includes(e.key)) keys.right = false;
    if (['ArrowUp','w','W',' '].includes(e.key)) keys.jump = false;
  });

  // Touch buttons
  function hold(key, val) {
    keys[key] = val;
  }
  const btnLeft = document.getElementById('btnLeft');
  const btnRight = document.getElementById('btnRight');
  const btnJump = document.getElementById('btnJump');

  btnLeft.addEventListener('mousedown', () => hold('left', true));
  btnLeft.addEventListener('mouseup', () => hold('left', false));
  btnLeft.addEventListener('touchstart', e => { e.preventDefault(); hold('left', true); });
  btnLeft.addEventListener('touchend', () => hold('left', false));

  btnRight.addEventListener('mousedown', () => hold('right', true));
  btnRight.addEventListener('mouseup', () => hold('right', false));
  btnRight.addEventListener('touchstart', e => { e.preventDefault(); hold('right', true); });
  btnRight.addEventListener('touchend', () => hold('right', false));

  btnJump.addEventListener('mousedown', () => { keys.jump = true; });
  btnJump.addEventListener('mouseup', () => { keys.jump = false; });
  btnJump.addEventListener('touchstart', e => { e.preventDefault(); keys.jump = true; });
  btnJump.addEventListener('touchend', () => { keys.jump = false; });

  requestAnimationFrame(gameLoop);
</script>
</body>
</html>
