<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Interview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #7c4dff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .interview-layout { display: flex; gap: 24px; align-items: flex-start; }
  .video-panel { background: #16213e; border-radius: 16px; padding: 24px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; }
  .video-placeholder { width: 100%; aspect-ratio: 4/3; border-radius: 12px; background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 16px; position: relative; overflow: hidden; }
  .interviewer-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #7c4dff, #536dfe); display: flex; align-items: center; justify-content: center; font-size: 36px; color: #fff; margin-bottom: 8px; }
  .interviewer-name { font-size: 14px; color: rgba(255,255,255,0.8); }
  .live-badge { position: absolute; top: 12px; left: 12px; background: #e53935; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .call-timer { font-size: 20px; font-weight: 300; margin-bottom: 12px; font-variant-numeric: tabular-nums; }
  .call-actions { display: flex; justify-content: center; gap: 16px; }
  .action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; }
  .btn-mute { background: #333; }
  .btn-video { background: #333; }
  .btn-end { background: #e53935; }
  .response-panel { background: #16213e; border-radius: 16px; padding: 24px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .response-panel h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #ccc; }
  .mic-indicator { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 12px; background: #0f1a30; border-radius: 8px; }
  .mic-icon { width: 32px; height: 32px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .mic-icon.listening { background: #e53935; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.4); } 50% { box-shadow: 0 0 0 8px rgba(229,57,53,0); } }
  .mic-label { font-size: 13px; color: #888; }
  .mic-label.active { color: #ef5350; }
  .transcript-box { background: #0f1a30; border: 1px solid #2a2a4e; border-radius: 8px; padding: 12px; min-height: 60px; margin-bottom: 12px; font-size: 14px; color: #aaa; }
  .fallback-input { width: 100%; background: #0f1a30; border: 1px solid #2a2a4e; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 15px; outline: none; margin-bottom: 12px; }
  .fallback-input:focus { border-color: #7c4dff; }
  .submit-btn { width: 100%; padding: 10px; background: #7c4dff; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
  .submit-btn:hover { background: #9c7cff; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="interview-layout">
  <div class="video-panel">
    <div class="video-placeholder">
      <div class="live-badge">LIVE</div>
      <div class="interviewer-avatar">&#128100;</div>
      <div class="interviewer-name">Interviewer</div>
    </div>
    <div class="call-timer" id="timer">00:00</div>
    <div class="call-actions">
      <button class="action-btn btn-mute">&#127908;</button>
      <button class="action-btn btn-video">&#128249;</button>
      <button class="action-btn btn-end">&#128381;</button>
    </div>
  </div>
  <div class="response-panel">
    <h3>Your Response</h3>
    <div class="mic-indicator">
      <div class="mic-icon" id="micIcon">&#127908;</div>
      <div class="mic-label" id="micLabel">Waiting for question...</div>
    </div>
    <div class="transcript-box" id="transcript">Your spoken response will appear here...</div>
    <input type="text" class="fallback-input" id="fallbackInput" placeholder="Type or speak your answer" autocomplete="off">
    <button class="submit-btn" id="submitBtn">Submit Answer</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  let timerSec = 0;
  let capturedResponse = '';

  setInterval(() => {
    timerSec++;
    const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
    const s = String(timerSec % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);

  function startListening() {
    document.getElementById('micIcon').classList.add('listening');
    document.getElementById('micLabel').textContent = 'Listening...';
    document.getElementById('micLabel').classList.add('active');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.lang = 'en-US';
      recognition.onresult = (event) => {
        capturedResponse = event.results[0][0].transcript;
        document.getElementById('transcript').textContent = capturedResponse;
        document.getElementById('micIcon').classList.remove('listening');
        document.getElementById('micLabel').textContent = 'Response captured';
      };
      recognition.onerror = () => {
        document.getElementById('micLabel').textContent = 'Speech recognition unavailable — type your answer';
        document.getElementById('micIcon').classList.remove('listening');
      };
      recognition.onend = () => {
        if (!capturedResponse) {
          document.getElementById('micIcon').classList.remove('listening');
          document.getElementById('micLabel').textContent = 'Use text input below';
        }
      };
      // Request mic access then start recognition
      navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
        recognition.start();
      }).catch(() => {
        document.getElementById('micLabel').textContent = 'Mic unavailable — type your answer';
        document.getElementById('micIcon').classList.remove('listening');
      });
    } else {
      document.getElementById('micLabel').textContent = 'Speech recognition unavailable — type your answer';
      document.getElementById('micIcon').classList.remove('listening');
    }
  }

  function askQuestion() {
    const u = new SpeechSynthesisUtterance("Let's start with a simple question. What is the capital of France?");
    u.rate = 0.9; u.lang = 'en-US';
    u.onend = () => { startListening(); };
    speechSynthesis.speak(u);
  }

  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'answer_heard_correct' ? 'Correct!' : 'Try again.';
  });

  window.getTaskResult = function() {
    const spoken = capturedResponse.toLowerCase();
    const typed = document.getElementById('fallbackInput').value.toLowerCase().trim();
    const combined = spoken + ' ' + typed;
    if (combined.includes('paris')) return 'answer_heard_correct';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(askQuestion, 3000);
  }, 2000);
</script>
</body>
</html>
