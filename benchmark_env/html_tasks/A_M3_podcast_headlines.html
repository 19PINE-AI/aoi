<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Digest Podcast</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f23; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #0f0f23; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #e17055; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .player-card { background: #1a1a2e; border-radius: 16px; padding: 32px; width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .artwork { width: 100%; aspect-ratio: 16/9; border-radius: 12px; background: linear-gradient(135deg, #e17055 0%, #d63031 100%); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .artwork-text { font-size: 36px; font-weight: 700; color: rgba(255,255,255,0.9); text-align: center; }
  .podcast-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .podcast-episode { font-size: 14px; color: #888; margin-bottom: 20px; }
  .progress-container { margin-bottom: 20px; }
  .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #e17055; transition: width 0.5s linear; }
  .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 6px; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 28px; }
  .ctrl-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 20px; }
  .play-btn { width: 56px; height: 56px; border-radius: 50%; background: #e17055; border: none; color: #fff; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .divider { border: none; border-top: 1px solid #2a2a3e; margin: 20px 0; }
  .form-section h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #ccc; }
  .headline-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .headline-row label { font-size: 13px; color: #888; font-weight: 500; }
  .headline-row input { background: #16162b; border: 1px solid #2a2a3e; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 14px; outline: none; }
  .headline-row input:focus { border-color: #e17055; }
  .submit-btn { width: 100%; margin-top: 8px; padding: 10px; background: #e17055; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="player-card">
  <div class="artwork"><div class="artwork-text">Morning Digest</div></div>
  <div class="podcast-title">Morning Digest</div>
  <div class="podcast-episode">Daily Headlines — April 14, 2026</div>
  <div class="progress-container">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-labels"><span id="elapsed">0:00</span><span>0:30</span></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn">&#9198;</button>
    <button class="play-btn" id="playBtn">&#9654;</button>
    <button class="ctrl-btn">&#9197;</button>
  </div>
  <hr class="divider">
  <div class="form-section">
    <h3>List the 3 headlines you heard:</h3>
    <div class="headline-row">
      <label for="h1">Headline 1</label>
      <input type="text" id="h1" placeholder="First headline..." autocomplete="off">
    </div>
    <div class="headline-row">
      <label for="h2">Headline 2</label>
      <input type="text" id="h2" placeholder="Second headline..." autocomplete="off">
    </div>
    <div class="headline-row">
      <label for="h3">Headline 3</label>
      <input type="text" id="h3" placeholder="Third headline..." autocomplete="off">
    </div>
    <button class="submit-btn" id="submitBtn">Submit Answer</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const headlines = [
    "Here are today's top stories. First headline: Senate passes landmark climate bill.",
    "Second headline: Tech industry layoffs reach fifty thousand.",
    "Third headline: Mars rover discovers subsurface ice deposits."
  ];
  let audioPlayed = false;

  function startAudio() {
    if (audioPlayed) return;
    audioPlayed = true;
    const startTime = Date.now();
    const estDuration = 30000;
    const iv = setInterval(() => {
      const pct = Math.min(100, ((Date.now() - startTime) / estDuration) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      const sec = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('elapsed').textContent = '0:' + String(sec).padStart(2, '0');
      if (pct >= 100) clearInterval(iv);
    }, 200);
    document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';

    let idx = 0;
    function speakNext() {
      if (idx >= headlines.length) {
        clearInterval(iv);
        document.getElementById('progressFill').style.width = '100%';
        return;
      }
      const u = new SpeechSynthesisUtterance(headlines[idx]);
      u.rate = 0.9;
      u.lang = 'en-US';
      u.onend = () => {
        idx++;
        setTimeout(speakNext, 1500);
      };
      speechSynthesis.speak(u);
    }
    speakNext();
  }

  document.getElementById('playBtn').addEventListener('click', startAudio);
  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'all_three_correct' ? 'All correct!' : 'Check your answers.';
  });

  window.getTaskResult = function() {
    const v1 = document.getElementById('h1').value.toLowerCase();
    const v2 = document.getElementById('h2').value.toLowerCase();
    const v3 = document.getElementById('h3').value.toLowerCase();
    const ok1 = v1.includes('climate') && v1.includes('bill');
    const ok2 = v2.includes('layoff') || (v2.includes('tech') && v2.includes('fifty thousand'));
    const ok3 = v3.includes('mars') && v3.includes('ice');
    if (ok1 && ok2 && ok3) return 'all_three_correct';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startAudio, 500);
  }, 2000);
</script>
</body>
</html>
