<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Tutorial</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .app-container { position: relative; width: 720px; background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); overflow: hidden; }
  .app-header { background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  .app-header .dots { display: flex; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ef4444; } .dot.yellow { background: #f59e0b; } .dot.green { background: #22c55e; }
  .app-header h3 { font-size: 0.9rem; color: #64748b; }
  .app-body { display: flex; min-height: 400px; }
  .sidebar { width: 180px; background: #f1f5f9; border-right: 1px solid #e2e8f0; padding: 16px; }
  .sidebar-item { padding: 8px 10px; border-radius: 6px; font-size: 0.82rem; color: #64748b; cursor: pointer; margin-bottom: 4px; transition: background 0.2s; }
  .sidebar-item:hover { background: #e2e8f0; }
  .main-area { flex: 1; padding: 24px; position: relative; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
  .tool-btn { padding: 6px 14px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.82rem; color: #475569; cursor: pointer; background: #fff; transition: all 0.2s; }
  .tool-btn:hover { background: #f1f5f9; }
  .tool-btn.new-file { background: #2563eb; color: #fff; border-color: #2563eb; }
  .save-area { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .save-icon { font-size: 1.3rem; cursor: pointer; }
  .share-btn { padding: 6px 14px; background: #7c3aed; color: #fff; border: none; border-radius: 6px; font-size: 0.82rem; cursor: pointer; }
  .editor-area { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; height: 180px; padding: 14px; font-family: monospace; font-size: 0.85rem; color: #334155; position: relative; }
  .editor-placeholder { color: #94a3b8; }
  /* Tooltip overlay */
  .tooltip { position: absolute; background: #1e293b; color: #fff; border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; max-width: 220px; z-index: 100; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .tooltip::after { content: ''; position: absolute; border: 8px solid transparent; }
  .tooltip .tip-step { font-size: 0.72rem; color: #94a3b8; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
  .highlight-ring { position: absolute; border-radius: 8px; border: 3px solid #f59e0b; box-shadow: 0 0 0 4px rgba(245,158,11,0.25); pointer-events: none; display: none; transition: all 0.3s; z-index: 50; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{ box-shadow: 0 0 0 4px rgba(245,158,11,0.25); } 50%{ box-shadow: 0 0 0 8px rgba(245,158,11,0.1); } }
  .step-counter { position: absolute; top: 12px; right: 12px; background: #2563eb; color: #fff; border-radius: 20px; padding: 4px 14px; font-size: 0.8rem; font-weight: 700; }
  .answer-panel { background: #f8fafc; border-top: 1px solid #e2e8f0; padding: 20px 24px; }
  .answer-panel label { font-size: 0.85rem; color: #475569; font-weight: 600; display: block; margin-bottom: 8px; }
  .answer-panel input { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; outline: none; }
  .answer-panel input:focus { border-color: #2563eb; }
  .btn-row { display: flex; gap: 10px; margin-top: 10px; }
  .btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-sm { background: #e2e8f0; color: #475569; border: none; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; cursor: pointer; }
  .result-msg { font-size: 0.85rem; margin-top: 8px; font-weight: 600; display: none; }
</style>
</head>
<body>
<div style="width:720px">
  <div class="app-container" id="appContainer">
    <div class="highlight-ring" id="highlightRing"></div>

    <div class="app-header">
      <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
      <h3>CodeEditor Pro — Onboarding Tutorial</h3>
      <div class="step-counter" id="stepCounter">Step 1 / 4</div>
    </div>

    <div class="app-body">
      <div class="sidebar">
        <div class="sidebar-item">📁 Project</div>
        <div class="sidebar-item">📄 Files</div>
        <div class="sidebar-item">🔍 Search</div>
        <div class="sidebar-item">⚙️ Settings</div>
      </div>
      <div class="main-area" id="mainArea">
        <div class="toolbar">
          <button class="tool-btn new-file" id="newFileBtn">+ New File</button>
          <button class="tool-btn">Open</button>
          <button class="tool-btn">Format</button>
        </div>
        <div class="save-area">
          <span class="save-icon" id="saveIcon" title="Save (Ctrl+S)">💾</span>
          <span style="font-size:0.82rem;color:#64748b">document.txt</span>
          <button class="share-btn" id="shareBtn">Share</button>
        </div>
        <div class="editor-area" id="editorArea">
          <span class="editor-placeholder">Start typing here...</span>
        </div>

        <!-- Tooltip -->
        <div class="tooltip" id="tooltip">
          <div class="tip-step" id="tipStep">Step 1 of 4</div>
          <div id="tipText">Click here to create a file</div>
        </div>
      </div>
    </div>

    <div class="answer-panel">
      <label for="answerInput">What happens in step 3?</label>
      <input type="text" id="answerInput" placeholder="Describe the action in step 3..." />
      <div class="btn-row">
        <button class="btn" onclick="submitAnswer()">Submit</button>
        <button class="btn-sm" onclick="restartTutorial()">Restart Tutorial</button>
      </div>
      <div class="result-msg" id="resultMsg"></div>
    </div>
  </div>
</div>

<script>
let taskResult = 'pending';
window.getTaskResult = () => taskResult;

const tutorialSteps = [
  {
    target: 'newFileBtn',
    tipStep: 'Step 1 of 4',
    tipText: 'Click here to create a file',
    tipPos: { top: 50, left: 20 }
  },
  {
    target: 'editorArea',
    tipStep: 'Step 2 of 4',
    tipText: 'Type your content here',
    tipPos: { top: 160, left: 20 }
  },
  {
    target: 'saveIcon',
    tipStep: 'Step 3 of 4',
    tipText: 'Save file using Ctrl+S',
    tipPos: { top: 110, left: 20 }
  },
  {
    target: 'shareBtn',
    tipStep: 'Step 4 of 4',
    tipText: 'Share your document',
    tipPos: { top: 110, left: 160 }
  }
];

let timers = [];
let currentTutorialStep = 0;

function getRelativeRect(el) {
  const parent = document.getElementById('mainArea');
  const parentRect = parent.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  return {
    top: elRect.top - parentRect.top,
    left: elRect.left - parentRect.left,
    width: elRect.width,
    height: elRect.height
  };
}

function showStep(idx) {
  currentTutorialStep = idx;
  const step = tutorialSteps[idx];
  document.getElementById('stepCounter').textContent = `Step ${idx + 1} / 4`;

  const targetEl = document.getElementById(step.target);
  const ring = document.getElementById('highlightRing');
  const tooltip = document.getElementById('tooltip');
  const mainArea = document.getElementById('mainArea');

  const rect = getRelativeRect(targetEl);
  const mainRect = mainArea.getBoundingClientRect();
  const containerRect = document.getElementById('appContainer').getBoundingClientRect();

  // Position highlight ring relative to app-container
  const targetPageRect = targetEl.getBoundingClientRect();
  const containerPageRect = containerRect;
  ring.style.display = 'block';
  ring.style.top = (targetPageRect.top - containerPageRect.top - 4) + 'px';
  ring.style.left = (targetPageRect.left - containerPageRect.left - 4) + 'px';
  ring.style.width = (targetPageRect.width + 8) + 'px';
  ring.style.height = (targetPageRect.height + 8) + 'px';

  // Position tooltip
  tooltip.style.display = 'block';
  tooltip.style.top = step.tipPos.top + 'px';
  tooltip.style.left = step.tipPos.left + 'px';
  document.getElementById('tipStep').textContent = step.tipStep;
  document.getElementById('tipText').textContent = step.tipText;
}

function runTutorial() {
  showStep(0);
  timers.push(setTimeout(() => showStep(1), 5000));
  timers.push(setTimeout(() => showStep(2), 10000));
  timers.push(setTimeout(() => showStep(3), 15000));
  timers.push(setTimeout(() => {
    document.getElementById('tooltip').style.display = 'none';
    document.getElementById('highlightRing').style.display = 'none';
    document.getElementById('stepCounter').textContent = 'Tutorial Complete!';
  }, 20000));
}

function restartTutorial() {
  timers.forEach(clearTimeout);
  timers = [];
  taskResult = 'pending';
  document.getElementById('answerInput').value = '';
  document.getElementById('resultMsg').style.display = 'none';
  runTutorial();
}

function submitAnswer() {
  const val = document.getElementById('answerInput').value.toLowerCase();
  const msg = document.getElementById('resultMsg');
  if (val.includes('save') || val.includes('file')) {
    taskResult = 'step_3_correct';
    msg.style.color = '#16a34a';
    msg.textContent = 'Correct! Step 3 was: Save file using Ctrl+S.';
  } else {
    taskResult = 'incorrect';
    msg.style.color = '#dc2626';
    msg.textContent = 'Incorrect. Watch the tutorial and focus on step 3.';
  }
  msg.style.display = 'block';
}

runTutorial();
</script>
</body>
</html>
