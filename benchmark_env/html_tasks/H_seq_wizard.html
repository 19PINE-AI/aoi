<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Wizard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .wizard-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); width: 560px; padding: 36px; }
  h2 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 28px; text-align: center; }
  .steps { display: flex; align-items: center; margin-bottom: 36px; }
  .step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
  .step:not(:last-child)::after { content: ''; position: absolute; top: 20px; left: 60%; width: 80%; height: 2px; background: #e0e0e0; z-index: 0; }
  .step-circle { width: 40px; height: 40px; border-radius: 50%; background: #e0e0e0; color: #999; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; z-index: 1; transition: all 0.5s ease; position: relative; }
  .step-label { font-size: 0.78rem; color: #999; margin-top: 8px; text-align: center; font-weight: 500; transition: color 0.5s; }
  .step.active .step-circle { background: #2563eb; color: #fff; box-shadow: 0 0 0 4px #bfdbfe; }
  .step.active .step-label { color: #2563eb; font-weight: 700; }
  .step.done .step-circle { background: #16a34a; color: #fff; }
  .step.done .step-label { color: #16a34a; font-weight: 700; }
  .step-content { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; min-height: 100px; display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .step-icon { font-size: 2.2rem; }
  .step-text h3 { font-size: 1rem; color: #1e293b; margin-bottom: 6px; }
  .step-text p { font-size: 0.85rem; color: #64748b; }
  .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: #2563eb; border-radius: 3px; transition: width 0.8s ease; width: 0%; }
  .answer-area { border-top: 1px solid #e2e8f0; padding-top: 20px; }
  .answer-area label { font-size: 0.85rem; color: #475569; display: block; margin-bottom: 8px; font-weight: 600; }
  .answer-area input { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.2s; }
  .answer-area input:focus { border-color: #2563eb; }
  .btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
  .btn:hover { background: #1d4ed8; }
  .btn-restart { background: #e2e8f0; color: #475569; border: none; border-radius: 8px; padding: 8px 18px; font-size: 0.85rem; cursor: pointer; float: right; }
  .btn-restart:hover { background: #cbd5e1; }
  .result-msg { margin-top: 10px; font-size: 0.85rem; color: #16a34a; font-weight: 600; display: none; }
  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
  .badge-running { background: #dbeafe; color: #2563eb; }
  .badge-done { background: #dcfce7; color: #16a34a; }
</style>
</head>
<body>
<div class="wizard-card">
  <button class="btn-restart" onclick="restartWizard()">Restart</button>
  <h2>System Setup Wizard</h2>

  <div class="steps">
    <div class="step" id="step1">
      <div class="step-circle">1</div>
      <div class="step-label">Installation</div>
    </div>
    <div class="step" id="step2">
      <div class="step-circle">2</div>
      <div class="step-label">Configuration</div>
    </div>
    <div class="step" id="step3">
      <div class="step-circle">3</div>
      <div class="step-label">Activation</div>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="step-content" id="stepContent">
    <div class="step-icon" id="stepIcon">📦</div>
    <div class="step-text">
      <h3 id="stepTitle">Step 1: Installation</h3>
      <p id="stepDesc">Installing core components and dependencies...</p>
    </div>
    <span class="status-badge badge-running" id="stepBadge">Running</span>
  </div>

  <div class="answer-area">
    <label for="answerInput">What was Step 2?</label>
    <input type="text" id="answerInput" placeholder="Type the name of Step 2..." />
    <button class="btn" onclick="submitAnswer()">Submit</button>
    <div class="result-msg" id="resultMsg">Correct! Step 2 was Configuration.</div>
  </div>
</div>

<script>
let taskResult = 'pending';
window.getTaskResult = () => taskResult;

const steps = [
  { icon: '📦', title: 'Step 1: Installation', desc: 'Installing core components and dependencies...', badge: 'Running' },
  { icon: '⚙️', title: 'Step 2: Configuration', desc: 'Applying settings and configuring environment variables...', badge: 'Running' },
  { icon: '🔑', title: 'Step 3: Activation', desc: 'Activating license and verifying services...', badge: 'Running' },
  { icon: '✅', title: 'Setup Complete!', desc: 'All steps completed successfully. System is ready.', badge: 'Done' }
];

let currentStep = 0;
let timers = [];

function setActiveStep(idx) {
  ['step1','step2','step3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step';
    if (i < idx) el.classList.add('done');
    const circle = el.querySelector('.step-circle');
    if (i < idx) circle.textContent = '✓';
    else circle.textContent = i + 1;
  });
  if (idx < 3) {
    const el = document.getElementById('step' + (idx + 1));
    if (el) el.classList.add('active');
  }
}

function showStepContent(data, progress) {
  document.getElementById('stepIcon').textContent = data.icon;
  document.getElementById('stepTitle').textContent = data.title;
  document.getElementById('stepDesc').textContent = data.desc;
  const badge = document.getElementById('stepBadge');
  badge.textContent = data.badge;
  badge.className = 'status-badge ' + (data.badge === 'Done' ? 'badge-done' : 'badge-running');
  document.getElementById('progressFill').style.width = progress + '%';
}

function runWizard() {
  setActiveStep(0);
  showStepContent(steps[0], 10);

  timers.push(setTimeout(() => {
    setActiveStep(1);
    showStepContent(steps[1], 45);
  }, 5000));

  timers.push(setTimeout(() => {
    setActiveStep(2);
    showStepContent(steps[2], 78);
  }, 10000));

  timers.push(setTimeout(() => {
    ['step1','step2','step3'].forEach(id => {
      const el = document.getElementById(id);
      el.className = 'step done';
      el.querySelector('.step-circle').textContent = '✓';
    });
    showStepContent(steps[3], 100);
  }, 15000));
}

function restartWizard() {
  timers.forEach(clearTimeout);
  timers = [];
  document.getElementById('answerInput').value = '';
  document.getElementById('resultMsg').style.display = 'none';
  taskResult = 'pending';
  runWizard();
}

function submitAnswer() {
  const val = document.getElementById('answerInput').value.toLowerCase();
  if (val.includes('config')) {
    taskResult = 'step_2_correct';
    document.getElementById('resultMsg').style.display = 'block';
    document.getElementById('resultMsg').style.color = '#16a34a';
    document.getElementById('resultMsg').textContent = 'Correct! Step 2 was Configuration.';
  } else {
    taskResult = 'incorrect';
    document.getElementById('resultMsg').style.display = 'block';
    document.getElementById('resultMsg').style.color = '#dc2626';
    document.getElementById('resultMsg').textContent = 'Incorrect. Observe the wizard steps carefully.';
  }
}

runWizard();
</script>
</body>
</html>
