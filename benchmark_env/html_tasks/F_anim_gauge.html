<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial Gauge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1c1c1c;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #e0e0e0;
  }
  .panel {
    background: #252525;
    border: 2px solid #3a3a3a;
    border-radius: 16px;
    padding: 36px 48px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    width: 420px;
  }
  h1 { font-size: 18px; font-weight: 600; color: #ccc; letter-spacing: 2px; margin-bottom: 4px; }
  .model { font-size: 12px; color: #666; margin-bottom: 28px; letter-spacing: 1px; }
  canvas { display: block; margin: 0 auto 6px; }
  .pct-display {
    font-size: 42px;
    font-weight: 700;
    color: #f0f0f0;
    font-family: 'Courier New', monospace;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .range-hint {
    font-size: 12px;
    color: #666;
    margin-bottom: 28px;
  }
  .range-hint .target { color: #f0a500; font-weight: 600; }
  #saveBtn {
    background: linear-gradient(135deg, #2a4a6a, #1e3a5a);
    color: #7ec8e3;
    border: 1px solid #3a6a8a;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s;
    margin-bottom: 18px;
  }
  #saveBtn:hover { background: linear-gradient(135deg, #3a5a7a, #2e4a6a); }
  #feedback {
    font-size: 14px;
    min-height: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .success { color: #4caf50; }
  .error { color: #ef5350; }
  .warning { color: #f0a500; }
  .tick-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #555;
    margin-top: 4px;
    padding: 0 10px;
  }
</style>
</head>
<body>
<div class="panel">
  <h1>PRESSURE GAUGE</h1>
  <p class="model">Model PG-7000 Industrial Series</p>
  <canvas id="gauge" width="280" height="160"></canvas>
  <div class="tick-labels">
    <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
  </div>
  <div class="pct-display"><span id="pctNum">0</span>%</div>
  <p class="range-hint">Target window: <span class="target">70% – 80%</span> — Click Save Checkpoint in that range</p>
  <button id="saveBtn" onclick="onSave()">Save Checkpoint</button>
  <div id="feedback"></div>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const canvas = document.getElementById('gauge');
  const ctx = canvas.getContext('2d');
  const pctNumEl = document.getElementById('pctNum');

  const DURATION = 15000; // 15s to reach 100%
  const cx = 140, cy = 148, r = 120;
  const START_ANGLE = Math.PI; // 9 o'clock
  const END_ANGLE = 0;       // 3 o'clock (sweeps left to right via top)

  let startTime = null;
  let currentPct = 0;

  function drawGauge(pct) {
    ctx.clearRect(0, 0, 280, 160);

    // Background arc
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI, 0, false);
    ctx.lineWidth = 22;
    ctx.strokeStyle = '#333';
    ctx.stroke();

    // Target zone (70-80%)
    const zone70 = Math.PI - (0.70 * Math.PI);
    const zone80 = Math.PI - (0.80 * Math.PI);
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI - 0.70 * Math.PI, Math.PI - 0.80 * Math.PI, true);
    ctx.lineWidth = 22;
    ctx.strokeStyle = 'rgba(240,165,0,0.35)';
    ctx.stroke();

    // Value arc
    const sweep = pct / 100 * Math.PI;
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI, Math.PI - sweep, true);
    ctx.lineWidth = 22;
    const hue = pct < 70 ? 200 : pct <= 80 ? 42 : 4;
    const sat = pct < 70 ? 70 : pct <= 80 ? 90 : 80;
    ctx.strokeStyle = `hsl(${hue}, ${sat}%, 55%)`;
    ctx.stroke();

    // Tick marks
    for (let i = 0; i <= 10; i++) {
      const angle = Math.PI - (i / 10) * Math.PI;
      const inner = r - 18, outer = r + 4;
      const x1 = cx + inner * Math.cos(angle);
      const y1 = cy + inner * Math.sin(angle);
      const x2 = cx + (r - 26) * Math.cos(angle);
      const y2 = cy + (r - 26) * Math.sin(angle);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = i % 5 === 0 ? 2 : 1;
      ctx.stroke();
    }

    // Needle
    const needleAngle = Math.PI - (pct / 100) * Math.PI;
    const nx = cx + (r - 30) * Math.cos(needleAngle);
    const ny = cy + (r - 30) * Math.sin(needleAngle);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(nx, ny);
    ctx.strokeStyle = '#f0f0f0';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, 2 * Math.PI);
    ctx.fillStyle = '#e0e0e0';
    ctx.fill();
  }

  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    currentPct = Math.min(100, (elapsed / DURATION) * 100);
    drawGauge(currentPct);
    pctNumEl.textContent = Math.floor(currentPct);
    if (currentPct < 100) requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  function onSave() {
    const pct = currentPct;
    const fb = document.getElementById('feedback');
    if (pct >= 70 && pct <= 80) {
      taskResult = 'checkpoint_at_75';
      fb.textContent = `Checkpoint saved at ${Math.round(pct)}% — within target range!`;
      fb.className = 'success';
    } else {
      taskResult = 'wrong_time_' + Math.round(pct);
      fb.textContent = `Wrong timing! Saved at ${Math.round(pct)}% — target is 70-80%.`;
      fb.className = 'error';
    }
  }
</script>
</body>
</html>
