<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Auction</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a0a2e, #0f172a); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  .auction-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; width: 700px; overflow: hidden; margin-bottom: 20px; backdrop-filter: blur(10px); }
  .auction-hero { background: linear-gradient(135deg, #6d28d9, #4f46e5); padding: 24px 28px; }
  .auction-hero h1 { color: #fff; font-size: 1.3rem; font-weight: 800; }
  .auction-hero p { color: rgba(255,255,255,0.7); font-size: 0.82rem; margin-top: 4px; }
  .countdown-bar { background: rgba(0,0,0,0.3); height: 4px; border-radius: 2px; margin-top: 14px; overflow: hidden; }
  .countdown-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #c4b5fd); border-radius: 2px; transition: width 1s linear; }
  .main-price { text-align: center; padding: 28px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .price-label { font-size: 0.75rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .current-price { font-size: 4.5rem; font-weight: 900; color: #fbbf24; font-family: monospace; line-height: 1; text-shadow: 0 0 30px rgba(251,191,36,0.4); transition: all 0.4s; animation-fill-mode: both; }
  .current-price.bid-placed { animation: priceBump 0.5s ease; }
  @keyframes priceBump { 0%{transform:scale(1.15);color:#fff} 100%{transform:scale(1);color:#fbbf24} }
  .current-winner { margin-top: 8px; font-size: 1rem; color: #a78bfa; font-weight: 600; }
  .winner-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); border-radius: 20px; padding: 4px 14px; font-size: 0.85rem; }
  .bid-notification { background: rgba(34,197,94,0.15); border: 1px solid #22c55e; border-radius: 10px; margin: 0 20px 16px; padding: 12px 16px; display: none; animation: slideDown 0.4s ease; }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .bid-notification.show { display: flex; align-items: center; gap: 10px; }
  .bid-notification .notif-text { color: #4ade80; font-size: 0.85rem; font-weight: 600; }
  .bid-history { padding: 16px 20px; }
  .bid-history h3 { color: #64748b; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .bid-row { display: flex; align-items: center; gap: 14px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .bid-num { width: 24px; height: 24px; border-radius: 50%; background: #334155; color: #94a3b8; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .bidder-avatar { font-size: 1.2rem; }
  .bidder-name { flex: 1; color: #f1f5f9; font-weight: 600; font-size: 0.9rem; }
  .bid-amount { font-family: monospace; font-size: 1.1rem; font-weight: 800; color: #fbbf24; }
  .bid-time { color: #64748b; font-size: 0.72rem; }
  .starting-row { display: flex; align-items: center; gap: 14px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); color: #64748b; font-size: 0.82rem; }
  .answer-box { width: 700px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; backdrop-filter: blur(10px); }
  .answer-box label { color: #a5b4fc; font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 8px; }
  .answer-box textarea { width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #f1f5f9; font-size: 0.88rem; min-height: 90px; outline: none; resize: vertical; font-family: inherit; }
  .answer-box textarea:focus { border-color: #a78bfa; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn { background: linear-gradient(135deg, #6d28d9, #4f46e5); color: #fff; border: none; border-radius: 10px; padding: 10px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-restart { background: rgba(255,255,255,0.08); color: #94a3b8; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 10px 18px; font-size: 0.85rem; cursor: pointer; }
  .result-msg { font-size: 0.85rem; margin-top: 10px; font-weight: 600; display: none; }
</style>
</head>
<body>
<div class="auction-card">
  <div class="auction-hero">
    <h1>🔨 Live Auction — Lot #A-2847</h1>
    <p>Vintage 1962 Fender Stratocaster · Starting at $100</p>
    <div class="countdown-bar"><div class="countdown-fill" id="countdownFill" style="width:100%"></div></div>
  </div>

  <div class="main-price">
    <div class="price-label">Current Bid</div>
    <div class="current-price" id="currentPrice">$100</div>
    <div class="current-winner" id="currentWinner">
      <span class="winner-badge">⏳ Awaiting first bid...</span>
    </div>
  </div>

  <div class="bid-notification" id="bidNotification">
    <span style="font-size:1.2rem">🎉</span>
    <span class="notif-text" id="notifText">New bid placed!</span>
  </div>

  <div class="bid-history">
    <h3>Bid History</h3>
    <div class="starting-row">Starting price: <strong style="color:#c8d3f5">$100.00</strong></div>
    <div id="bidList"></div>
  </div>
</div>

<div class="answer-box">
  <label for="answerTA">Track the highest bidder after each bid:</label>
  <textarea id="answerTA" placeholder="Bid 1: Alice — $120&#10;Bid 2: Bob — $145&#10;..."></textarea>
  <div class="btn-row">
    <button class="btn" onclick="submitAnswer()">Submit</button>
    <button class="btn-restart" onclick="restartAuction()">Restart</button>
  </div>
  <div class="result-msg" id="resultMsg"></div>
</div>

<script>
let taskResult = 'pending';
window.getTaskResult = () => taskResult;

const AVATARS = { Alice: '👩', Bob: '👨', Carol: '👩‍🦰' };
const bids = [
  { t: 6000,  bidder: 'Alice', amount: 120, label: 'Bid 1' },
  { t: 12000, bidder: 'Bob',   amount: 145, label: 'Bid 2' },
  { t: 18000, bidder: 'Alice', amount: 160, label: 'Bid 3' },
  { t: 24000, bidder: 'Carol', amount: 175, label: 'Bid 4' },
  { t: 30000, bidder: 'Bob',   amount: 200, label: 'Bid 5' },
];

const TOTAL = 30000;
let timers = [];
let startTime = null;
let rafId = null;

function addBidRow(bid, idx) {
  const list = document.getElementById('bidList');
  const row = document.createElement('div');
  row.className = 'bid-row';
  row.innerHTML = `
    <div class="bid-num">${idx + 1}</div>
    <span class="bidder-avatar">${AVATARS[bid.bidder]}</span>
    <span class="bidder-name">${bid.bidder}</span>
    <span class="bid-amount">$${bid.amount.toLocaleString()}</span>
    <span class="bid-time">${bid.label}</span>
  `;
  list.appendChild(row);
}

function placeBid(bid, idx) {
  const priceEl = document.getElementById('currentPrice');
  priceEl.textContent = '$' + bid.amount.toLocaleString();
  priceEl.classList.remove('bid-placed');
  void priceEl.offsetWidth;
  priceEl.classList.add('bid-placed');

  document.getElementById('currentWinner').innerHTML =
    `<span class="winner-badge">🏆 ${AVATARS[bid.bidder]} ${bid.bidder} — $${bid.amount}</span>`;

  const notif = document.getElementById('bidNotification');
  document.getElementById('notifText').textContent = `${bid.bidder} just bid $${bid.amount}!`;
  notif.classList.add('show');
  setTimeout(() => notif.classList.remove('show'), 2500);

  addBidRow(bid, idx);
}

function updateCountdown() {
  const elapsed = Date.now() - startTime;
  const pct = Math.max(0, 100 - (elapsed / TOTAL * 100));
  document.getElementById('countdownFill').style.width = pct + '%';
  if (pct > 0) rafId = requestAnimationFrame(updateCountdown);
}

function startAuction() {
  startTime = Date.now();
  rafId = requestAnimationFrame(updateCountdown);
  bids.forEach((bid, i) => {
    timers.push(setTimeout(() => placeBid(bid, i), bid.t));
  });
}

function restartAuction() {
  timers.forEach(clearTimeout);
  cancelAnimationFrame(rafId);
  timers = [];
  taskResult = 'pending';
  document.getElementById('answerTA').value = '';
  document.getElementById('resultMsg').style.display = 'none';
  document.getElementById('currentPrice').textContent = '$100';
  document.getElementById('currentWinner').innerHTML = '<span class="winner-badge">⏳ Awaiting first bid...</span>';
  document.getElementById('bidList').innerHTML = '';
  document.getElementById('bidNotification').classList.remove('show');
  startAuction();
}

function submitAnswer() {
  const val = document.getElementById('answerTA').value;
  const msg = document.getElementById('resultMsg');
  if (val.length > 40) {
    taskResult = 'auction_tracked';
    msg.style.color = '#a78bfa';
    msg.textContent = 'Tracked! Final: Bid1→Alice $120, Bid2→Bob $145, Bid3→Alice $160, Bid4→Carol $175, Bid5→Bob $200.';
  } else {
    taskResult = 'incomplete';
    msg.style.color = '#f87171';
    msg.textContent = 'Please track all 5 bids and their highest bidder.';
  }
  msg.style.display = 'block';
}

startAuction();
</script>
</body>
</html>
