<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Dropdown Option</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 600px; width: 100%; padding: 32px; }
  .card h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 20px; }
  .instructions { background: #eef2ff; border-left: 4px solid #4f46e5; padding: 14px 18px; border-radius: 0 8px 8px 0; margin-bottom: 24px; font-size: 14px; color: #3730a3; line-height: 1.6; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 14px; font-weight: 600; color: #555; margin-bottom: 6px; }
  select { width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; outline: none; background: #fff; cursor: pointer; }
  select:focus { border-color: #4f46e5; }
  .submit-btn { margin-top: 16px; padding: 12px 28px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .submit-btn:hover { background: #4338ca; }
</style>
</head>
<body>
<div class="card">
  <h1>Task: Select a Dropdown Option</h1>
  <div class="instructions">
    From the dropdown below, select <strong>"Express Shipping (2-3 days)"</strong> and click Submit.
  </div>
  <div class="form-group">
    <label for="shippingSelect">Shipping Method:</label>
    <select id="shippingSelect">
      <option value="">-- Choose shipping method --</option>
      <option value="standard">Standard Shipping (7-10 days)</option>
      <option value="express">Express Shipping (2-3 days)</option>
      <option value="overnight">Overnight Shipping (next day)</option>
      <option value="pickup">In-Store Pickup</option>
    </select>
  </div>
  <button class="submit-btn" id="submitBtn">Submit</button>
</div>
<script>
(function() {
  let submitted = false;
  document.getElementById('submitBtn').addEventListener('click', function() {
    submitted = true;
  });
  window.getTaskResult = function() {
    const val = document.getElementById('shippingSelect').value;
    if (val === 'express') return 'dropdown_correct';
    if (val) return 'wrong_option';
    return 'no_selection';
  };
})();
</script>
</body>
</html>
