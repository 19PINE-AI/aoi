<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef's Table Podcast</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f23; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #0f0f23; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #fab1a0; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .player-card { background: #1a1a2e; border-radius: 16px; padding: 32px; width: 540px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .top-row { display: flex; gap: 20px; margin-bottom: 24px; }
  .artwork { width: 120px; height: 120px; border-radius: 12px; background: linear-gradient(135deg, #fab1a0, #e17055, #d63031); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .artwork-text { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.95); text-align: center; line-height: 1.2; }
  .meta { display: flex; flex-direction: column; justify-content: center; }
  .podcast-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .podcast-episode { font-size: 14px; color: #888; margin-bottom: 8px; }
  .podcast-desc { font-size: 13px; color: #666; line-height: 1.4; }
  .progress-container { margin-bottom: 20px; }
  .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #fab1a0; transition: width 0.5s linear; }
  .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 6px; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 28px; }
  .ctrl-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 20px; }
  .play-btn { width: 56px; height: 56px; border-radius: 50%; background: #e17055; border: none; color: #fff; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .divider { border: none; border-top: 1px solid #2a2a3e; margin: 20px 0; }
  .form-section h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #ccc; }
  .ingredient-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .ingredient-row input { background: #16162b; border: 1px solid #2a2a3e; border-radius: 8px; padding: 8px 12px; color: #e0e0e0; font-size: 14px; outline: none; }
  .ingredient-row input:focus { border-color: #e17055; }
  .ingredient-row .ing-name { flex: 2; }
  .ingredient-row .ing-qty { flex: 1; }
  .row-label { display: flex; gap: 10px; margin-bottom: 6px; }
  .row-label span { font-size: 12px; color: #666; }
  .row-label .l-name { flex: 2; }
  .row-label .l-qty { flex: 1; }
  .submit-btn { width: 100%; margin-top: 12px; padding: 10px; background: #e17055; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="player-card">
  <div class="top-row">
    <div class="artwork"><div class="artwork-text">Chef's<br>Table</div></div>
    <div class="meta">
      <div class="podcast-title">Chef's Table Podcast</div>
      <div class="podcast-episode">Episode 67 — Classic Tomato Basil Soup</div>
      <div class="podcast-desc">Listen carefully and build your shopping list!</div>
    </div>
  </div>
  <div class="progress-container">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-labels"><span id="elapsed">0:00</span><span>0:40</span></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn">&#9198;</button>
    <button class="play-btn" id="playBtn">&#9654;</button>
    <button class="ctrl-btn">&#9197;</button>
  </div>
  <hr class="divider">
  <div class="form-section">
    <h3>Shopping List — enter ingredients and quantities:</h3>
    <div class="row-label"><span class="l-name">Ingredient</span><span class="l-qty">Quantity</span></div>
    <div class="ingredient-row"><input class="ing-name" type="text" id="ing1" placeholder="Ingredient 1" autocomplete="off"><input class="ing-qty" type="text" id="qty1" placeholder="Amount" autocomplete="off"></div>
    <div class="ingredient-row"><input class="ing-name" type="text" id="ing2" placeholder="Ingredient 2" autocomplete="off"><input class="ing-qty" type="text" id="qty2" placeholder="Amount" autocomplete="off"></div>
    <div class="ingredient-row"><input class="ing-name" type="text" id="ing3" placeholder="Ingredient 3" autocomplete="off"><input class="ing-qty" type="text" id="qty3" placeholder="Amount" autocomplete="off"></div>
    <div class="ingredient-row"><input class="ing-name" type="text" id="ing4" placeholder="Ingredient 4" autocomplete="off"><input class="ing-qty" type="text" id="qty4" placeholder="Amount" autocomplete="off"></div>
    <div class="ingredient-row"><input class="ing-name" type="text" id="ing5" placeholder="Ingredient 5" autocomplete="off"><input class="ing-qty" type="text" id="qty5" placeholder="Amount" autocomplete="off"></div>
    <button class="submit-btn" id="submitBtn">Submit Shopping List</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const recipeSegments = [
    "Today we're making a classic tomato basil soup. Let me walk you through the ingredients.",
    "First, you'll need two pounds of Roma tomatoes. Make sure they're ripe and firm.",
    "Next, grab three cloves of garlic. Fresh garlic makes all the difference.",
    "You'll also need one cup of fresh basil leaves. Don't use dried, it won't be the same.",
    "Then, half a cup of heavy cream for that rich, velvety finish.",
    "And finally, two tablespoons of olive oil for sauteing."
  ];
  let audioPlayed = false;

  // Expected answers (order-independent matching)
  const expected = [
    { ing: 'tomato', qty: '2' },
    { ing: 'garlic', qty: '3' },
    { ing: 'basil', qty: '1' },
    { ing: 'cream', qty: 'half' },
    { ing: 'olive oil', qty: '2' }
  ];

  function startAudio() {
    if (audioPlayed) return;
    audioPlayed = true;
    const startTime = Date.now();
    const estDuration = 42000;
    const iv = setInterval(() => {
      const pct = Math.min(100, ((Date.now() - startTime) / estDuration) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      const sec = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('elapsed').textContent = '0:' + String(sec).padStart(2, '0');
      if (pct >= 100) clearInterval(iv);
    }, 200);
    document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';

    let idx = 0;
    function speakNext() {
      if (idx >= recipeSegments.length) {
        clearInterval(iv);
        document.getElementById('progressFill').style.width = '100%';
        return;
      }
      const u = new SpeechSynthesisUtterance(recipeSegments[idx]);
      u.rate = 0.9;
      u.lang = 'en-US';
      u.onend = () => { idx++; setTimeout(speakNext, 1800); };
      speechSynthesis.speak(u);
    }
    speakNext();
  }

  document.getElementById('playBtn').addEventListener('click', startAudio);
  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'all_ingredients_correct' ? 'All correct!' : 'Some entries are wrong or missing.';
  });

  window.getTaskResult = function() {
    // Gather all user entries
    const entries = [];
    for (let i = 1; i <= 5; i++) {
      const ing = document.getElementById('ing' + i).value.toLowerCase().trim();
      const qty = document.getElementById('qty' + i).value.toLowerCase().trim();
      if (ing) entries.push({ ing, qty });
    }
    // Check each expected ingredient is matched somewhere
    let matched = 0;
    for (const exp of expected) {
      for (const ent of entries) {
        if (ent.ing.includes(exp.ing) && ent.qty.includes(exp.qty)) {
          matched++;
          break;
        }
      }
    }
    if (matched >= 5) return 'all_ingredients_correct';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startAudio, 500);
  }, 2000);
</script>
</body>
</html>
