<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Policy Crossfire Podcast</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f23; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #0f0f23; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #e84393; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .player-card { background: #1a1a2e; border-radius: 16px; padding: 32px; width: 500px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .top-row { display: flex; gap: 20px; margin-bottom: 24px; }
  .artwork { width: 140px; height: 140px; border-radius: 12px; background: linear-gradient(135deg, #e84393, #6c5ce7); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .artwork-text { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.9); text-align: center; line-height: 1.2; }
  .meta { display: flex; flex-direction: column; justify-content: center; }
  .podcast-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .podcast-episode { font-size: 14px; color: #888; margin-bottom: 8px; }
  .podcast-desc { font-size: 13px; color: #666; line-height: 1.5; }
  .progress-container { margin-bottom: 20px; }
  .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #e84393; transition: width 0.5s linear; }
  .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 6px; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 28px; }
  .ctrl-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 20px; }
  .play-btn { width: 56px; height: 56px; border-radius: 50%; background: #e84393; border: none; color: #fff; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .divider { border: none; border-top: 1px solid #2a2a3e; margin: 20px 0; }
  .form-section h3 { font-size: 16px; font-weight: 500; margin-bottom: 12px; color: #ccc; }
  .form-section p { font-size: 13px; color: #666; margin-bottom: 12px; }
  textarea { width: 100%; background: #16162b; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px 14px; color: #e0e0e0; font-size: 14px; outline: none; resize: vertical; min-height: 120px; font-family: inherit; }
  textarea:focus { border-color: #e84393; }
  .submit-btn { width: 100%; margin-top: 12px; padding: 10px; background: #e84393; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="player-card">
  <div class="top-row">
    <div class="artwork"><div class="artwork-text">Policy<br>Crossfire</div></div>
    <div class="meta">
      <div class="podcast-title">Policy Crossfire</div>
      <div class="podcast-episode">Episode 33 — Energy Policy Debate</div>
      <div class="podcast-desc">Three experts debate the future of U.S. energy policy.</div>
    </div>
  </div>
  <div class="progress-container">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-labels"><span id="elapsed">0:00</span><span>0:50</span></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn">&#9198;</button>
    <button class="play-btn" id="playBtn">&#9654;</button>
    <button class="ctrl-btn">&#9197;</button>
  </div>
  <hr class="divider">
  <div class="form-section">
    <h3>Summarize the debate arguments</h3>
    <p>Write a summary covering the main points made by each side.</p>
    <textarea id="summary" placeholder="Type your summary of the debate here..."></textarea>
    <button class="submit-btn" id="submitBtn">Submit Summary</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const debateSegments = [
    "Welcome to Policy Crossfire. Today's topic: the future of energy policy in the United States. We have three perspectives to share.",
    "First, Doctor Martinez argues that renewable energy costs have dropped by sixty percent over the last decade. Solar and wind are now cheaper than coal in most regions. The economic case for transition is overwhelming.",
    "However, Professor Thompson pushes back, saying grid reliability remains a serious concern. Intermittent sources like solar and wind cannot provide the baseload power that industry requires. Without massive battery storage investment, we risk blackouts.",
    "Finally, Senator Park highlights the human dimension. The transition must account for the two hundred thousand workers currently employed in fossil fuel industries. Job retraining programs and transition support are essential to avoid devastating communities.",
    "In closing, all three agree that a phased approach is needed, but disagree on the timeline. Doctor Martinez wants full transition by twenty thirty-five, Professor Thompson argues for twenty forty-five, and Senator Park emphasizes that any timeline must include workforce guarantees."
  ];
  let audioPlayed = false;

  function startAudio() {
    if (audioPlayed) return;
    audioPlayed = true;
    const startTime = Date.now();
    const estDuration = 55000;
    const iv = setInterval(() => {
      const pct = Math.min(100, ((Date.now() - startTime) / estDuration) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      const sec = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      document.getElementById('elapsed').textContent = m + ':' + String(s).padStart(2, '0');
      if (pct >= 100) clearInterval(iv);
    }, 200);
    document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';

    let idx = 0;
    function speakNext() {
      if (idx >= debateSegments.length) {
        clearInterval(iv);
        document.getElementById('progressFill').style.width = '100%';
        return;
      }
      const u = new SpeechSynthesisUtterance(debateSegments[idx]);
      u.rate = 0.9;
      u.lang = 'en-US';
      u.onend = () => {
        idx++;
        setTimeout(speakNext, 2000);
      };
      speechSynthesis.speak(u);
    }
    speakNext();
  }

  document.getElementById('playBtn').addEventListener('click', startAudio);
  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'summary_submitted' ? 'Summary submitted for review.' : 'Please write a summary.';
  });

  window.getTaskResult = function() {
    const val = document.getElementById('summary').value.trim();
    if (val.length > 30) return 'summary_submitted';
    return 'incomplete';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startAudio, 500);
  }, 2000);
</script>
</body>
</html>
