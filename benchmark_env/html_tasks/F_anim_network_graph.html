<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Topology</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0d14;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #c0cfe0;
  }
  .panel {
    background: #0f1520;
    border: 1px solid #1e2a3a;
    border-radius: 14px;
    padding: 24px;
    width: 620px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  h1 { font-size: 16px; font-weight: 600; color: #7eb8d4; letter-spacing: 1px; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #445; margin-bottom: 16px; }
  canvas { border-radius: 10px; display: block; }
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px 0;
    font-size: 12px;
    color: #445566;
    border-top: 1px solid #1e2a3a;
    margin-top: 12px;
  }
  .legend {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #556;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-green { background: #3fb950; }
  .dot-gray { background: #445; }
  .answer-area {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  label { font-size: 13px; color: #7eb8d4; font-weight: 600; white-space: nowrap; }
  input[type="text"] {
    flex: 1;
    padding: 9px 12px;
    background: #1a2535;
    border: 1.5px solid #1e2a3a;
    border-radius: 8px;
    color: #c0cfe0;
    font-size: 13px;
    outline: none;
  }
  input[type="text"]:focus { border-color: #7eb8d4; }
  button {
    background: #1e3a5a;
    color: #7eb8d4;
    border: 1px solid #3a5a7a;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #264a6a; }
  #feedback { margin-top: 10px; font-size: 13px; font-weight: 600; min-height: 18px; }
  .correct { color: #3fb950; }
  .wrong { color: #f85149; }
</style>
</head>
<body>
<div class="panel">
  <h1>NETWORK TOPOLOGY MONITOR</h1>
  <p class="subtitle">Live connection state — observe until stabilization at t=30s</p>
  <canvas id="netCanvas" width="572" height="320"></canvas>
  <div class="status-bar">
    <div class="legend">
      <div class="legend-item"><div class="dot dot-green"></div>Connected</div>
      <div class="legend-item"><div class="dot dot-gray"></div>Isolated</div>
    </div>
    <span id="connCount" style="color:#445">connections: —</span>
    <span id="timeLabel">t=0s</span>
  </div>
  <div class="answer-area">
    <label>Connected nodes at 30s:</label>
    <input type="text" id="answer" placeholder="Enter number..." />
    <button onclick="submitAnswer()">Submit</button>
  </div>
  <div id="feedback"></div>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const canvas = document.getElementById('netCanvas');
  const ctx = canvas.getContext('2d');
  const W = 572, H = 320;

  // 10 nodes A-J placed in fixed positions
  const nodeLabels = ['A','B','C','D','E','F','G','H','I','J'];
  const positions = [
    [80, 80], [200, 60], [340, 70], [480, 90],
    [520, 200], [400, 270], [260, 290], [130, 260],
    [60, 180], [290, 160]
  ];

  // Connection phases
  // t=0: nodes connected = A,B,C (indices 0,1,2)
  // t=5: also D,E,F,G connected = 0..6 (7 total)
  // t=10-20: churn (some connect/disconnect)
  // t=20-30: stable: 0,1,2,3,4,5,6 connected (7), H,I,J isolated

  let elapsed = 0;

  function getConnectedSet(t) {
    if (t < 5) return new Set([0,1,2]);
    if (t < 10) return new Set([0,1,2,3,4,5,6]);
    if (t < 13) return new Set([0,1,2,3,4,5,6,7]); // brief H connects
    if (t < 16) return new Set([0,1,2,3,4,5,6,8]); // H drops, I connects
    if (t < 20) return new Set([0,1,2,3,4,5,6,7,8]); // churn: both H,I
    return new Set([0,1,2,3,4,5,6]); // stable: 7 connected
  }

  function getEdges(connected) {
    const c = [...connected];
    const edges = [];
    for (let i = 0; i < c.length; i++) {
      for (let j = i+1; j < c.length; j++) {
        if (Math.abs(c[i]-c[j]) <= 3) edges.push([c[i], c[j]]);
      }
    }
    return edges;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background grid
    ctx.strokeStyle = 'rgba(30,42,58,0.5)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }

    const connected = getConnectedSet(elapsed);
    const edges = getEdges(connected);

    // Draw edges
    edges.forEach(([a, b]) => {
      ctx.beginPath();
      ctx.moveTo(positions[a][0], positions[a][1]);
      ctx.lineTo(positions[b][0], positions[b][1]);
      ctx.strokeStyle = 'rgba(63,185,80,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Animated dot along edge
      const progress = (elapsed * 0.3) % 1;
      const px = positions[a][0] + (positions[b][0] - positions[a][0]) * progress;
      const py = positions[a][1] + (positions[b][1] - positions[a][1]) * progress;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, 2*Math.PI);
      ctx.fillStyle = 'rgba(63,185,80,0.6)';
      ctx.fill();
    });

    // Draw nodes
    nodeLabels.forEach((label, i) => {
      const [x, y] = positions[i];
      const isConn = connected.has(i);
      const nodeColor = isConn ? '#3fb950' : '#334';
      const glowColor = isConn ? 'rgba(63,185,80,0.3)' : 'transparent';

      // Glow
      if (isConn) {
        ctx.beginPath();
        ctx.arc(x, y, 22, 0, 2*Math.PI);
        ctx.fillStyle = glowColor;
        ctx.fill();
      }

      // Node circle
      ctx.beginPath();
      ctx.arc(x, y, 16, 0, 2*Math.PI);
      ctx.fillStyle = isConn ? '#1a3020' : '#1a1f2a';
      ctx.fill();
      ctx.strokeStyle = nodeColor;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Label
      ctx.fillStyle = isConn ? '#3fb950' : '#446';
      ctx.font = 'bold 13px Segoe UI, Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, x, y);
    });

    // Count
    document.getElementById('connCount').textContent = `connected: ${connected.size} / 10`;
  }

  draw();

  const timer = setInterval(() => {
    elapsed++;
    document.getElementById('timeLabel').textContent = `t=${elapsed}s`;
    draw();
    if (elapsed >= 35) clearInterval(timer);
  }, 1000);

  function submitAnswer() {
    const val = document.getElementById('answer').value.trim();
    const fb = document.getElementById('feedback');
    if (val.includes('7')) {
      taskResult = 'count_correct';
      fb.textContent = 'Correct! 7 nodes remain connected after 30s (A-G), 3 are isolated (H, I, J).';
      fb.className = 'correct';
    } else {
      taskResult = 'count_wrong';
      fb.textContent = 'Incorrect. Observe the graph at t=30s and count the green nodes.';
      fb.className = 'wrong';
    }
  }
</script>
</body>
</html>
