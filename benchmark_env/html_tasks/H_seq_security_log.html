<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Event Log — SIEM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .siem-card { background: #0f1117; border: 1px solid #1e2030; border-radius: 12px; width: 760px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.8); }
  .siem-header { background: #13151f; border-bottom: 1px solid #1e2030; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .siem-title { color: #c8d3f5; font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .live-badge { background: #1e0b0b; border: 1px solid #dc2626; color: #f87171; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .siem-meta { display: flex; gap: 16px; font-size: 0.75rem; color: #565f89; }
  .log-viewer { background: #0a0a0f; font-family: 'Courier New', monospace; min-height: 280px; padding: 16px; overflow-y: auto; }
  .log-entry { display: flex; gap: 12px; padding: 5px 8px; border-radius: 4px; margin-bottom: 3px; animation: slideIn 0.3s ease; font-size: 0.82rem; border-left: 3px solid transparent; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  .log-entry.INFO { border-left-color: #4fc1ff; }
  .log-entry.WARN { border-left-color: #f59e0b; background: rgba(245,158,11,0.05); }
  .log-entry.CRITICAL { border-left-color: #dc2626; background: rgba(220,38,38,0.1); animation: critPulse 0.5s ease; }
  @keyframes critPulse { 0%{ background: rgba(220,38,38,0.3); } 100%{ background: rgba(220,38,38,0.1); } }
  .log-time { color: #565f89; flex-shrink: 0; }
  .log-level { font-weight: 700; flex-shrink: 0; min-width: 70px; }
  .level-INFO { color: #4fc1ff; }
  .level-WARN { color: #f59e0b; }
  .level-DEBUG { color: #7c819b; }
  .level-CRITICAL { color: #f87171; }
  .log-msg { color: #c8d3f5; flex: 1; }
  .log-msg .highlight { background: rgba(220,38,38,0.2); color: #ff6b6b; padding: 0 3px; border-radius: 2px; font-weight: 700; }
  .event-counter { background: #13151f; border-top: 1px solid #1e2030; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; color: #565f89; }
  .threat-indicator { display: flex; align-items: center; gap: 8px; }
  .threat-dot { width: 8px; height: 8px; border-radius: 50%; background: #dc2626; animation: blink 0.5s infinite; }
  .threat-text { color: #f87171; font-weight: 700; }
  .answer-box { width: 760px; background: #13151f; border: 1px solid #1e2030; border-radius: 12px; padding: 20px; }
  .answer-box label { color: #8b949e; font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 8px; }
  .answer-box input { width: 100%; padding: 10px 14px; background: #0a0a0f; border: 1px solid #1e2030; border-radius: 8px; color: #c8d3f5; font-size: 0.95rem; outline: none; font-family: inherit; }
  .answer-box input:focus { border-color: #388bfd; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn { background: #dc2626; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-restart { background: #1e2030; color: #8b949e; border: 1px solid #30363d; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; cursor: pointer; }
  .result-msg { font-size: 0.85rem; margin-top: 10px; font-weight: 600; display: none; }
</style>
</head>
<body>
<div class="siem-card">
  <div class="siem-header">
    <div class="siem-title">
      🛡️ SIEM Event Viewer
      <span class="live-badge">● LIVE</span>
    </div>
    <div class="siem-meta">
      <span>Host: prod-srv-01</span>
      <span id="eventCount">Events: 0</span>
    </div>
  </div>
  <div class="log-viewer" id="logViewer"></div>
  <div class="event-counter">
    <span id="footerStatus">Monitoring active...</span>
    <div class="threat-indicator" id="threatIndicator" style="display:none">
      <div class="threat-dot"></div>
      <span class="threat-text">INCIDENT DETECTED — Event #4</span>
    </div>
  </div>
</div>

<div class="answer-box">
  <label for="answerInput">At which event number did the compromise occur?</label>
  <input type="text" id="answerInput" placeholder="Enter the event number..." />
  <div class="btn-row">
    <button class="btn" onclick="submitAnswer()">Submit</button>
    <button class="btn-restart" onclick="restartLog()">Restart</button>
  </div>
  <div class="result-msg" id="resultMsg"></div>
</div>

<script>
let taskResult = 'pending';
window.getTaskResult = () => taskResult;

const events = [
  { level: 'INFO',     time: '08:01:02', msg: 'User alice logged in from 192.168.1.5' },
  { level: 'INFO',     time: '08:01:45', msg: 'Normal file access pattern' },
  { level: 'INFO',     time: '08:02:11', msg: 'Database query executed' },
  { level: 'WARN',     time: '08:03:55', msg: '<span class="highlight">⚠ Failed login attempt from 185.220.101.47</span> — TOR exit node detected', compromise: true },
  { level: 'CRITICAL', time: '08:03:56', msg: '<span class="highlight">UNAUTHORIZED ACCESS: /admin/users</span> — privilege escalation attempt' },
  { level: 'CRITICAL', time: '08:04:01', msg: '<span class="highlight">DATA EXFILTRATION ATTEMPT DETECTED</span> — 42MB outbound to 185.220.101.47' },
  { level: 'CRITICAL', time: '08:04:05', msg: '<span class="highlight">SYSTEM BREACH CONFIRMED</span> — attacker has shell access on prod-srv-01' },
];

let timers = [];
let count = 0;

function addEntry(event, idx) {
  count++;
  document.getElementById('eventCount').textContent = 'Events: ' + count;
  const viewer = document.getElementById('logViewer');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + event.level;
  entry.innerHTML = `
    <span class="log-time">${event.time}</span>
    <span class="log-level level-${event.level}">[${event.level}]</span>
    <span class="log-msg">#${idx+1} ${event.msg}</span>
  `;
  viewer.appendChild(entry);
  viewer.scrollTop = viewer.scrollHeight;

  if (event.compromise) {
    setTimeout(() => {
      document.getElementById('threatIndicator').style.display = 'flex';
      document.getElementById('footerStatus').textContent = 'ALERT: Security incident in progress!';
    }, 200);
  }
}

function runLog() {
  events.forEach((ev, i) => {
    timers.push(setTimeout(() => addEntry(ev, i), i * 4000 + 500));
  });
}

function restartLog() {
  timers.forEach(clearTimeout);
  timers = [];
  count = 0;
  taskResult = 'pending';
  document.getElementById('answerInput').value = '';
  document.getElementById('resultMsg').style.display = 'none';
  document.getElementById('logViewer').innerHTML = '';
  document.getElementById('eventCount').textContent = 'Events: 0';
  document.getElementById('threatIndicator').style.display = 'none';
  document.getElementById('footerStatus').textContent = 'Monitoring active...';
  runLog();
}

function submitAnswer() {
  const val = document.getElementById('answerInput').value.toLowerCase();
  const msg = document.getElementById('resultMsg');
  if (val.includes('4') || val.includes('event 4') || val.includes('four')) {
    taskResult = 'incident_identified';
    msg.style.color = '#22c55e';
    msg.textContent = 'Correct! Event #4 (WARN: Failed login from TOR node 185.220.101.47) marks the start of the compromise.';
  } else {
    taskResult = 'incorrect';
    msg.style.color = '#f87171';
    msg.textContent = 'Incorrect. Watch for the first anomalous/warning event in the sequence.';
  }
  msg.style.display = 'block';
}

runLog();
</script>
</body>
</html>
