<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Tree Flowchart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .flowchart-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 720px; padding: 28px; margin-bottom: 20px; }
  .flowchart-card h2 { font-size: 1.1rem; color: #1e293b; margin-bottom: 20px; text-align: center; }
  svg { display: block; margin: 0 auto; }
  .node { transition: all 0.5s; }
  .node-start rect { fill: #e0f2fe; stroke: #0ea5e9; stroke-width: 2; rx: 20; }
  .node-start text { fill: #0c4a6e; font-weight: 700; }
  .node-decision polygon { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
  .node-decision text { fill: #78350f; font-size: 12px; font-weight: 600; }
  .node-result rect { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 8; }
  .node-result text { fill: #14532d; font-weight: 700; }
  .node-result-no rect { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 8; }
  .node-result-no text { fill: #7f1d1d; font-weight: 700; }
  .edge { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); transition: all 0.5s; }
  .edge-label { fill: #64748b; font-size: 11px; font-weight: 600; }
  .active-node rect, .active-node polygon { fill: #bfdbfe !important; stroke: #2563eb !important; stroke-width: 3 !important; filter: drop-shadow(0 0 8px rgba(37,99,235,0.5)); }
  .active-node text { fill: #1e3a8a !important; }
  .active-edge { stroke: #2563eb !important; stroke-width: 3 !important; }
  .path-taken rect { fill: #dbeafe !important; stroke: #2563eb !important; }
  .path-taken text { fill: #1e3a8a !important; }
  .answer-box { width: 720px; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 20px; }
  .answer-box label { font-size: 0.85rem; color: #475569; font-weight: 600; display: block; margin-bottom: 8px; }
  .answer-box input { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; outline: none; }
  .answer-box input:focus { border-color: #2563eb; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-restart { background: #e2e8f0; color: #475569; border: none; border-radius: 8px; padding: 10px 18px; font-size: 0.85rem; cursor: pointer; }
  .result-msg { font-size: 0.85rem; margin-top: 10px; font-weight: 600; display: none; }
  .legend { display: flex; gap: 20px; justify-content: center; margin-bottom: 16px; font-size: 0.78rem; color: #64748b; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>
<div class="flowchart-card">
  <h2>Business Strategy Decision Tree</h2>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#bfdbfe;border:2px solid #2563eb"></div> Current node</div>
    <div class="legend-item"><div class="legend-dot" style="background:#dbeafe;border:2px solid #2563eb"></div> Path taken</div>
  </div>

  <svg width="660" height="380" viewBox="0 0 660 380">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
      </marker>
      <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
      </marker>
    </defs>

    <!-- Edges -->
    <line id="e0" class="edge" x1="330" y1="60" x2="330" y2="105"/>
    <text class="edge-label" x="336" y="88">Start</text>

    <!-- Start → D1 -->
    <line id="e1" class="edge" x1="330" y1="140" x2="330" y2="165"/>

    <!-- D1 YES (right path) -->
    <polyline id="e2yes" class="edge" points="380,175 480,175 480,235"/>
    <text class="edge-label" id="el2yes" x="405" y="168">YES &gt;$1M</text>

    <!-- D1 NO (left path) -->
    <polyline id="e2no" class="edge" points="280,175 160,175 160,235"/>
    <text class="edge-label" id="el2no" x="172" y="168">NO</text>

    <!-- D2 YES (right path) -->
    <polyline id="e3yes" class="edge" points="530,270 600,270 600,330"/>
    <text class="edge-label" id="el3yes" x="540" y="263">YES</text>

    <!-- D2 NO (down) -->
    <polyline id="e3no" class="edge" points="430,270 430,330"/>
    <text class="edge-label" id="el3no" x="436" y="308">NO</text>

    <!-- D1 NO result -->
    <line id="e4" class="edge" x1="160" y1="275" x2="160" y2="330"/>

    <!-- Start node -->
    <g class="node" id="nStart">
      <rect x="255" y="20" width="150" height="40" rx="20" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
      <text x="330" y="46" text-anchor="middle" fill="#0c4a6e" font-weight="700" font-size="13">Company Assessment</text>
    </g>

    <!-- Decision 1 -->
    <g class="node" id="nD1">
      <polygon points="330,108 410,150 330,192 250,150" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="330" y="146" text-anchor="middle" fill="#78350f" font-size="11" font-weight="600">Revenue</text>
      <text x="330" y="160" text-anchor="middle" fill="#78350f" font-size="11" font-weight="600">&gt; $1M?</text>
    </g>

    <!-- Decision 2 (right branch) -->
    <g class="node" id="nD2">
      <polygon points="480,232 553,270 480,308 407,270" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="480" y="266" text-anchor="middle" fill="#78350f" font-size="11" font-weight="600">Profitable?</text>
    </g>

    <!-- Path B: Expansion (right-right) -->
    <g class="node" id="nPathB">
      <rect x="545" y="330" width="120" height="44" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
      <text x="605" y="349" text-anchor="middle" fill="#14532d" font-weight="700" font-size="11">Path B:</text>
      <text x="605" y="363" text-anchor="middle" fill="#14532d" font-weight="700" font-size="11">Expansion</text>
    </g>

    <!-- Path C: Restructure (right-no) -->
    <g class="node" id="nPathC">
      <rect x="380" y="330" width="110" height="44" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
      <text x="435" y="349" text-anchor="middle" fill="#7f1d1d" font-weight="700" font-size="11">Path C:</text>
      <text x="435" y="363" text-anchor="middle" fill="#7f1d1d" font-weight="700" font-size="11">Restructure</text>
    </g>

    <!-- Path A: Grow (left branch) -->
    <g class="node" id="nPathA">
      <rect x="95" y="330" width="130" height="44" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
      <text x="160" y="349" text-anchor="middle" fill="#7f1d1d" font-weight="700" font-size="11">Path A:</text>
      <text x="160" y="363" text-anchor="middle" fill="#7f1d1d" font-weight="700" font-size="11">Growth Phase</text>
    </g>
  </svg>
</div>

<div class="answer-box">
  <label for="answerInput">Which path was taken?</label>
  <input type="text" id="answerInput" placeholder="Name the path that was highlighted blue..." />
  <div class="btn-row">
    <button class="btn" onclick="submitAnswer()">Submit</button>
    <button class="btn-restart" onclick="restartTree()">Restart</button>
  </div>
  <div class="result-msg" id="resultMsg"></div>
</div>

<script>
let taskResult = 'pending';
window.getTaskResult = () => taskResult;

let timers = [];

function activateNode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const rect = el.querySelector('rect, polygon');
  if (rect) {
    rect.style.fill = '#bfdbfe';
    rect.style.stroke = '#2563eb';
    rect.style.strokeWidth = '3';
    rect.style.filter = 'drop-shadow(0 0 8px rgba(37,99,235,0.5))';
  }
  const texts = el.querySelectorAll('text');
  texts.forEach(t => t.style.fill = '#1e3a8a');
}

function activateEdge(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.stroke = '#2563eb';
  el.style.strokeWidth = '3';
}

function pathTaken(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const rect = el.querySelector('rect, polygon');
  if (rect) {
    rect.style.fill = '#dbeafe';
    rect.style.stroke = '#2563eb';
    rect.style.strokeWidth = '3';
  }
  const texts = el.querySelectorAll('text');
  texts.forEach(t => t.style.fill = '#1e3a8a');
}

function runTree() {
  // t=0: Start node
  activateNode('nStart');

  // t=3s: D1
  timers.push(setTimeout(() => {
    pathTaken('nStart');
    activateEdge('e1');
    activateNode('nD1');
  }, 3000));

  // t=6s: YES path to D2
  timers.push(setTimeout(() => {
    pathTaken('nD1');
    activateEdge('e2yes');
    activateNode('nD2');
  }, 6000));

  // t=9s: YES path to Path B
  timers.push(setTimeout(() => {
    pathTaken('nD2');
    activateEdge('e3yes');
    activateNode('nPathB');
  }, 9000));

  // t=11s: Path B fully highlighted
  timers.push(setTimeout(() => {
    pathTaken('nPathB');
  }, 11000));
}

function resetNode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const shapes = el.querySelectorAll('rect, polygon');
  shapes.forEach(s => {
    s.style.fill = '';
    s.style.stroke = '';
    s.style.strokeWidth = '';
    s.style.filter = '';
  });
  const texts = el.querySelectorAll('text');
  texts.forEach(t => t.style.fill = '');
}

function resetEdge(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.stroke = '';
  el.style.strokeWidth = '';
}

function restartTree() {
  timers.forEach(clearTimeout);
  timers = [];
  taskResult = 'pending';
  document.getElementById('answerInput').value = '';
  document.getElementById('resultMsg').style.display = 'none';
  ['nStart','nD1','nD2','nPathB','nPathC','nPathA'].forEach(resetNode);
  ['e0','e1','e2yes','e2no','e3yes','e3no','e4'].forEach(resetEdge);
  runTree();
}

function submitAnswer() {
  const val = document.getElementById('answerInput').value.toLowerCase();
  const msg = document.getElementById('resultMsg');
  if (val.includes('path b') || (val.includes('b') && (val.includes('expand') || val.includes('path')))) {
    taskResult = 'path_correct';
    msg.style.color = '#16a34a';
    msg.textContent = 'Correct! Path B: Expansion was taken (Revenue > $1M = YES, Profitable = YES).';
  } else if (val === 'b') {
    taskResult = 'path_correct';
    msg.style.color = '#16a34a';
    msg.textContent = 'Correct! Path B: Expansion.';
  } else {
    taskResult = 'incorrect';
    msg.style.color = '#dc2626';
    msg.textContent = 'Incorrect. Follow the blue highlighted path through the decision tree.';
  }
  msg.style.display = 'block';
}

runTree();
</script>
</body>
</html>
