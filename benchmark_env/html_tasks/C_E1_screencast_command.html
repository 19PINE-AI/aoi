<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Recording Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f23; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #0f0f23; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #00ff41; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .container { width: 700px; }
  .terminal-wrapper { background: #1a1a2e; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); margin-bottom: 24px; }
  .terminal-header { background: #2d2d44; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f56; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #27ca40; }
  .terminal-title { margin-left: 12px; font-size: 13px; color: #888; font-family: monospace; }
  .terminal-body { background: #0a0a16; padding: 20px; min-height: 260px; font-family: 'Courier New', monospace; font-size: 14px; color: #00ff41; line-height: 1.6; }
  .terminal-body .prompt { color: #00ff41; }
  .terminal-body .output { color: #888; }
  .cursor { display: inline-block; width: 8px; height: 16px; background: #00ff41; animation: blink 0.8s step-end infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }
  .player-controls { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #16213e; }
  .progress-track { flex: 1; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #00ff41; transition: width 0.3s linear; }
  .time-label { font-size: 12px; color: #666; font-family: monospace; }
  .frame-label { font-size: 12px; color: #888; text-align: right; padding: 6px 16px; }
  .divider { border: none; border-top: 1px solid #2a2a3e; margin: 20px 0; }
  .form-section { background: #1a1a2e; border-radius: 12px; padding: 24px; }
  .form-section h3 { font-size: 16px; font-weight: 500; margin-bottom: 12px; color: #ccc; }
  .input-group { display: flex; flex-direction: column; gap: 8px; }
  .input-group label { font-size: 13px; color: #888; }
  .input-group input { background: #16162b; border: 1px solid #2a2a3e; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .input-group input:focus { border-color: #00ff41; }
  .submit-btn { width: 100%; margin-top: 12px; padding: 10px; background: #00cc33; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .submit-btn:hover { background: #00e639; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="container">
  <div class="terminal-wrapper">
    <div class="terminal-header">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span class="terminal-title">user@dev — bash — 80x24</span>
    </div>
    <div class="terminal-body" id="terminalBody"></div>
    <div class="player-controls">
      <span class="time-label" id="elapsed">0:00</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="time-label" id="duration">0:09</span>
    </div>
    <div class="frame-label" id="frameLabel">Frame 1 / 3</div>
  </div>
  <div class="form-section">
    <h3>What was the first command executed?</h3>
    <div class="input-group">
      <label for="answerInput">First command</label>
      <input type="text" id="answerInput" placeholder="Enter the first command you saw..." autocomplete="off">
    </div>
    <button class="submit-btn" id="submitBtn">Submit Answer</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const frames = [
    {
      lines: [
        { type: 'typed', prefix: '$ ', text: 'git clone https://github.com/example/repo.git', delay: 60 }
      ]
    },
    {
      lines: [
        { type: 'instant', text: '$ git clone https://github.com/example/repo.git', cls: 'prompt' },
        { type: 'instant', text: 'Cloning into \'repo\'...', cls: 'output' },
        { type: 'instant', text: 'remote: Enumerating objects: 247, done.', cls: 'output' },
        { type: 'instant', text: 'remote: Counting objects: 100% (247/247), done.', cls: 'output' },
        { type: 'instant', text: 'remote: Compressing objects: 100% (183/183), done.', cls: 'output' },
        { type: 'instant', text: 'Receiving objects: 100% (247/247), 1.42 MiB | 12.3 MiB/s, done.', cls: 'output' },
        { type: 'instant', text: 'Resolving deltas: 100% (89/89), done.', cls: 'output' }
      ]
    },
    {
      lines: [
        { type: 'typed', prefix: '$ ', text: 'cd repo', delay: 80 },
        { type: 'pause', ms: 400 },
        { type: 'typed', prefix: '~/repo$ ', text: 'npm install', delay: 70 },
        { type: 'pause', ms: 600 },
        { type: 'instant', text: 'added 1247 packages in 14s', cls: 'output' },
        { type: 'instant', text: '142 packages are looking for funding', cls: 'output' },
        { type: 'instant', text: '  run `npm fund` for details', cls: 'output' }
      ]
    }
  ];

  let currentFrame = 0;
  let startTime;
  const totalDuration = 9000;
  let progressInterval;

  function clearTerminal() {
    document.getElementById('terminalBody').innerHTML = '';
  }

  function typeText(container, prefix, text, delay, callback) {
    const line = document.createElement('div');
    const prefixSpan = document.createElement('span');
    prefixSpan.className = 'prompt';
    prefixSpan.textContent = prefix;
    line.appendChild(prefixSpan);
    const textSpan = document.createElement('span');
    line.appendChild(textSpan);
    const cursorSpan = document.createElement('span');
    cursorSpan.className = 'cursor';
    cursorSpan.innerHTML = '&nbsp;';
    line.appendChild(cursorSpan);
    container.appendChild(line);
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        textSpan.textContent += text[i];
        i++;
      } else {
        clearInterval(interval);
        cursorSpan.remove();
        if (callback) callback();
      }
    }, delay);
  }

  function addInstantLine(container, text, cls) {
    const line = document.createElement('div');
    line.className = cls || '';
    line.textContent = text;
    container.appendChild(line);
  }

  function renderFrame(frameIndex) {
    clearTerminal();
    const frame = frames[frameIndex];
    const container = document.getElementById('terminalBody');
    document.getElementById('frameLabel').textContent = `Frame ${frameIndex + 1} / ${frames.length}`;
    let lineIndex = 0;
    function processLine() {
      if (lineIndex >= frame.lines.length) return;
      const item = frame.lines[lineIndex];
      lineIndex++;
      if (item.type === 'typed') {
        typeText(container, item.prefix || '', item.text, item.delay, processLine);
      } else if (item.type === 'instant') {
        addInstantLine(container, item.text, item.cls);
        processLine();
      } else if (item.type === 'pause') {
        setTimeout(processLine, item.ms);
      }
    }
    processLine();
  }

  function startPlayback() {
    startTime = Date.now();
    currentFrame = 0;
    renderFrame(0);
    progressInterval = setInterval(() => {
      const elapsed = Date.now() - startTime;
      const pct = Math.min(100, (elapsed / totalDuration) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      const sec = Math.floor(elapsed / 1000);
      document.getElementById('elapsed').textContent = '0:' + String(sec).padStart(2, '0');
    }, 200);
    setTimeout(() => { currentFrame = 1; renderFrame(1); }, 3000);
    setTimeout(() => { currentFrame = 2; renderFrame(2); }, 6000);
    setTimeout(() => { clearInterval(progressInterval); document.getElementById('progressFill').style.width = '100%'; document.getElementById('elapsed').textContent = '0:09'; }, totalDuration);
  }

  document.getElementById('submitBtn').addEventListener('click', () => {
    const result = window.getTaskResult();
    document.getElementById('status').textContent = result === 'command_correct' ? 'Correct!' : 'Try again.';
  });

  window.getTaskResult = function() {
    const val = document.getElementById('answerInput').value.toLowerCase().trim();
    if (val.includes('git clone')) return 'command_correct';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startPlayback, 500);
  }, 2000);
</script>
</body>
</html>
