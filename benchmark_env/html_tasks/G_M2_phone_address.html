<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Call — Address</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #ff7043; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .phone-layout { display: flex; gap: 24px; align-items: flex-start; }
  .phone-card { background: #16213e; border-radius: 16px; padding: 28px; width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; flex-shrink: 0; }
  .call-status { font-size: 13px; color: #ff7043; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #ff7043, #d84315); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; }
  .caller-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .caller-sub { font-size: 13px; color: #888; margin-bottom: 12px; }
  .call-timer { font-size: 24px; font-weight: 300; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
  .call-actions { display: flex; justify-content: center; gap: 16px; }
  .action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; }
  .btn-mute { background: #333; }
  .btn-speaker { background: #333; }
  .btn-end { background: #e53935; }
  .notepad { background: #16213e; border-radius: 16px; padding: 28px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .notepad h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #ff7043; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
  .field input { width: 100%; background: #0f1a30; border: 1px solid #2a2a4e; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: #ff7043; }
  .submit-btn { width: 100%; margin-top: 8px; padding: 10px; background: #ff7043; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
  .submit-btn:hover { background: #ff8a65; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="phone-layout">
  <div class="phone-card">
    <div class="call-status" id="callStatus">Calling...</div>
    <div class="avatar">&#128222;</div>
    <div class="caller-name">Shipping Dept.</div>
    <div class="caller-sub">Confirming address</div>
    <div class="call-timer" id="timer">00:00</div>
    <div class="call-actions">
      <button class="action-btn btn-mute">&#128263;</button>
      <button class="action-btn btn-speaker">&#128264;</button>
      <button class="action-btn btn-end">&#128381;</button>
    </div>
  </div>
  <div class="notepad">
    <h3>Shipping Address Notepad</h3>
    <div class="field"><label>Street</label><input type="text" id="street" placeholder="Street address..." autocomplete="off"></div>
    <div class="field"><label>City</label><input type="text" id="city" placeholder="City..." autocomplete="off"></div>
    <div class="field"><label>State</label><input type="text" id="state" placeholder="State..." autocomplete="off"></div>
    <div class="field"><label>Zip Code</label><input type="text" id="zip" placeholder="Zip..." autocomplete="off"></div>
    <button class="submit-btn" id="submitBtn">Submit Address</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const audioText = "The shipping address is: seven four two Evergreen Terrace, Springfield, Illinois, six two seven zero four.";
  let audioPlayed = false;
  let timerSec = 0;

  setInterval(() => {
    timerSec++;
    const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
    const s = String(timerSec % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);

  function startAudio() {
    if (audioPlayed) return;
    audioPlayed = true;
    document.getElementById('callStatus').textContent = 'Connected';
    const u = new SpeechSynthesisUtterance(audioText);
    u.rate = 0.8; u.lang = 'en-US';
    speechSynthesis.speak(u);
  }

  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'address_correct' ? 'Address confirmed!' : 'Please check your entries.';
  });

  window.getTaskResult = function() {
    const street = document.getElementById('street').value.toLowerCase().trim();
    const city = document.getElementById('city').value.toLowerCase().trim();
    const state = document.getElementById('state').value.toLowerCase().trim();
    const zip = document.getElementById('zip').value.replace(/\s/g, '');
    const streetOk = street.includes('742') && street.includes('evergreen');
    const cityOk = city.includes('springfield');
    const stateOk = state.includes('il') || state.includes('illinois');
    const zipOk = zip.includes('62704');
    if (streetOk && cityOk && stateOk && zipOk) return 'address_correct';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startAudio, 500);
  }, 2000);
</script>
</body>
</html>
