<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founders Hour Podcast</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f23; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #0f0f23; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #fdcb6e; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .player-card { background: #1a1a2e; border-radius: 16px; padding: 32px; width: 440px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .artwork { width: 100%; aspect-ratio: 1; border-radius: 12px; background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .artwork-text { font-size: 38px; font-weight: 700; color: rgba(255,255,255,0.95); text-align: center; line-height: 1.2; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .podcast-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .podcast-episode { font-size: 14px; color: #888; margin-bottom: 20px; }
  .progress-container { margin-bottom: 20px; }
  .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #fdcb6e; transition: width 0.5s linear; }
  .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 6px; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 28px; }
  .ctrl-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 20px; }
  .play-btn { width: 56px; height: 56px; border-radius: 50%; background: #fdcb6e; border: none; color: #2d3436; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .divider { border: none; border-top: 1px solid #2a2a3e; margin: 20px 0; }
  .form-section h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #ccc; }
  .input-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .input-row label { font-size: 13px; color: #888; }
  .input-row input { background: #16162b; border: 1px solid #2a2a3e; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 15px; outline: none; }
  .input-row input:focus { border-color: #fdcb6e; }
  .submit-btn { width: 100%; margin-top: 8px; padding: 10px; background: #fdcb6e; border: none; border-radius: 8px; color: #2d3436; font-size: 15px; font-weight: 600; cursor: pointer; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="player-card">
  <div class="artwork"><div class="artwork-text">Founders<br>Hour</div></div>
  <div class="podcast-title">Founders Hour</div>
  <div class="podcast-episode">Episode 78 — Scaling Stories</div>
  <div class="progress-container">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-labels"><span id="elapsed">0:00</span><span>0:14</span></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn">&#9198;</button>
    <button class="play-btn" id="playBtn">&#9654;</button>
    <button class="ctrl-btn">&#9197;</button>
  </div>
  <hr class="divider">
  <div class="form-section">
    <h3>Company details mentioned:</h3>
    <div class="input-row">
      <label for="yearFounded">Year Founded</label>
      <input type="text" id="yearFounded" placeholder="e.g. 2015" autocomplete="off">
    </div>
    <div class="input-row">
      <label for="employees">Number of Employees</label>
      <input type="text" id="employees" placeholder="e.g. 250" autocomplete="off">
    </div>
    <button class="submit-btn" id="submitBtn">Submit Answer</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const audioText = "We founded the company in twenty eighteen, and now we have three hundred and forty employees across twelve offices worldwide.";
  let audioPlayed = false;

  function startAudio() {
    if (audioPlayed) return;
    audioPlayed = true;
    const u = new SpeechSynthesisUtterance(audioText);
    u.rate = 0.9;
    u.lang = 'en-US';
    const startTime = Date.now();
    const estDuration = 14000;
    const iv = setInterval(() => {
      const pct = Math.min(100, ((Date.now() - startTime) / estDuration) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      const sec = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('elapsed').textContent = '0:' + String(sec).padStart(2, '0');
      if (pct >= 100) clearInterval(iv);
    }, 200);
    u.onend = () => { clearInterval(iv); document.getElementById('progressFill').style.width = '100%'; };
    document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';
    speechSynthesis.speak(u);
  }

  document.getElementById('playBtn').addEventListener('click', startAudio);
  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'both_correct' ? 'Correct!' : 'Try again.';
  });

  window.getTaskResult = function() {
    const year = document.getElementById('yearFounded').value.trim();
    const emp = document.getElementById('employees').value.trim();
    const yearOk = year.includes('2018');
    const empOk = emp.includes('340');
    if (yearOk && empOk) return 'both_correct';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startAudio, 500);
  }, 2000);
</script>
</body>
</html>
