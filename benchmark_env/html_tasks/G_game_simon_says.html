<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon Says</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #e0e0e0;
    user-select: none;
  }
  h1 { font-size: 26px; font-weight: 800; color: #a0c4ff; margin-bottom: 6px; }
  .desc { font-size: 14px; color: #888; margin-bottom: 24px; text-align: center; }
  .round-info {
    font-size: 18px;
    font-weight: 700;
    color: #f0d060;
    margin-bottom: 20px;
    min-height: 28px;
    text-align: center;
  }
  .phase-msg {
    font-size: 15px;
    color: #a0c4ff;
    margin-bottom: 16px;
    min-height: 22px;
    text-align: center;
    font-style: italic;
  }
  .simon-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .color-btn {
    width: 140px; height: 140px;
    border-radius: 20px;
    cursor: pointer;
    transition: opacity 0.1s, transform 0.1s;
    border: 4px solid transparent;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: rgba(0,0,0,0.4);
  }
  #btn-red    { background: #c0392b; }
  #btn-blue   { background: #2980b9; }
  #btn-green  { background: #27ae60; }
  #btn-yellow { background: #f39c12; }
  .color-btn.dim { opacity: 0.35; }
  .color-btn.lit {
    opacity: 1;
    transform: scale(1.07);
    border-color: rgba(255,255,255,0.8);
    box-shadow: 0 0 30px currentColor;
  }
  .color-btn:hover:not(.dim) { opacity: 0.85; }
  .color-btn:active:not(.dim) { transform: scale(0.95); }
  .color-btn.disabled { cursor: not-allowed; }
  .progress-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    justify-content: center;
  }
  .round-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #2a3a5e;
    transition: background 0.3s;
  }
  .round-dot.done { background: #3fb950; }
  .round-dot.active { background: #f0d060; animation: dotPulse 0.8s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #statusMsg {
    font-size: 16px;
    font-weight: 700;
    min-height: 24px;
    text-align: center;
    margin-bottom: 12px;
  }
  .success { color: #3fb950; }
  .error { color: #f72585; }
  .info { color: #a0c4ff; }
  #startBtn {
    background: linear-gradient(135deg, #4361ee, #764ba2);
    color: #fff;
    border: none;
    padding: 14px 44px;
    font-size: 17px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 4px;
  }
  #startBtn:hover { opacity: 0.9; }
  #startBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .color-label {
    font-size: 13px;
    font-weight: 800;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<h1>Simon Says</h1>
<p class="desc">Watch the color sequence, then repeat it. Reach round 5!</p>

<div class="progress-row" id="progressRow">
  <div class="round-dot active" id="rdot0"></div>
  <div class="round-dot" id="rdot1"></div>
  <div class="round-dot" id="rdot2"></div>
  <div class="round-dot" id="rdot3"></div>
  <div class="round-dot" id="rdot4"></div>
</div>

<div class="round-info" id="roundInfo">Round 1 of 5</div>
<div class="phase-msg" id="phaseMsg">Press Start to begin!</div>

<div class="simon-grid">
  <div class="color-btn dim disabled" id="btn-red"    onclick="playerClick('red')">   <span class="color-label">Red</span></div>
  <div class="color-btn dim disabled" id="btn-blue"   onclick="playerClick('blue')">  <span class="color-label">Blue</span></div>
  <div class="color-btn dim disabled" id="btn-green"  onclick="playerClick('green')"> <span class="color-label">Green</span></div>
  <div class="color-btn dim disabled" id="btn-yellow" onclick="playerClick('yellow')"><span class="color-label">Yellow</span></div>
</div>

<div id="statusMsg" class="info">Watch the pattern and repeat!</div>
<button id="startBtn" onclick="startGame()">Start Game</button>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const COLORS = ['red', 'blue', 'green', 'yellow'];
  const TOTAL_ROUNDS = 5;

  // Pre-set sequence (deterministic): R, B, G, Y, R
  const FULL_SEQUENCE = ['red', 'blue', 'green', 'yellow', 'red'];

  let currentRound = 0;
  let playerSequence = [];
  let phase = 'idle'; // idle | showing | input | won | over

  function allBtns() {
    return COLORS.map(c => document.getElementById('btn-' + c));
  }

  function setButtonsEnabled(enabled) {
    allBtns().forEach(btn => {
      if (enabled) {
        btn.classList.remove('disabled', 'dim');
      } else {
        btn.classList.add('disabled', 'dim');
      }
    });
    phase = enabled ? 'input' : phase;
  }

  function flash(color, duration = 450) {
    return new Promise(resolve => {
      const btn = document.getElementById('btn-' + color);
      btn.classList.add('lit');
      btn.classList.remove('dim');
      setTimeout(() => {
        btn.classList.remove('lit');
        btn.classList.add('dim');
        setTimeout(resolve, 100);
      }, duration);
    });
  }

  async function showSequence(round) {
    phase = 'showing';
    setButtonsEnabled(false);
    document.getElementById('phaseMsg').textContent = 'Watch the pattern...';

    const seq = FULL_SEQUENCE.slice(0, round);
    for (const color of seq) {
      await flash(color);
      await new Promise(r => setTimeout(r, 150));
    }

    // Enable input
    setButtonsEnabled(true);
    document.getElementById('phaseMsg').textContent = `Now repeat! (${round} step${round > 1 ? 's' : ''})`;
    playerSequence = [];
  }

  function updateProgress(round) {
    for (let i = 0; i < TOTAL_ROUNDS; i++) {
      const dot = document.getElementById('rdot' + i);
      if (i < round - 1) dot.className = 'round-dot done';
      else if (i === round - 1) dot.className = 'round-dot active';
      else dot.className = 'round-dot';
    }
    document.getElementById('roundInfo').textContent = `Round ${round} of ${TOTAL_ROUNDS}`;
  }

  function playerClick(color) {
    if (phase !== 'input') return;
    flash(color, 200);
    playerSequence.push(color);

    const idx = playerSequence.length - 1;
    const expected = FULL_SEQUENCE[idx];

    if (color !== expected) {
      // Wrong
      phase = 'over';
      setButtonsEnabled(false);
      taskResult = 'wrong_sequence';
      document.getElementById('statusMsg').textContent = `Wrong! You reached round ${currentRound}.`;
      document.getElementById('statusMsg').className = 'error';
      document.getElementById('phaseMsg').textContent = 'Game over.';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').textContent = 'Play Again';
      return;
    }

    if (playerSequence.length === currentRound) {
      // Completed this round
      if (currentRound === TOTAL_ROUNDS) {
        // Won!
        phase = 'won';
        taskResult = 'round_5';
        setButtonsEnabled(false);
        document.getElementById('statusMsg').textContent = 'You completed all 5 rounds!';
        document.getElementById('statusMsg').className = 'success';
        document.getElementById('phaseMsg').textContent = 'Simon Says: You win!';
        for (let i = 0; i < TOTAL_ROUNDS; i++) {
          document.getElementById('rdot' + i).className = 'round-dot done';
        }
        document.getElementById('startBtn').disabled = false;
        document.getElementById('startBtn').textContent = 'Play Again';
      } else {
        // Advance round
        setButtonsEnabled(false);
        document.getElementById('statusMsg').textContent = `Round ${currentRound} correct! Get ready...`;
        document.getElementById('statusMsg').className = 'info';
        currentRound++;
        updateProgress(currentRound);
        setTimeout(() => showSequence(currentRound), 1200);
      }
    }
  }

  function startGame() {
    currentRound = 1;
    playerSequence = [];
    taskResult = 'pending';
    phase = 'idle';
    document.getElementById('statusMsg').textContent = 'Watch the pattern and repeat!';
    document.getElementById('statusMsg').className = 'info';
    document.getElementById('startBtn').disabled = true;
    updateProgress(1);
    setButtonsEnabled(false);
    setTimeout(() => showSequence(1), 600);
  }
</script>
</body>
</html>
