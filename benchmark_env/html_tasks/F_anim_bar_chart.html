<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Analytics Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f4f6fb;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .dashboard {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 32px 36px;
    width: 580px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }
  .live-badge {
    background: #e74c3c;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  .chart-area {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    height: 220px;
    padding: 0 8px;
    border-bottom: 2px solid #eee;
    margin-bottom: 10px;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }
  .bar-value {
    font-size: 13px;
    font-weight: 700;
    color: #333;
    margin-bottom: 5px;
  }
  .bar {
    width: 100%;
    border-radius: 6px 6px 0 0;
    transition: height 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .bar-label {
    margin-top: 8px;
    font-size: 12px;
    color: #555;
    font-weight: 600;
    text-align: center;
  }
  .y-axis {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #aaa;
    margin-bottom: 24px;
    padding: 0 8px;
  }
  .update-info {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 20px;
  }
  .answer-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  label { font-size: 13px; color: #333; font-weight: 600; white-space: nowrap; }
  input[type="text"] {
    flex: 1;
    padding: 9px 12px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
  }
  input[type="text"]:focus { border-color: #4361ee; }
  button {
    background: #4361ee;
    color: #fff;
    border: none;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #3451d1; }
  #feedback { margin-top: 10px; font-size: 13px; font-weight: 600; min-height: 18px; }
  .correct { color: #2ecc71; }
  .wrong { color: #e74c3c; }
</style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <div>
      <h1>Sector Performance</h1>
      <p class="subtitle">Live market category data — updates every 2s</p>
    </div>
    <span class="live-badge">LIVE DATA</span>
  </div>
  <div class="chart-area" id="chartArea"></div>
  <div class="y-axis">
    <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
  </div>
  <p class="update-info" id="updateInfo">Next update in 2s...</p>
  <div class="answer-row">
    <label>Which category peaked highest?</label>
    <input type="text" id="answer" placeholder="Category name..." />
    <button onclick="submitAnswer()">Submit</button>
  </div>
  <div id="feedback"></div>
</div>

<script>
  let taskResult = 'pending';
  window.getTaskResult = () => taskResult;

  const categories = [
    { name: 'Technology', color: '#4361ee', peakVal: 94 },
    { name: 'Finance',    color: '#f72585', peakVal: 67 },
    { name: 'Healthcare', color: '#7209b7', peakVal: 71 },
    { name: 'Retail',     color: '#4cc9f0', peakVal: 45 },
  ];

  // Current displayed values
  let currentVals = [60, 45, 50, 35];
  let updateCount = 0;
  const MAX_HEIGHT = 200; // pixels for value=100

  // Update schedule: random updates but Technology always highest, at t=10s stabilize
  const updates = [
    [82, 55, 61, 38],
    [88, 60, 68, 40],
    [78, 58, 63, 42],
    [91, 63, 70, 44],
    [94, 67, 71, 45], // final stable
  ];

  function buildBars() {
    const area = document.getElementById('chartArea');
    area.innerHTML = '';
    categories.forEach((cat, i) => {
      const col = document.createElement('div');
      col.className = 'bar-col';

      const valEl = document.createElement('div');
      valEl.className = 'bar-value';
      valEl.id = 'val-' + i;
      valEl.textContent = currentVals[i];

      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.id = 'bar-' + i;
      bar.style.background = cat.color;
      bar.style.height = (currentVals[i] / 100 * MAX_HEIGHT) + 'px';

      const labelEl = document.createElement('div');
      labelEl.className = 'bar-label';
      labelEl.textContent = cat.name;

      col.appendChild(valEl);
      col.appendChild(bar);
      area.appendChild(col);

      // labels below chart area
      const outer = document.createElement('div');
      outer.style.textAlign = 'center';
      outer.appendChild(labelEl);
    });
    // rebuild properly
    area.innerHTML = '';
    categories.forEach((cat, i) => {
      const col = document.createElement('div');
      col.className = 'bar-col';
      col.innerHTML = `
        <div class="bar-value" id="val-${i}">${currentVals[i]}</div>
        <div class="bar" id="bar-${i}" style="background:${cat.color};height:${currentVals[i]/100*MAX_HEIGHT}px"></div>
        `;
      area.appendChild(col);
    });
  }

  function updateBars(vals) {
    vals.forEach((v, i) => {
      document.getElementById('val-' + i).textContent = v;
      document.getElementById('bar-' + i).style.height = (v / 100 * MAX_HEIGHT) + 'px';
      currentVals[i] = v;
    });
  }

  buildBars();

  let countdown = 2;
  const infoEl = document.getElementById('updateInfo');

  const ticker = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      if (updateCount < updates.length) {
        updateBars(updates[updateCount]);
        updateCount++;
      }
      countdown = 2;
    }
    infoEl.textContent = updateCount >= updates.length
      ? 'Data stabilized — final values shown'
      : `Next update in ${countdown}s... (update ${updateCount + 1}/${updates.length})`;
  }, 1000);

  function submitAnswer() {
    const val = document.getElementById('answer').value.trim().toLowerCase();
    const fb = document.getElementById('feedback');
    if (val.includes('tech')) {
      taskResult = 'correct_category';
      fb.textContent = 'Correct! Technology peaked highest at 94.';
      fb.className = 'correct';
    } else {
      taskResult = 'wrong_category';
      fb.textContent = 'Incorrect. Watch the chart updates carefully.';
      fb.className = 'wrong';
    }
  }
</script>
</body>
</html>
