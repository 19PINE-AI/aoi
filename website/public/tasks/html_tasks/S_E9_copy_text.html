<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Text Between Fields</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 600px; width: 100%; padding: 32px; }
  .card h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 20px; }
  .instructions { background: #eef2ff; border-left: 4px solid #4f46e5; padding: 14px 18px; border-radius: 0 8px 8px 0; margin-bottom: 24px; font-size: 14px; color: #3730a3; line-height: 1.6; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 14px; font-weight: 600; color: #555; margin-bottom: 6px; }
  input[type="text"] { width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
  input:focus { border-color: #4f46e5; }
  input[readonly] { background: #f0f0f0; color: #333; }
  .arrow { text-align: center; font-size: 24px; color: #999; margin: 8px 0; }
  .submit-btn { margin-top: 16px; padding: 12px 28px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .submit-btn:hover { background: #4338ca; }
</style>
</head>
<body>
<div class="card">
  <h1>Task: Copy Text</h1>
  <div class="instructions">
    Read the reference code shown in the <strong>Source</strong> field below. Type the <em>exact same text</em> into the <strong>Destination</strong> field. Then click Submit.
  </div>
  <div class="form-group">
    <label for="sourceField">Source (read-only):</label>
    <input type="text" id="sourceField" value="TXN-2024-08-ALPHA" readonly>
  </div>
  <div class="arrow">&#8595;</div>
  <div class="form-group">
    <label for="destField">Destination:</label>
    <input type="text" id="destField" placeholder="Type the reference code here..." autocomplete="off">
  </div>
  <button class="submit-btn" id="submitBtn">Submit</button>
</div>
<script>
(function() {
  let submitted = false;
  document.getElementById('submitBtn').addEventListener('click', function() {
    submitted = true;
  });
  window.getTaskResult = function() {
    var source = document.getElementById('sourceField').value.trim();
    var dest = document.getElementById('destField').value.trim();
    if (dest === source) return 'copy_correct';
    if (dest) return 'incorrect';
    return 'empty';
  };
})();
</script>
</body>
</html>
