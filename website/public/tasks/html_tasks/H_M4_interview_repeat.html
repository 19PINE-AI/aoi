<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Assessment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #ab47bc; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .assess-card { background: #16213e; border-radius: 16px; padding: 32px; width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .assess-header { text-align: center; margin-bottom: 24px; }
  .assess-icon { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #ab47bc, #6a1b9a); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; }
  .assess-title { font-size: 20px; font-weight: 600; }
  .assess-sub { font-size: 13px; color: #888; margin-top: 4px; }
  .instruction { background: #0f1a30; border-left: 3px solid #ab47bc; border-radius: 0 8px 8px 0; padding: 12px 16px; margin-bottom: 20px; font-size: 14px; color: #bbb; }
  .audio-status { text-align: center; margin-bottom: 20px; }
  .audio-status .wave { display: inline-block; width: 4px; height: 16px; background: #ab47bc; margin: 0 2px; border-radius: 2px; animation: wave 1s ease-in-out infinite; opacity: 0; }
  .audio-status.playing .wave { opacity: 1; }
  .audio-status .wave:nth-child(1) { animation-delay: 0s; }
  .audio-status .wave:nth-child(2) { animation-delay: 0.15s; }
  .audio-status .wave:nth-child(3) { animation-delay: 0.3s; }
  .audio-status .wave:nth-child(4) { animation-delay: 0.45s; }
  .audio-status .wave:nth-child(5) { animation-delay: 0.6s; }
  @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 24px; } }
  .audio-label { font-size: 13px; color: #888; margin-top: 8px; }
  .divider { border: none; border-top: 1px solid #2a2a4e; margin: 20px 0; }
  .mic-indicator { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 12px; background: #0f1a30; border-radius: 8px; }
  .mic-icon { width: 32px; height: 32px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .mic-icon.listening { background: #e53935; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.4); } 50% { box-shadow: 0 0 0 8px rgba(229,57,53,0); } }
  .mic-label { font-size: 13px; color: #888; }
  .mic-label.active { color: #ef5350; }
  .transcript-box { background: #0f1a30; border: 1px solid #2a2a4e; border-radius: 8px; padding: 12px; min-height: 50px; margin-bottom: 12px; font-size: 14px; color: #aaa; }
  .fallback-input { width: 100%; background: #0f1a30; border: 1px solid #2a2a4e; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 15px; outline: none; margin-bottom: 12px; }
  .fallback-input:focus { border-color: #ab47bc; }
  .submit-btn { width: 100%; padding: 10px; background: #ab47bc; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
  .submit-btn:hover { background: #ba68c8; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="assess-card">
  <div class="assess-header">
    <div class="assess-icon">&#127897;</div>
    <div class="assess-title">Language Assessment</div>
    <div class="assess-sub">Repeat-after-me exercise</div>
  </div>
  <div class="instruction">Listen carefully to the sentence, then repeat it back exactly as you heard it.</div>
  <div class="audio-status" id="audioStatus">
    <span class="wave"></span><span class="wave"></span><span class="wave"></span><span class="wave"></span><span class="wave"></span>
    <div class="audio-label" id="audioLabel">Preparing audio...</div>
  </div>
  <hr class="divider">
  <div class="mic-indicator">
    <div class="mic-icon" id="micIcon">&#127908;</div>
    <div class="mic-label" id="micLabel">Waiting for audio to finish...</div>
  </div>
  <div class="transcript-box" id="transcript">Your spoken response will appear here...</div>
  <input type="text" class="fallback-input" id="fallbackInput" placeholder="Type or speak your answer" autocomplete="off">
  <button class="submit-btn" id="submitBtn">Submit</button>
  <div class="status" id="status"></div>
</div>
<script>
  let capturedResponse = '';

  function startListening() {
    document.getElementById('micIcon').classList.add('listening');
    document.getElementById('micLabel').textContent = 'Listening — repeat the sentence...';
    document.getElementById('micLabel').classList.add('active');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.lang = 'en-US';
      recognition.onresult = (event) => {
        capturedResponse = event.results[0][0].transcript;
        document.getElementById('transcript').textContent = capturedResponse;
        document.getElementById('micIcon').classList.remove('listening');
        document.getElementById('micLabel').textContent = 'Response captured';
      };
      recognition.onerror = () => {
        document.getElementById('micLabel').textContent = 'Speech recognition unavailable — type your answer';
        document.getElementById('micIcon').classList.remove('listening');
      };
      recognition.onend = () => {
        if (!capturedResponse) {
          document.getElementById('micIcon').classList.remove('listening');
          document.getElementById('micLabel').textContent = 'Use text input below';
        }
      };
      navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
        recognition.start();
      }).catch(() => {
        document.getElementById('micLabel').textContent = 'Mic unavailable — type your answer';
        document.getElementById('micIcon').classList.remove('listening');
      });
    } else {
      document.getElementById('micLabel').textContent = 'Speech recognition unavailable — type your answer';
      document.getElementById('micIcon').classList.remove('listening');
    }
  }

  function playSentence() {
    document.getElementById('audioStatus').classList.add('playing');
    document.getElementById('audioLabel').textContent = 'Playing sentence...';
    const u = new SpeechSynthesisUtterance("Please repeat after me: The quick brown fox jumps over the lazy dog.");
    u.rate = 0.85; u.lang = 'en-US';
    u.onend = () => {
      document.getElementById('audioStatus').classList.remove('playing');
      document.getElementById('audioLabel').textContent = 'Audio complete — now repeat';
      startListening();
    };
    speechSynthesis.speak(u);
  }

  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'sentence_matched' ? 'Matched!' : 'Try again.';
  });

  window.getTaskResult = function() {
    const spoken = capturedResponse.toLowerCase();
    const typed = document.getElementById('fallbackInput').value.toLowerCase().trim();
    const combined = spoken + ' ' + typed;
    if (combined.includes('quick brown fox')) return 'sentence_matched';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(playSentence, 3000);
  }, 2000);
</script>
</body>
</html>
