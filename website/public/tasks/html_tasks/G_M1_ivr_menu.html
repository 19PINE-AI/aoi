<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Call — IVR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #42a5f5; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .phone-card { background: #16213e; border-radius: 16px; padding: 32px; width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; }
  .call-status { font-size: 13px; color: #42a5f5; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #42a5f5, #1565c0); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; }
  .caller-name { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .caller-sub { font-size: 13px; color: #888; margin-bottom: 12px; }
  .call-timer { font-size: 28px; font-weight: 300; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
  .task-hint { background: #0d1b3e; border: 1px solid #2a2a4e; border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 14px; color: #90caf9; }
  .keypad { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .key-btn { padding: 18px; border-radius: 12px; border: 2px solid #2a2a4e; background: #0f1a30; color: #e0e0e0; font-size: 28px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .key-btn:hover { border-color: #42a5f5; background: #1a2a4e; }
  .key-btn.selected { border-color: #42a5f5; background: #1a3a6e; }
  .call-actions { display: flex; justify-content: center; gap: 20px; margin-bottom: 8px; }
  .action-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; }
  .btn-mute { background: #333; }
  .btn-speaker { background: #333; }
  .btn-end { background: #e53935; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 12px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="phone-card">
  <div class="call-status" id="callStatus">Calling...</div>
  <div class="avatar">&#9742;</div>
  <div class="caller-name">Automated System</div>
  <div class="caller-sub">Customer Service Line</div>
  <div class="call-timer" id="timer">00:00</div>
  <div class="task-hint">You need to reach the <strong>Support</strong> department.</div>
  <div class="keypad">
    <button class="key-btn" data-key="1">1</button>
    <button class="key-btn" data-key="2">2</button>
    <button class="key-btn" data-key="3">3</button>
    <button class="key-btn" data-key="0">0</button>
  </div>
  <div class="call-actions">
    <button class="action-btn btn-mute" title="Mute">&#128263;</button>
    <button class="action-btn btn-speaker" title="Speaker">&#128264;</button>
    <button class="action-btn btn-end" title="End Call">&#128381;</button>
  </div>
  <div class="status" id="status"></div>
</div>
<script>
  const audioText = "Welcome. Press 1 for Sales. Press 2 for Support. Press 3 for Billing. Press 0 for an operator.";
  let audioPlayed = false;
  let selectedKey = null;
  let timerSec = 0;

  setInterval(() => {
    timerSec++;
    const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
    const s = String(timerSec % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);

  function startAudio() {
    if (audioPlayed) return;
    audioPlayed = true;
    document.getElementById('callStatus').textContent = 'Connected';
    const u = new SpeechSynthesisUtterance(audioText);
    u.rate = 0.85; u.lang = 'en-US';
    speechSynthesis.speak(u);
  }

  document.querySelectorAll('.key-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.key-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedKey = btn.dataset.key;
      const r = window.getTaskResult();
      document.getElementById('status').textContent = r === 'support_selected' ? 'Connected to Support.' : 'Selection registered.';
    });
  });

  window.getTaskResult = function() {
    if (selectedKey === '2') return 'support_selected';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startAudio, 500);
  }, 2000);
</script>
</body>
</html>
