<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Audio Alert Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; padding: 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #16213e; border-radius: 10px; margin-bottom: 20px; }
  .header h1 { font-size: 20px; color: #00d4ff; }
  .header .info { font-size: 13px; color: #8892b0; display: flex; align-items: center; gap: 8px; }
  .header .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  .audio-status { background: #0a0f1e; border-radius: 8px; padding: 10px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #8892b0; }
  .audio-status .speaker { font-size: 18px; }
  .panels { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
  .panel { background: #16213e; border-radius: 10px; padding: 20px; border: 2px solid #2a3a5e; transition: all 0.5s; }
  .panel.critical { border-color: #e74c3c; box-shadow: 0 0 20px rgba(231,76,60,0.3); }
  .panel.acked { border-color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.2); }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .panel-name { font-size: 16px; font-weight: 600; }
  .panel-dot { width: 12px; height: 12px; border-radius: 50%; transition: background 0.5s; }
  .panel-dot.green { background: #00ff88; }
  .panel-dot.red { background: #e74c3c; animation: pulseRed 0.8s infinite; }
  .panel-dot.acked { background: #00ff88; animation: none; }
  @keyframes pulseRed { 0%,100% { box-shadow: 0 0 5px #e74c3c; } 50% { box-shadow: 0 0 15px #e74c3c; } }
  .panel-value { font-size: 32px; font-weight: bold; margin-bottom: 5px; }
  .panel-sub { font-size: 12px; color: #8892b0; margin-bottom: 12px; }
  .gauge { width: 100%; height: 8px; background: #0a0f1e; border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
  .gauge-fill { height: 100%; border-radius: 4px; transition: width 0.5s, background 0.5s; }
  .ack-btn { width: 100%; padding: 10px; font-size: 13px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; background: #2a3a5e; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
  .ack-btn.active { background: #e74c3c; color: white; animation: btnPulse 1s infinite; }
  @keyframes btnPulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
  .ack-btn.done { background: #00ff88; color: #0a0f1e; animation: none; }
  .ack-btn:disabled { cursor: default; }
  .alert-log { background: #16213e; border-radius: 10px; padding: 15px 20px; border: 1px solid #2a3a5e; }
  .alert-log h3 { font-size: 14px; color: #8892b0; margin-bottom: 10px; }
  .log-entries { font-family: monospace; font-size: 13px; }
  .log-entries div { padding: 3px 0; }
  .log-entries .alert-entry { color: #e74c3c; }
  .log-entries .ack-entry { color: #00ff88; }
  .log-entries .info-entry { color: #8892b0; }
</style>
</head>
<body>
<div class="header">
  <h1>Audio Alert Dashboard</h1>
  <div class="info"><div class="dot"></div> Audio Monitoring Active</div>
</div>
<div class="audio-status">
  <span><span class="speaker">&#128266;</span> Audio alerts enabled &mdash; listen for spoken metric names</span>
  <span id="lastAlert">No alerts yet</span>
</div>
<div class="panels">
  <div class="panel" id="panel-cpu">
    <div class="panel-header">
      <div class="panel-name">CPU</div>
      <div class="panel-dot green" id="dot-cpu"></div>
    </div>
    <div class="panel-value" id="val-cpu">42%</div>
    <div class="panel-sub">Threshold: 90%</div>
    <div class="gauge"><div class="gauge-fill" id="gauge-cpu" style="width:42%;background:#00ff88;"></div></div>
    <button class="ack-btn" id="ack-cpu" disabled>ACK CPU</button>
  </div>
  <div class="panel" id="panel-memory">
    <div class="panel-header">
      <div class="panel-name">Memory</div>
      <div class="panel-dot green" id="dot-memory"></div>
    </div>
    <div class="panel-value" id="val-memory">55%</div>
    <div class="panel-sub">Threshold: 85%</div>
    <div class="gauge"><div class="gauge-fill" id="gauge-memory" style="width:55%;background:#00ff88;"></div></div>
    <button class="ack-btn" id="ack-memory" disabled>ACK Memory</button>
  </div>
  <div class="panel" id="panel-disk">
    <div class="panel-header">
      <div class="panel-name">Disk</div>
      <div class="panel-dot green" id="dot-disk"></div>
    </div>
    <div class="panel-value" id="val-disk">34%</div>
    <div class="panel-sub">Threshold: 90%</div>
    <div class="gauge"><div class="gauge-fill" id="gauge-disk" style="width:34%;background:#00ff88;"></div></div>
    <button class="ack-btn" id="ack-disk" disabled>ACK Disk</button>
  </div>
  <div class="panel" id="panel-network">
    <div class="panel-header">
      <div class="panel-name">Network</div>
      <div class="panel-dot green" id="dot-network"></div>
    </div>
    <div class="panel-value" id="val-network">12 Mbps</div>
    <div class="panel-sub">Threshold: 950 Mbps</div>
    <div class="gauge"><div class="gauge-fill" id="gauge-network" style="width:12%;background:#00ff88;"></div></div>
    <button class="ack-btn" id="ack-network" disabled>ACK Network</button>
  </div>
</div>
<div class="alert-log">
  <h3>Alert Log</h3>
  <div class="log-entries" id="logEntries"></div>
</div>
<script>
(function() {
  // Three alerts: CPU at t=10s, Memory at t=18s, Disk at t=26s
  const alerts = [
    { metric: 'cpu', time: 5, spoken: 'CPU critical', label: 'CPU' },
    { metric: 'memory', time: 9, spoken: 'Memory critical', label: 'Memory' },
    { metric: 'disk', time: 13, spoken: 'Disk critical', label: 'Disk' }
  ];

  const metrics = ['cpu', 'memory', 'disk', 'network'];
  let tick = 0;
  const acked = {};
  const alertsFired = {};
  const correctAcks = {};
  let currentCritical = null;

  const logEl = document.getElementById('logEntries');
  function addLog(msg, cls) {
    const d = document.createElement('div');
    d.className = cls;
    d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function speak(text) {
    if ('speechSynthesis' in window) {
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate = 1.0;
      utt.pitch = 1.2;
      utt.volume = 1.0;
      window.speechSynthesis.speak(utt);
    }
  }

  function setCritical(metric) {
    const panel = document.getElementById('panel-' + metric);
    const dot = document.getElementById('dot-' + metric);
    const btn = document.getElementById('ack-' + metric);
    panel.classList.add('critical');
    dot.className = 'panel-dot red';
    btn.classList.add('active');
    btn.disabled = false;
    currentCritical = metric;
  }

  function updateMetrics() {
    tick++;

    // CPU value
    let cpuV = tick >= 5 && tick <= 8 ? 92 + Math.floor(Math.random() * 5) : 35 + Math.floor(Math.random() * 15);
    document.getElementById('val-cpu').textContent = cpuV + '%';
    document.getElementById('gauge-cpu').style.width = cpuV + '%';
    document.getElementById('gauge-cpu').style.background = cpuV > 90 ? '#e74c3c' : '#00ff88';

    // Memory value
    let memV = tick >= 9 && tick <= 12 ? 88 + Math.floor(Math.random() * 5) : 52 + Math.floor(Math.random() * 8);
    document.getElementById('val-memory').textContent = memV + '%';
    document.getElementById('gauge-memory').style.width = memV + '%';
    document.getElementById('gauge-memory').style.background = memV > 85 ? '#e74c3c' : '#00ff88';

    // Disk value
    let diskV = tick >= 13 && tick <= 16 ? 93 + Math.floor(Math.random() * 4) : 30 + Math.floor(Math.random() * 10);
    document.getElementById('val-disk').textContent = diskV + '%';
    document.getElementById('gauge-disk').style.width = diskV + '%';
    document.getElementById('gauge-disk').style.background = diskV > 90 ? '#e74c3c' : '#00ff88';

    // Network stays normal
    let netV = 10 + Math.floor(Math.random() * 8);
    document.getElementById('val-network').textContent = netV + ' Mbps';
    document.getElementById('gauge-network').style.width = (netV / 10) + '%';

    // Fire alerts
    alerts.forEach(function(a) {
      if (tick === a.time && !alertsFired[a.metric]) {
        alertsFired[a.metric] = true;
        setCritical(a.metric);
        speak(a.spoken);
        addLog('AUDIO ALERT: "' + a.spoken + '" - ACK the ' + a.label + ' panel', 'alert-entry');
        document.getElementById('lastAlert').textContent = 'Last: ' + a.spoken;
        document.getElementById('lastAlert').style.color = '#e74c3c';
      }
    });
  }

  // ACK handlers
  metrics.forEach(function(m) {
    document.getElementById('ack-' + m).addEventListener('click', function() {
      if (acked[m]) return;
      acked[m] = true;
      // Check if this metric was actually alerted
      if (alertsFired[m]) {
        correctAcks[m] = true;
        addLog('ACK: ' + m.toUpperCase() + ' acknowledged correctly', 'ack-entry');
      } else {
        correctAcks[m] = false;
        addLog('ACK: ' + m.toUpperCase() + ' acknowledged (not critical)', 'info-entry');
      }
      const panel = document.getElementById('panel-' + m);
      const dot = document.getElementById('dot-' + m);
      const btn = document.getElementById('ack-' + m);
      panel.classList.remove('critical');
      panel.classList.add('acked');
      dot.className = 'panel-dot acked';
      btn.classList.remove('active');
      btn.classList.add('done');
      btn.textContent = 'Acknowledged';
      btn.disabled = true;
    });
  });

  window.getTaskResult = function() {
    let correct = 0;
    alerts.forEach(function(a) {
      if (correctAcks[a.metric]) correct++;
    });
    if (correct === 3) return 'all_3_alerts_correct';
    if (correct > 0) return 'partial_' + correct + '_correct';
    return 'no_alerts_acked';
  };

  addLog('Audio alert monitoring started', 'info-entry');

  setTimeout(function() {
    setInterval(updateMetrics, 2000);
  }, 2000);
})();
</script>
</body>
</html>
