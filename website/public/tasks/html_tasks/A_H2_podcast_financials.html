<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Movers Podcast</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f23; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #0f0f23; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #55efc4; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .player-card { background: #1a1a2e; border-radius: 16px; padding: 32px; width: 520px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .top-row { display: flex; gap: 20px; margin-bottom: 24px; }
  .artwork { width: 120px; height: 120px; border-radius: 12px; background: linear-gradient(135deg, #55efc4, #00b894); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .artwork-text { font-size: 20px; font-weight: 700; color: rgba(0,0,0,0.7); text-align: center; line-height: 1.2; }
  .meta { display: flex; flex-direction: column; justify-content: center; }
  .podcast-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .podcast-episode { font-size: 14px; color: #888; margin-bottom: 8px; }
  .progress-container { margin-bottom: 20px; }
  .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #55efc4; transition: width 0.5s linear; }
  .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 6px; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 28px; }
  .ctrl-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 20px; }
  .play-btn { width: 56px; height: 56px; border-radius: 50%; background: #55efc4; border: none; color: #2d3436; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .divider { border: none; border-top: 1px solid #2a2a3e; margin: 20px 0; }
  .form-section h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #ccc; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  th { text-align: left; font-size: 13px; color: #888; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid #2a2a3e; }
  td { padding: 8px 12px; }
  td.company { font-size: 14px; font-weight: 500; color: #ccc; }
  td input { background: #16162b; border: 1px solid #2a2a3e; border-radius: 6px; padding: 8px 10px; color: #e0e0e0; font-size: 14px; outline: none; width: 100%; }
  td input:focus { border-color: #55efc4; }
  .submit-btn { width: 100%; padding: 10px; background: #55efc4; border: none; border-radius: 8px; color: #2d3436; font-size: 15px; font-weight: 600; cursor: pointer; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="player-card">
  <div class="top-row">
    <div class="artwork"><div class="artwork-text">Market<br>Movers</div></div>
    <div class="meta">
      <div class="podcast-title">Market Movers</div>
      <div class="podcast-episode">Episode 156 — Q4 Earnings Round-Up</div>
    </div>
  </div>
  <div class="progress-container">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-labels"><span id="elapsed">0:00</span><span>0:25</span></div>
  </div>
  <div class="controls">
    <button class="ctrl-btn">&#9198;</button>
    <button class="play-btn" id="playBtn">&#9654;</button>
    <button class="ctrl-btn">&#9197;</button>
  </div>
  <hr class="divider">
  <div class="form-section">
    <h3>Fill in the reported revenues:</h3>
    <table>
      <thead><tr><th>Company</th><th>Revenue (millions)</th></tr></thead>
      <tbody>
        <tr><td class="company">Acme Corp</td><td><input type="text" id="rev1" placeholder="e.g. 12.4" autocomplete="off"></td></tr>
        <tr><td class="company">Bolt Inc</td><td><input type="text" id="rev2" placeholder="e.g. 8.7" autocomplete="off"></td></tr>
        <tr><td class="company">Cipher Ltd</td><td><input type="text" id="rev3" placeholder="e.g. 21.1" autocomplete="off"></td></tr>
      </tbody>
    </table>
    <button class="submit-btn" id="submitBtn">Submit Revenues</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const segments = [
    "Welcome to Market Movers. Let's go through the Q4 earnings reports.",
    "Acme Corp reported twelve point four million in revenue, beating analyst expectations by two percent.",
    "Bolt Inc came in at eight point seven million, which was slightly below the projected nine million.",
    "And Cipher Ltd led the pack with twenty-one point one million, a strong showing driven by their cloud division."
  ];
  let audioPlayed = false;

  function startAudio() {
    if (audioPlayed) return;
    audioPlayed = true;
    const startTime = Date.now();
    const estDuration = 28000;
    const iv = setInterval(() => {
      const pct = Math.min(100, ((Date.now() - startTime) / estDuration) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      const sec = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('elapsed').textContent = '0:' + String(sec).padStart(2, '0');
      if (pct >= 100) clearInterval(iv);
    }, 200);
    document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';

    let idx = 0;
    function speakNext() {
      if (idx >= segments.length) {
        clearInterval(iv);
        document.getElementById('progressFill').style.width = '100%';
        return;
      }
      const u = new SpeechSynthesisUtterance(segments[idx]);
      u.rate = 0.9;
      u.lang = 'en-US';
      u.onend = () => { idx++; setTimeout(speakNext, 1200); };
      speechSynthesis.speak(u);
    }
    speakNext();
  }

  document.getElementById('playBtn').addEventListener('click', startAudio);
  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'all_revenues_correct' ? 'All correct!' : 'Check your numbers.';
  });

  window.getTaskResult = function() {
    const v1 = document.getElementById('rev1').value.trim();
    const v2 = document.getElementById('rev2').value.trim();
    const v3 = document.getElementById('rev3').value.trim();
    const ok1 = v1.includes('12.4');
    const ok2 = v2.includes('8.7');
    const ok3 = v3.includes('21.1');
    if (ok1 && ok2 && ok3) return 'all_revenues_correct';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startAudio, 500);
  }, 2000);
</script>
</body>
</html>
