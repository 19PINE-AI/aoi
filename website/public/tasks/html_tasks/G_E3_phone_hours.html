<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Call</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #66bb6a; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .phone-card { background: #16213e; border-radius: 16px; padding: 32px; width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; }
  .call-status { font-size: 13px; color: #66bb6a; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .caller-name { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .caller-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
  .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #66bb6a, #2e7d32); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; }
  .call-timer { font-size: 28px; font-weight: 300; margin-bottom: 24px; font-variant-numeric: tabular-nums; }
  .call-actions { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; }
  .action-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; }
  .btn-mute { background: #333; }
  .btn-speaker { background: #333; }
  .btn-end { background: #e53935; }
  .divider { border: none; border-top: 1px solid #2a2a4e; margin: 20px 0; }
  .form-section h3 { font-size: 15px; font-weight: 500; margin-bottom: 12px; color: #ccc; text-align: left; }
  .input-group { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .input-group label { font-size: 13px; color: #888; }
  .input-group input { background: #0f1a30; border: 1px solid #2a2a4e; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .input-group input:focus { border-color: #66bb6a; }
  .submit-btn { width: 100%; margin-top: 12px; padding: 10px; background: #66bb6a; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
  .submit-btn:hover { background: #81c784; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="phone-card">
  <div class="call-status">Calling...</div>
  <div class="avatar">&#9742;</div>
  <div class="caller-name">BrightStar Solutions</div>
  <div class="caller-sub">1-800-555-0199</div>
  <div class="call-timer" id="timer">00:00</div>
  <div class="call-actions">
    <button class="action-btn btn-mute" title="Mute">&#128263;</button>
    <button class="action-btn btn-speaker" title="Speaker">&#128264;</button>
    <button class="action-btn btn-end" title="End Call">&#128381;</button>
  </div>
  <hr class="divider">
  <div class="form-section">
    <h3>What is the closing time?</h3>
    <div class="input-group">
      <label for="closingTime">Closing Time</label>
      <input type="text" id="closingTime" placeholder="Enter closing time..." autocomplete="off">
    </div>
    <button class="submit-btn" id="submitBtn">Submit Answer</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const audioText = "Thank you for calling BrightStar Solutions. Our business hours are Monday through Friday, nine A M to six thirty P M. Please call back during business hours.";
  let audioPlayed = false;
  let timerSec = 0;

  setInterval(() => {
    timerSec++;
    const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
    const s = String(timerSec % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);

  function startAudio() {
    if (audioPlayed) return;
    audioPlayed = true;
    document.querySelector('.call-status').textContent = 'Connected';
    const u = new SpeechSynthesisUtterance(audioText);
    u.rate = 0.9; u.lang = 'en-US';
    speechSynthesis.speak(u);
  }

  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'time_correct' ? 'Correct!' : 'Try again.';
  });

  window.getTaskResult = function() {
    const val = document.getElementById('closingTime').value.toLowerCase().replace(/\s+/g, '');
    if (val.includes('6:30') || val.includes('630') || val.includes('sixthirty')) return 'time_correct';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startAudio, 500);
  }, 2000);
</script>
</body>
</html>
