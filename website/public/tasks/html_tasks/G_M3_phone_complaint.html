<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Service Call</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #loading { position: fixed; inset: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
  #loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #ef5350; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .phone-layout { display: flex; gap: 24px; align-items: flex-start; }
  .phone-card { background: #16213e; border-radius: 16px; padding: 28px; width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; flex-shrink: 0; }
  .call-status { font-size: 13px; color: #ef5350; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #ef5350, #c62828); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; }
  .caller-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .caller-sub { font-size: 13px; color: #888; margin-bottom: 12px; }
  .call-timer { font-size: 24px; font-weight: 300; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
  .call-actions { display: flex; justify-content: center; gap: 16px; }
  .action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; }
  .btn-mute { background: #333; }
  .btn-speaker { background: #333; }
  .btn-end { background: #e53935; }
  .ticket-form { background: #16213e; border-radius: 16px; padding: 28px; width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .ticket-form h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: #ef5350; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; background: #0f1a30; border: 1px solid #2a2a4e; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 15px; outline: none; transition: border-color 0.2s; font-family: inherit; }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus, .field textarea:focus { border-color: #ef5350; }
  .submit-btn { width: 100%; margin-top: 8px; padding: 10px; background: #ef5350; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
  .submit-btn:hover { background: #f44336; }
  .status { text-align: center; font-size: 13px; color: #666; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div class="phone-layout">
  <div class="phone-card">
    <div class="call-status" id="callStatus">Incoming Call</div>
    <div class="avatar">&#128100;</div>
    <div class="caller-name">Customer</div>
    <div class="caller-sub">Filing a complaint</div>
    <div class="call-timer" id="timer">00:00</div>
    <div class="call-actions">
      <button class="action-btn btn-mute">&#128263;</button>
      <button class="action-btn btn-speaker">&#128264;</button>
      <button class="action-btn btn-end">&#128381;</button>
    </div>
  </div>
  <div class="ticket-form">
    <h3>Customer Complaint Ticket</h3>
    <div class="field"><label>Order Number</label><input type="text" id="orderNum" placeholder="e.g. ORD-12345" autocomplete="off"></div>
    <div class="field"><label>Issue Description</label><textarea id="issueDesc" placeholder="Describe the complaint..."></textarea></div>
    <button class="submit-btn" id="submitBtn">Log Complaint</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
  const audioText = "Hi, I'm calling about order number O R D dash nine eight two three four. You sent me the wrong item. I ordered a blue jacket but received a red sweater.";
  let audioPlayed = false;
  let timerSec = 0;

  setInterval(() => {
    timerSec++;
    const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
    const s = String(timerSec % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);

  function startAudio() {
    if (audioPlayed) return;
    audioPlayed = true;
    document.getElementById('callStatus').textContent = 'Connected';
    const u = new SpeechSynthesisUtterance(audioText);
    u.rate = 0.9; u.lang = 'en-US';
    speechSynthesis.speak(u);
  }

  document.getElementById('submitBtn').addEventListener('click', () => {
    const r = window.getTaskResult();
    document.getElementById('status').textContent = r === 'both_fields_correct' ? 'Complaint logged successfully.' : 'Please check your entries.';
  });

  window.getTaskResult = function() {
    const order = document.getElementById('orderNum').value.replace(/[\s]/g, '').toUpperCase();
    const issue = document.getElementById('issueDesc').value.toLowerCase();
    const orderOk = order.includes('ORD-98234') || order.includes('98234');
    const issueOk = issue.includes('wrong item') || (issue.includes('wrong') && (issue.includes('jacket') || issue.includes('sweater')));
    if (orderOk && issueOk) return 'both_fields_correct';
    return 'incorrect';
  };

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
    setTimeout(startAudio, 500);
  }, 2000);
</script>
</body>
</html>
